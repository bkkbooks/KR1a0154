body:
  text: 豐川易説卷三鄠縣王心敬撰上經履兑下乾上小畜而受之以履何也序卦傳曰物畜然後有禮故受之以履履虎尾不咥人亨咥直結反文王之彖履云云何也曰履以兑説履乾剛有履虎尾不咥人象履虎尾而不咥人亨可知矣故占有亨象嗚呼惟禮免患其當文王與紂之事乎履虎以履尾亨乾龍以无首吉聖人所以處後不處先也讀易者宜於此着眼智崇禮卑即履義故曰履者德之基也彖曰履柔履剛也説而應乎乾是以履虎尾不咥人亨剛中正履帝位而不疚光明也説音悦孔子之繫彖履云云何也言履是以兑柔履乾剛也兑説而上應乎乾以説而履是以雖履虎尾不咥人而亨也又乾九五以剛中正履帝位而不疚兑敢以一隂自驕於九五之前乎是亦有陽道光明履帝位而无疚義嗚呼天王聖明兮臣罪當誅文王惟以如此之心遇紂是以説而應履虎尾而不咥也至德哉不惟大患終以禮免即千古君臣冠履之分亦正於此矣故履卦以君臣作解當以文王為大象又即謂文王繫此卦原本自占者明義可也象曰上天下澤履君子以辨上下定民志孔子之傳履大象云云何也言乾天在上兑澤在下所以成履而君子體之則用以辨上下之分而定斯民之志如上天下澤之截然不紊耳程傳最為分明的當矣但亦須知辨上下而定民志在上則為化民成俗之明主在下則為俗移風易之順民必在上者如乾剛之中正光明以履於上則分始辨而民志定在下者亦必如兑説之説而應乎乾則民志定而分益辨故乾剛兑説上下相應之義亦不容畧也初九素履往无咎周公之象履初九云云何也曰初九以陽剛質直之德居初地履厯之始有素履象素履則雖欠少節文而誠質可尚何咎之有故占有无咎象象曰素履之往獨行願也孔子之傳履初九云云何也言素履之所以无咎者以其誠質自將獨行所願也然並連兑説之義亦發出矣盖獨行所願是所説而應耳九二履道坦坦幽人貞吉周公之象履九二云云何也九二剛中説體上无正應而履地之上有履道坦坦幽人貞吉象嗚呼其伊尹耕萃樂道囂囂自命顔子陋巷簞瓢不改其樂之時乎他不足擬也象曰幽人貞吉中不自亂也孔子之傳履九二云云何也言九二幽人貞吉者剛中説體履道出於本心中不自亂耳即孔子之繫可知信非伊尹顔子不足當之六三眇能視跛能履履虎尾咥人凶武人為于大君跛波我反周公之彖履六三云云何也曰三以柔履剛不中不正且逼近乎乾有眇視跛履履虎尾象履而如此凶豈待言故占有咥人凶象而又為武人為于大君象也象曰眇能視不足以有明也跛能履不足以與行也咥人之凶位不當也武人為于大君志剛也孔子之傳履六三云云何也言眇而視終不足有明跛而履終不足與行咥人之凶言其履位不當必且致凶而武人為于大君言如武夫為君志氣剛暴者耳嗚呼武人為君周公孔子雖不言吉凶然始皇項羽豈視履元吉者乎讀者占者亦可識其㫖矣視則宜明履則宜行而眇者終不足有明跛者終不足與行然則其能視能履者亦只是眇者不自知其眇而自謂能視跛者不自知其跛而自謂能履耳世之本无實具而髙自標許徒貽自知不明之羞者皆此類也彖言履虎尾不咥人亨而六三則言履虎尾咥人凶者盖全卦是以悦履剛故得吉而六三則履乎外柔内剛逼近乾剛之位故凶也可見履以當位為吉凡不當位而履者皆自取噬囓耳千古履非其正之戒皆可於此取鑒大君之道取於神武而武人為于大君又同於眇視跛履之凶者君道取於剛柔相濟无取志尚其剛也盖大君而志一尚剛即賢明之君尚有必折之凶况武人徒剛无識者乎故與眇視跛履同一致咥之凶耳唐文皇征遼之師頗類之然則剛非其戒而志剛則履道之至戒也九四履虎尾愬愬終吉愬山革反音色周公之象履九四云云何也盖九四雖以不中不正履九五之剛然以九剛居四柔則濟剛以柔有能戒懼而終得吉之義故象占特取於此六三以柔居剛則必凶九四以剛居柔則終吉可見履道莫凶於志剛然天下一切居上居下待人接物何事不凶於志剛者嗚呼可戒哉象曰愬愬終吉志行也孔子之傳履九四云云何也曰凡爻以位之本情為志六三以陰而居陽位是志於剛者故不足以與行九四以陽而居陰位愬愬戒懼則其志真可有行矣噫其即乾乾朝乾夕惕而在上不驕在下不憂之義乎九五夬履貞厲夬古快反周公之象履九五云云何也言九五以剛中正履帝位下以兑應之凡事必行无所違礙此君道之正也故有夬履貞象然陽剛中正而自信一切阻撓不行則亦自處於乾乾之厲矣故占又有厲象也此亦與贊乾三之厲同象曰夬履貞厲位正當也孔子之傳履九五云云何也言夬履自是九五剛中之正位厲正是其履而當位之道非為過也盖孔子釋周公爻義至此恐人錯認厲字為不美之危詞故特以位正當釋之以明君道自當以剛中直達權不旁撓為正耳上九視履考祥其旋元吉周公之象履上九云云何也言上九履道之終視其履以考其祥時故有視履考祥象處剛履悦當履之終履皆得宜自无致咥人之凶有其旋元吉之義故占亦有其旋元吉象也此一爻可括一卦之義亦可當一部迪吉錄讀聖人之憂患天下後世至矣哉象曰元吉在上大有慶也孔子之傳履上九云云何也言其旋元吉者視履一一合乎規矩自然大有慶耳然亦可知必其旋而後元吉也舎其旋言元吉祥從何至哉觀於其旋元吉可見考祥不在於天之慶而在人之履又可見慶不在大有之日而在視履之時且可見考祥正不必在他人視履之時而在吾身自履之心嗚呼舎履言祥祥何可得舎心言履履於何本乎故君子省身存心之學謹於日用云為之間也泰乾下坤上履而受之以泰何也序卦傳曰履而泰然後安故受之以泰泰者通也泰小往大來吉亨文王之彖泰云云何也曰其在造化天髙地下分位原相懸絶一旦天氣下降地氣上升則是小往大來天地交而泰矣泰則萬物通達其在人事即君尊臣卑體綂原自隔絶一旦君志下交臣志上交即君臣交泰而四海安和時也吉而且亨自不待言故泰之占有吉而且亨之象彖曰泰小往大來吉亨則是天地交而萬物通也上下交而其志同也内陽而外陰内健而外順内君子而外小人君子道長小人道消也長丁丈反否卦同孔子之繫彖泰云云何也曰易藉造化以明人事之書也孔子心企泰和之時夢寐慇切故繫天地交泰之義只一語贊過而其反覆推明盡在君臣交泰之義其實泰就君臣言則必内陽外隂内健外順内君子外小人君子道長小人道消而後成且取義亦卦中自有之義也獨其以陽為君子隂為小人則聖人扶陽抑隂之意固昭然可見矣又天地之泰一嵗一交世道之泰屢世不逢聖人於泰所以津津嘆羡贊美之不置乎顧其語意於君子道長小人道消之意尤若慨乎其有餘慕焉象曰天地交泰后以財成天地之道輔相天地之宜以左右民財裁同相息亮反左音佐右音佑孔子之象泰云云何也曰謂天地交而後成泰王后體此以經綸民物必於天地之生成以供斯民用者或裁成以損其過或輔相以補其不及左右維持務令皆得成就其用以登斯民於泰和如地天之交泰耳然此言王后體泰之意云然其實這泰匪關氣運之適盛也正由朝廷之上君臣同心為斯民裁成輔相令各得所而後世道昌隆天下泰和耳則謂此象為孔子象君子體泰之義即孔子為萬世指成泰之由示保泰之道可也義固在人自取耳觀后以財成輔相以左右民嗚呼王者之於民如保赤子不啻也聖天子入赤心於小民之腹萬姓焉得不輸赤誠於聖主之前乎上下交泰此亦其義初九㧞茅茹以其彚征吉茹人余反彚于位反音胃否卦同周公之象泰初九云云何也曰三陽並進於泰交之時㧞茅連茹以其彚象以此而往吉也可知故占有征吉象象曰㧞茅征吉志在外也孔子之傳泰初九云云何也曰言㧞茅征吉者士在草莽正逢世主下賢亨泰之會故彈冠相慶志在於偕出耳九二包荒用馮河不遐遺朋亡得尚于中行馮音慿周公之象泰九二云云何也曰九二剛中而與五為正應此乃六五之聖主推心委任以成泰亦即九二之大臣竭誠進忠以報聖主者也求之古大臣其惟商之伊尹漢之諸葛忠武乎故象義取於既能包荒又能馮河既能不遐遺又能朋亡以得尚于中行也其不言吉凶者當泰之世五降心以相下二一徳以孚上征吉自不待言惟惕厲或所不免然履中應上亦自尚其中道之行厲又何足道乎故征吉惕厲皆不必言也包荒四者皆大臣之中行而於泰九二必一一數出者盖泰之九二乃王佐之地致泰之由於是乎係必仁智義勇諸德之備優然後世道之太平可幾聖主之付託不負而上下之交孚益固耳故必兼這包荒度量馮河剛勇不遐遺𢎞智朋亡公義乃足滿中行相尚之心也又曰伊尹之行世遠書殘不能盡得然即書與孟子之言亦可得其大畧武侯時近史存尚論其世而細觀其行乃見此爻之德信非此二公不足當之嗚呼寥寥宇宙不知幾千百年中間只此二三人中行二字固可易言歟大臣无包荒之量則不能容物需時无馮河之勇則亦必有遲滯因循之弊无不遐遺之智則不能逺慮兼綜无朋亡之義則亦必有比黨狥私之弊皆非中行之道故九二致泰之大臣一一備之包荒易於遲滯廢弛不遐遺易於朋黨比昵故四德雖以兼盡為中行而尤以相濟相尚而行始中也大臣必有這等中行然後可以乘時致泰然亦必人主推心信任然後得尚於此等中行故泰之九二以遇九五下交之主而後行得自尚也看來泰是君臣相交而成實以君能下交而成志泰者須知之象曰包荒得尚于中行以光大也孔子之傳泰九二云云何也曰言包荒得尚于中行者以君下交于臣如天下交于地之含𢎞光大也九三无平不陂无往不復艱貞无咎勿恤其孚于食有福周公之象泰九三爻義云云何也曰周公其借此爻示以保泰之至戒乎盖九三下乾終而與坤接其在造化則天地相接之際在世道則泰極而否之始故周公特取九三所處之義象之又不拘他卦爻象而區區僅從爻位明象也其言无平不陂无往不復者若曰莫謂泰可常恃如九三即接乎坤四无有平而不陂往而不復者又勿謂泰可常通必於今未艱之日自處艱貞乃得无咎耳又勿以小人於我逢迎慇勤遂信而任之也必勿恤其孚拒之不應然後泰可常保而于食有福耳嗚呼艱貞乃无咎勿恤乃有福聖人之為泰慮者皆泰必至之情理乎觀周公象泰九三爻義可見保泰全以不侈然自恣逺絶小人為至戒象曰无往不復天地際也孔子之傳泰九三爻義云云何也曰周公之爻義本明傳特釋无往不復者若曰所謂无往不復者上天下地相接之際往復必然之理耳其艱貞勿恤固至戒也六四翩翩不富以其鄰不戒以孚周公之象泰六四云云何也曰六四擕三陰順下而交乾此小人之願交逢時大臣也有翩翩不富以其鄰象並有不戒以孚象嗚呼亦畫出小人趨權附勢之情形矣象曰翩翩不富皆失實也不戒以孚中心願也孔子之傳泰六四云云何也曰陰虚陽實翩翩不富言三陰皆失其實常情戒尚不孚不戒以孚乃其中心願也六五帝乙歸妹以祉元吉周公之象泰六五云云何也曰六五居尊為泰主下應九二之剛中是虚中泰交乎臣者也有帝乙歸妹象人君而交臣如此不特人臣之福天下蒼生之祉實是人主之大祉故占又有以祉元吉象象曰以祉元吉中以行願也孔子之傳泰六五云云何也曰言六五之謂以祉元吉者以其出於中心之誠自行其願耳然則下交不出於中心之誠大臣雖欲尚於中行以致泰无由也吁宜戒哉上六城復于隍勿用師自邑告命貞吝復房六反下同周公之象泰上六云云何也曰上六陰柔居泰終浸與否鄰是泰極而君臣上下一切頽唐時也有城復于隍象當是時也綱紀不肅人心不振可用師乎命令已亂雖令不從則亦徒自告於邑耳頒之天下則臣工不實遵黎庶不相信雖正而吝亦不免矣嗚呼當泰之極時即有此象是則人主方自謂其泰而不知否即已伏於此矣可畏哉而周公之繋此爻重重致意其啟告世主之保泰者亦深也坤為地有師象邑象象曰城復于隍其命亂也孔子之傳泰上六云云何也曰所謂城復于隍云云者謂其自恃世泰頽然无振勵精明之意其命已亂耳嗚呼明主固以振勵精明成泰保泰也夫否坤下乾上泰而受之以否何也序卦傳曰物不可以終通故受之以否否之匪人不利君子貞大往小來文王之彖否云云何也曰否天自上而地自下否塞不通之義其在人事則用事者皆匪其人也如是則上下不交君子中行之正道將何施乎故其占為不利君子貞又泰原以小徃大來成而否則正與泰反大往而小來矣此否之所由匪人而不利君子貞乎故文王又取以明否也彖曰否之匪人不利君子貞大往小來則是天地不交而萬物不通也上下不交而天下无邦也内陰而外陽内柔而外剛内小人而外君子小人道長君子道消也孔子之傳否彖云云何也曰言否往來内外盡與泰反故泰上下交而萬物通否上下不交而天下无邦耳嗚呼上下不交則雖有邦而无邦孟子不信仁賢則國空虚之言豈其過哉故休否之道莫要於反否之行行泰之行令君子道長小人道消也象曰天地不交否君子以儉德辟難不可榮以祿辟音避難去聲孔子之象否云云何也曰言天地不交而否以成君子觀否之象自己儉斂其德以辟時之難而不可以祿榮其心而使之動者亦如天地之不交耳盖當否之時而榮祿之心不能已則必不能儉德徳不能儉難寧能辟耶嗚呼荀慈明蔡伯喈可見也不可榮以祿是言君子儉徳自守人不得以祿羈縻非戒君子之詞也而戒即在其中矣初六㧞茅茹以其彚貞吉亨周公之傳否初六云云何也曰初六三陰上行亦有㧞茅茹以其彚象然以陰柔居否初陰柔易邪否世難吉故占即戒以得正則吉貞吉則其道亨也象曰㧞茅征吉志在君也孔子之傳否初九云云何也曰言㧞茅貞吉者謂志在得君行義故變泰初之征言貞也嗚呼否初之所以吉亨者吉亨以貞耳固不似泰初之彚征即吉也六二包承小人吉大人否亨周公之象否六二云云何也曰六二當否之時以陰居柔而上承九五有包承象夫志不相反而但以承順為事此乃小人之吉君子正以守中持志與時同否為其道之亨也故占為小人吉大人否亨此爻之義先儒多解包承小人為君子之吉愚意斷以程朱之言為正盖這是天下无道以道殉身之正義若如以包承小人為君子之吉則元祐之覆轍耳且下君子否亨句亦覺難通象曰大人否亨不亂羣也孔子之傳否六二云云何也曰言大人否而反亨者大人不雜亂小人之羣乃其道之所以亨也六三包羞周公之傳否六三云云何也曰言三當否之世以陰柔處剛位而上與乾接无德无才之小人而切近朝貴否而包羞者耳象曰包羞位不當也孔子之傳否六三云云何也曰言六三之包羞者位不當故耳然則位不當而居其位皆包羞者也六三象傳雖皆不言凶咎然使即无咎凶包羞亦奚可忍九四有命无咎疇離祉周公之象否九四云云何也曰四居陽剛近君之位是以濟否之才而得髙位者也然當方否之時必使動皆出於君命則不至功成取忌在己旣可免咎而同類亦得並進以受福矣故象占如此象曰有命无咎志行也孔子之傳否九四云云何也曰言有君命則可无咎而志乃得行耳嗚呼郭汾陽亦其人也九五休否大人吉其亡其亡繫于苞桑苞與包同古易作包周公之象否九五云云何也曰五以陽剛居天位休否之大人也剛中乾惕以濟否否自可濟有休否大人吉象三陽在上交惕互勵時時以泰之難成否之難濟為懼有其亡其亡繫于苞桑象嗚呼亡乃所以保其存亂乃所以有其治大人有如此之憂勤天下豈有常否不泰之理乎故否之九五為大人吉也象曰大人之吉位正當也孔子之傳否九五云云何也曰言大人之吉者正以其位之剛中得正有剛健乾惕之德故能休否而吉耳上九傾否先否後喜周公之傳否上九云云何也曰言否極則㤗理數之自然陽剛居上傾否之才具故有頃否先否後喜之象也象曰否終則傾何可長也孔子之傳否上九云云何也曰言否終則自宜傾否何可長乎非否之不可長謂人當㤗極則必肆否極則必奮所謂窮變通久之必然未有否而終否者也然亦上九有陽剛之徳故能傾耳若陰柔則聽其城復于隍矣否安得傾乎同人乾上離下否而受之以同人何也序卦傳曰物不可以終否故受之以同人同人于野亨利渉大川利君子貞文王之彖同人云云何也曰言下離六二上應上乾九五故謂之同人六二以一陰同上下五陽而五陽皆欲同二隂有同人于野利渉大川象下離上健二五隂陽皆得其中故占為利君子貞象然曰于野亨利君子貞則知人不可以茍同曰同人利渉大川則知獨力非濟險之道嗚呼于野利貞二語盡人世事人用人交人之理利渉一語盡古今成功建事進德亨屯之理聖言眞如龜鑑千百人皆待照于此千百事舉待决於此師卦等彖亦然故曰智者觀其彖辭則思過半矣彖曰同人柔得位得中而應乎乾曰同人同人曰同人于野亨利渉大川乾行也文明以健中正而應君子正也惟君子為能通天下之志孔子之繫彖同人云云何也曰言同人者六二柔得位而應乎乾曰同人也曰同人于野亨利渉大川者謂五陽皆欲同二乾之志行也曰利君子貞者離文明而乾剛健二五皆中正而志相應是乃君子體同人之道而得其正故惟君子為能通天下之志而同乎人也嗚呼文明以健中正而應乃為同人是同人者周而不比之義也信乎惟君子乃能為之程子曰聖人視億兆之心猶一心者通於理而已文明則能燭理而明大同之理剛健則能克己而盡大同之理惟君子能文明中正故惟君子能通天下之志也噫嘻至哉大學之致知誠意而後能治國平天下其卽此物此志乎象曰天與火同人君子以類族辨物孔子之繫同人大象云云何也曰言天在上而火在下光明普照而相通无間故象取諸同人君子體同人之義以類族之宜辨物之用審異致同如天火之異體而同照也彖取同人于野而象取類族辨物則是同人之道固取其公普而又取其分明亦明矣不然以君子用小人而亦曰吾同人于野也可乎故惟君子有類族辨物見理之明乃能通天下之志乃真為同人于野初九同人于門无咎周公之繫同人初九云云何也曰初九居同人之初本與二比又非正應而與之同有出門即同象如此而同又何咎乎故占有无咎象也象曰出門同人又誰咎也孔子之繫同人初九云云何也曰言出門卽同非有私昵又誰咎乎六二同人于宗吝周公之象同人六二云云何也曰六二與五正應未免有係而同故占有同人于宗之吝象象曰同人于宗吝道也孔子之傳同人六二云云何也曰言同人取于野之公而于宗則有比而同矣比而同人此吝道也然二與五正應而亦有吝道則同人之貴公益明矣九三伏戎于莽升其髙陵三嵗不興莽莫蕩反周公之象同人九三云云何也曰言九三以剛居剛踞二之上欲與二同而非其正應又懼為九五剛中之君所阻有伏戎于莽升其髙陵象處明之終五不可敵有三嵗不興象盖離為甲胄為戈兵故象取伏戎三居二上故象取升髙陵凡象多以一卦三畫取義如三人三百戸之類而卦本同人又有終同之義故象取三嵗不興象曰伏戎于莽敵剛也三嵗不興安行也孔子之傳同人九三云云何也曰言伏戎于莽欲與三同恐九五正應之陽剛見阻而欲敵之耳三嵗不興則又知同之宜正不可憑剛恃氣而安行也九四乘其墉弗克攻吉墉音庸周公之象同人九四云云何也曰九四亦欲同二而居二之上又隔以三故有乘墉象居柔比五旣无憑剛之失又知九五之尊故又有弗克攻象不宜動而安於靜此吉道也故占有吉象象曰乘其墉義弗克也其吉則困而反則也孔子之傳同人九四云云何也曰乘其墉而弗攻者義原弗克也其吉者則困而知自反於正道也嗚呼天下何事不以反則而吉乎九五同人先號咷而後笑大師克相遇號戸羔反咷道刀反旅卦音同周公之象同人九五云云何也曰五與二為正應本可同者也而間以伏莽乘墉之三四有未能即同而終同之義故有先號咷而後笑象又越三四而究與之同有大師克相遇象且乾取剛克故云大師克也象曰同人之先以中直也大師相遇言相克也孔子之傳同人九五云云何也曰言九五剛中與二正應同人之中正誠直者也大師相遇言以此而同終必克三四之間而同之耳上九同人于郊无悔周公之象同人上九云公何也曰言上九亦欲同二而相去懸逺且處陰柔之地有需時待同之義故象取于郊夫同人而于郊雖不即同然伏戍乗墉號咷之咎亦免矣故其占象特取无咎也象曰同人于郊志未得也孔子之傳同人上九云云何也曰言同人于郊雖无大悔志亦豈得乎盖同人必以于野為貴也大有乾下離上同人而受之以大有何也序卦傳曰與人同者物必歸焉故受之以大有大有元亨文王之彖大有以元亨何也曰言六五柔中居位上下五陽皆應又為乾健離明居尊應天有元亨象也彖曰大有柔得尊位大中而上下應之曰大有其德剛健而文明應乎天而時行是以元亨孔子傳大有之象云云何也曰言六五以柔居尊位本自大中而上下五陽應之故曰大有也下乾上離五二相應其德剛健文明應天時行是以元亨耳然則无此德而欲常有其大亦難矣象曰火在天上大有君子以遏惡揚善順天休命孔子傳大有之象云云何也曰言火在天上无所不照所以謂之大有君子則體此以遏絶惡類明揚善人順天大有之美命如火在天上耳盖天命不常故㤗運大有皆上天休命之獨厚乎我者也特厚乎我而无以順之其能保乎然順非聽順之謂亦非敬順之謂善乃天之所以特命而惡乃人之所以違天故天道福善禍淫昭昭不爽盖天心之所注也順之者必深體天心遏絶惡類明揚善人以順其休命而答其厚我之意乃為當也然能如是而大有者常大有矣則是保大者又卽在此順天者乎大有大象遏惡揚善順天休命是言尊貴者大有之道觀於尊位之道如是而卿大夫乘髙履富之道士庶人履豐處盈之道即從可知初九无交害匪咎艱則无咎周公之象大有初九云云何也曰言初九當大有之初上无正應大有之尚无交者也无交則无害而匪過矣故有无交害匪咎象然亦必艱以處之則无咎耳故占又有艱則无咎象嗚呼大有之初即戒以艱則无咎此與師初之即戒以師出以律訟初之即戒以不永所事皆同一愼始之㫖聖人之憂患天下後世亦至矣而其謂无交害匪咎則又示以大有之不可濫交爾大有則願交者多居初尚未廣交又无正應故象取无交害匪咎之義然二聖人於世情經厯亦熟悉洞徹矣象曰大有初九无交害也孔子之傳大有初九云云何也曰言大有初九之所以匪咎者以其尚无交害也九二大車以載有攸往无咎周公之象大有九二云云何也曰言九二當大有之時而居乎乾陽之中乾三陽並進而二居中以行有大車以載有攸往象大車堅固而以此運載世之處大有而能穩重渾堅者也咎何有乎故占為无咎象象曰大車以載積中不敗也孔子之傳大有九二云云何也曰言九二居乾中實之地而與三陽並進此如大車以載之積中旣實而攸往不敗者也嗚呼積中不敗而大有乃可長久矣不然者積不厚而行輒敗今日之大有卽他日之小无也九三公用亨于天子小人弗克周公之象大有九三云云何也曰九三居人之上公侯象以剛處剛中无陰險之私而上應于六五公用亨于天子象然惟君子之剛正則能之若小人陰險履剛則弗克耳此又即其爻而示之以情之必至所以明大有之長享于君子而必墮于小人欲處大有者反身以自審而知戒也夫程註精當之至象曰公用亨于天子小人害也孔子之傳大有九三云云何也曰言公用亨于天子小人弗克者小人大有則生非分之想萌犯上之志作威作福而玉食是享在家必凶於家在國必凶於國寧有利乎然其實是大有之害小人耳嗚呼大有乃上天之休命即小人得之亦以為天休之滋至而不知適所以自貽其患害為小人者亦何苦必求大有乎大有亦費多少經營而適以自害然則小人生平得意之事皆自害之媒也九四匪其彭无咎彭蒲光反音旁周公之象大有九四云云何也曰言九四處大有之時而履柔近五大有之知自戒盈滿而順以承君者也有匪其彭象人臣如此咎斯免矣故占有无咎象也象曰匪其彭无咎明辨晳也孔子之傳大有九四云云何也曰言九四以陽處陰獨能悉所有為君之有而毫釐不以自有是真有過人之識又明又辨又晳者耳嗚呼君之靈社稷之福臣何功之與有乃所以善全其功也有大者何必自有其大六五厥孚交如威如吉周公之象大有六五云云何也曰言六五乃大有之主而居尊處中文明而健之聖君也虚中以有五陽五陽亦顒顒以為其所有柔中則有厥孚之交離中則有烜赫之威有厥孚交如威如象君而如此真善處大有之尊位者也故占又有吉象象曰厥孚交如信以發志也威如之吉易而无備也易以豉反孔子之傳大有九五云云何也曰言厥孚交如者六五之誠信所以發五陽之誠信而上下相交也威如之吉者則大有之時人心易侈易縱亦且易肆若一于柔交則下慢易而无恭畏備上之道矣故又取乎威如也然據周公孔子之繫辭而王者處大有之道其不可執於一偏使恩威有偏勝之失斷可知矣上九自天祐之吉无不利周公之象大有上九云云何也曰上九處大有之終居柔順之地而履六五之上是履信思順尚賢者也如此則自然得天之祐吉无不利矣故象占如此象曰大有上吉自天祐也孔子之傳大有上九云云何也曰言大有之上九吉无不利者為其上得天心天自祐之以吉无不利之福耳劉用相氏曰六五一爻備言六五所以大有之德上九一爻備言上九所以大有之福福徳兼備是為大有六五上九合為一人嗚呼得之矣然亦惟其有六五之德是以有上九之福則卽謂上九之天卽六五自具之天可也即孔子之言仔細尋味上九踞五之上五上惟天居離之頂離照通乾處大有之終而為髙明之至其斯為大有上吉自天祐之者乎然要之天祐大有之上九只為能履信思順尚賢耳故孔子文言所以又於此爻詳釋而備言之有大者欲得天祐亦圖所以履信思順尚賢之道而已謙艮下坤上大有而受之以謙何也序卦傳曰有大者不可以盈故受之以謙謙亨君子有終吉文王之彖謙云云何也曰於物象為山髙地卑而山屈地下於義則内止外順有而不居故占有亨道順以止止而順惟君子能之故占取于君子有終彖曰謙亨天道下濟而光明地道卑而上行天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙謙尊而光卑而不可踰君子之終也上時掌反惡烏路反好呼報反孔子之彖謙云云何也曰言謙卦之取於亨者以謙乃天道下濟而光明地道卑而上行也君子之所以有終者天地鬼神人情无不順謙止盈惟君子為能窮理而見道之明盡性而守謙以誠故其道尊大而光顯自處雖若卑屈而其德自不可加尚謙惟君子能終故惟君子有終也象曰地中有山謙君子以裒多益寡稱物平施裒蒲侯反稱尺証反施始䜴反孔子之象謙云云何也曰地卑山髙地中有山則山不顯髙地不見卑而就於平等故為謙也君子體此裒多如山之崇髙止於地下益寡如地之卑順居於山上損過就中稱物多寡使施得其平也嗚呼王者治天下之道裁成輔相義至𢎞矣而特取義於平其即此㫖乎初六謙謙君子用渉大川吉周公之象謙初六云云何也曰初六以柔止居一卦之下謙而又謙者也有謙謙君子象以此道渉世何所不濟有用渉大川而吉象故象占取之謙以下為本故初三皆稱君子同人无坎澤而象取利渉大川謙卦亦无坎澤而彖取用渉大川象固有以義取者不必盡物也由此以推凡諸卦爻之象有難通者正當以義取之固不必盡執本卦本爻之物象為解亦不必穿鑿附會如互卦錯綜之凌亂繁雜從可知矣盖象以象義之難顯義得而象正在其中也象曰謙謙君子卑以自牧也孔子之傳謙初六云云何也曰言謙謙君子者君子道髙而心下卑以自牧耳六二鳴謙貞吉周公之象謙六二云云何也曰六二處謙之時得止於中謙而實見諸待人接物之間人亦共明其謙者也有鳴謙象以此處世自然得正而吉故占為貞吉象鳴呼周公之吐哺握髮以之象曰鳴謙貞吉中心得也孔子之傳謙六二云云何也曰言鳴謙之貞吉者二居止中中心原自安於謙鳴謙貞吉則中心得遂耳不然偽為於聲音笑貌之間而曰吾謙即謙豈能得正而吉乎九三勞謙君子有終吉周公之象謙九三云云何也曰卦惟九三一陽是九三乃成卦之主有大功於時者也有勞謙象三居止之終處順之下止而能順正君子功而不矜能而不伐者也有君子有終象君子自立如是百祥俱集矣故又有貞吉象象曰勞謙君子萬民服也孔子之傳謙九三云云何也曰言君子能勞而謙則雖不矜其功而天下无與爭功雖不伐其能而天下无與爭能自然德盛禮恭萬民共服所謂謙尊而光卑而不可踰君子之終者其在此乎求之古人大禹之不矜伐顔子之无伐施庶足當之其次則宋之曹彬庶幾焉六四无不利撝謙撝呼囘反與揮同周公之象謙六四云云何也曰言六四由山出地是已居山之上者也居山上則過盈矣而四以陰處柔又為坤體是履盈能撝下者也履盈能下有何不利故象占特取於无不利撝謙耳嗚呼无不利居上之心期也而撝謙則无不利謙亦何負於人而又豈難撝者乎象曰无不利撝謙不違則也孔子之傳謙六四云云何也曰无不利撝謙者謙乃人生立身制行之則也故繫辭九德曰謙以制禮禮正所謂天則耳撝謙則能謙以制禮循為徳柄而不違天則矣安得不尊而光乎尊而光尚何不利之有然亦以六居四體順履止爻内原有不違則義在故孔子特發之也六五不富以其鄰利用侵伐无不利周公之象謙六五云云何也曰六坤中陰虚不富象三陰同體順以止下有以其鄰侵伐象順而止安有不利故又有利用侵伐无不利象六五柔中處順旣曰利用侵伐又曰无不利者固以象中原備此義然亦以過謙而威不振則坤順為頽唐艮止為委靡即非王莽之撝謙亦元成之因循退懦耳但五上二爻皆以利用侵伐行師為謙之利而於五則两言利者此謙道變易從道之介恐執謙者以為不利故言利用又言无不利耳所以然者當履謙順止之時侵伐行師正王者裒多乎盈之道君子之所勞者勞以此萬民之所服者亦正服以此初不同恃衆侵凌邑國之為也易乃變易從道之理不謙者宜變而之謙執謙者又宜知所以善用其謙故於謙卦上五二爻重重申之象曰利用侵伐征不服也孔子之傳謙六五云云何也曰言利用侵伐者非不謙也不服則宜伐旣屬謙道順止之義亦屬謙道裒多益寡之平施也嗚呼孔子之傳利用侵伐亦明矣上六鳴謙利用行師征邑國周公之象謙上六云云何也曰上六居謙之上亦有鳴之之象居順極處止上是順止之得正者也以此彰明較著聲大義以征不服天下其孰敢不順不止者故占又有利用行師征邑國象也象曰鳴謙志未得也可用行師征邑國也孔子之傳謙上六云云何也曰六二之鳴謙貞吉為中心得者以其居中得正而得耳上六之鳴謙志未得者以上踞順之極而下盡安於止故志未得耳盖居髙原以下服為得道故亦以下服為志得也謙六爻非吉即利於艮體言吉坤體言利者止則吉順則利也然要之吉无不利利亦自吉而皆根於一念之謙嗚呼謙之一字其生人善身善世之靈符乎豫坤下震上謙而受之以豫何也序卦傳曰有大而能謙必豫故受之以豫豫利建侯行師文王之彖豫云云何也曰豫上震為動下坤為順是動而順者也又上震為長子而居地之上下坤為師衆而為長子所臨有利建侯行師象故取以為象也然彖即卦明象耳其實順動何事不利乎故孔子於傳特發天地亦如之之㫖明義也彖曰豫剛應而志行順以動豫豫順以動故天地如之而况建侯行師乎天地以順動故日月不過而四時不忒聖人以順動則刑罰清而民服豫之時義大矣哉孔子之傳豫彖云云何也曰豫以九四一陽為羣陰所應是動而上下順從其志得行者也故義取於豫豫旣取於順動即天地尚且如之而弗違况建侯行師豈有不順乎且此順動之道天地固以此日月不過而四時不忒即古之聖人亦以此刑罰清明而人民順服是豫之一字建侯行師而利天地聖人亦无不利豫之時義真大矣哉嗚呼觀文王孔子明豫之㫖可知世之動而不利者皆不順其理耳象曰雷出地奮豫先王以作樂崇德殷薦之上帝以配祖考孔子之象豫云云何也曰言雷出地而奮動則為豫盖始閉欝及奮發則通暢也先王體此故象祖考之德作之聲樂以褒崇其德美而盛薦之上帝以配之如雷之出於地奮也盖作樂崇德薦帝配親則祖德奮揚神人幽明无不和暢是乃王者之和氣協於上下以成豫之大者故於豫象之耳初六鳴豫凶周公之象豫初六云云何也曰初為豫始六居坤下而與四豫主正應陰柔凡材得志而便呌噪讙譁者其常耳凶可立俟也故有鳴豫凶象然於豫初即戒其戒深矣象曰初六鳴豫志窮凶也孔子之傳豫初六云云何也曰言初六之鳴豫凶者先憂後樂猶慮罔終始豫即鳴終將何極如是之人始志已窮極而不可復加凶不待言也六二介于后不終日貞吉周公之象豫六二云云何也曰六二居中處順上无應與有介然特立如石之象如此則清靜寧一自然見幾而作不染鳴豫之凶矣故有不終日貞吉象介于石不終日皆係義象不關卦象亦不關互變錯綜盖二居坤中而特立有安貞如石之義有此定力自然明識獨運見幾即作有不終日象也象曰不終日貞吉以中正也孔子之傳豫六二云云何也曰言六二之不終日貞吉者居中得正又无繫應凡初三嗚盱之病一切无之貞固而吉豈待言乎至其㫖之發揮明透則文言又為盡之學者讀此傳更能細讀文言則可以知讀易之法亦可知解易之法更可得體易用易之道矣介于石不終日大學之定靜安而能慮中庸之誠則自明无非此㫖然要之只是主靜自明耳近來學者往往譏彈主靜嗚呼譏彈主靜則不知主靜矣安知介石之吉乎六三盱豫悔遲有悔盱况于反周公之象豫六三云云何也曰三處順之極將動之交以陰居陽而上比於四有盱而視四之象四由豫者也而盱焉心動於紛華矣可悔之道也故有盱豫悔象然當悔即便速悔庻悔可免但一遲則仍有悔也故又有遲有悔象盖周公繫象至此見得此乃人情之必至遂即據此爻以明教所以憂患後世者如此耳二語皆是即象為占即占亦象三百八十四爻中往往如此象曰盱豫有悔位不當也孔子之傳豫六三云云何也曰盱豫有悔者惟其居位不正中耳九四由豫大有得勿疑朋盍簪簪側林反周公之象豫九四云云何也曰九四一陽為豫主豫之所由成者也有由豫象一陽起於地上羣陰響應是大有得象一陽通孚五陰五陰共應一陽有勿疑象以一陽直貫五陰於一氣暢悦之中有朋盍簪象然曰勿疑則示以處豫之道當推誠布公為當耳所以喜四之豫亦所以教四之豫也象曰由豫大有得志大行也孔子之傳豫九四云云何也曰言由豫大有得者良以豫由四成四能得上下五陰之應而志乃大行耳六五貞疾恒不死周公之象豫六五云云何也曰五以陰柔居尊而豫由四致業已得衆行志當此時也五其能豫悦暢遂乎有貞疾象然得中居正亦尚无凶故又有不死象象曰六五貞疾乘剛也恒不死中未亡也孔子之傳豫六五云云何也曰言六五之貞疾者以其乘九四之剛也恒不死者則以其居中履正而中未亡耳嗚呼六二以中正而吉六五以中未亡而不死則是中之一字固上下貴賤起死囘生之良藥避凶趨吉之坦途也故千古聖賢皆以一中之傳為兢兢耳上六冥豫成有渝无咎渝以朱反周公之象豫上六云云何也曰上六動之終豫之極而以陰柔不正之六居之沉冥於豫者也有冥豫象然㝠雖已成若能變而從正則是窮而知反也亦尚可以无咎故有成有渝无咎象然曰成有渝无咎則是又教以過而能改迷而使悟之道矣天下无窮而不變變而不通之理故否終則傾豫終則渝聖人皆示以變通之㫖象曰㝠豫在上何可長也孔子之象豫上六云云何也曰生于憂患死于安樂人事之必然上六居豫之終視初之鳴豫三之盱豫咎有甚焉故速宜渝變而不可長也昔人云富貴不與驕奢期而驕奢至驕奢不與死亡期而死亡至讀上六之𡨕豫可以憬然悟矣豐川易說卷三
