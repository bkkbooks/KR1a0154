body:
  text: 豐川易説卷七鄠縣王心敬撰下經暌離上兑下家人而受之以暌何也序卦傳曰家道窮必乖故受之以暌暌者乖也暌小事吉暌苦圭反文王之彖暌云云何也曰為卦離火居上兑澤反下火澤乖暌離散之時也人心乖暌大事豈能濟乎則亦僅能吉小事耳葢卦才亦有小事吉義也彖曰暌火動而上澤動而下二女同居其志不同行説而麗乎明柔進而上行得中而應乎剛是以小事吉天地睽而其事同也男女睽而其志通也萬物睽而其事類也睽之時用大矣哉上下俱上聲下同説音悦孔子之傳睽彖云云何也曰言睽為火動而炎上澤動而沉乎下以離之中女與兑之少女同居而志不同行是以謂之暌也然其所以小利貞者卦才兑説而麗乎離明非忿恨昏迷之人六五之柔自家人來離徃居外而當位上行亦非剛愎不情之主而且得中下應九二之剛亦非上下全不相得者故占象又取小事吉也然睽之所以僅小事吉者亦以五以隂之小者居之故曰小事吉耳究而論之天下无睽不合无合非睽天地本睽而化育之事同也男女本暌而倡隨之志同也萬物本睽而羣聚之事類也當其睽時即有合之理至其為用无不合之暌暌之時用自大矣哉但視人之用睽何如哉象曰上火下澤睽君子以同而異孔子之傳睽大象云云何也曰言水火用相資而不同適水資火而爨火資水以烹此其必同者也燥濕異質上下異趣此其本異者也君子體此未嘗不和以處衆與俗為羣然和而不流則同而異在其中羣而不黨則同而異在其中亦如水火之異質而同用也理義本无不同而聖人則先得之故惟聖人善于用睽天地間无事不因異為同亦无事不以同劑異同異異同乃天地間自然之理亦天地間必然之道第自睽者視為睽耳後世學術門户之爭亦然茍一旦明乎異同同異之㫖當必有載鬼遇雨張弧脱矢之吉矣初九悔亡喪馬勿逐自復見惡人无咎喪去聲周公之象睽初九云云何也曰初九地在睽始而以剛居説睽而不見有睽者也不見有睽則不疑不憂而悔自可亡其占象則為喪馬而勿逐自復不妨直見惡人以免咎耳葢初以陽居剛自悦其悦又與四非其正應故有喪馬勿逐見惡人義而與四終以陽剛相合故又有自復无咎之象葢无心以待天下雖始睽必合也况四又明體知人者乎象曰見惡人以辟咎也辟音避孔子之傳睽初九云云何也曰言見惡人者初不以辟為辟咎之道而以見為辟咎之道也嗚呼其孔子見陽貨見南子之義乎九二遇主於巷无咎周公之象睽九二云云何也曰九二悦體得中與五為正應而六五當君之位居離之中有遇主于巷之象所謂明良之合其在此乎復何咎焉故占象取於无咎象曰遇主于巷未失道也孔子之傳睽九二云云何也曰言九二之遇主于巷悦而得中以應離明之主遭逢如此亦未為失道也古之蕭曹鄧馮庻㡬似之六三見輿曳其牛掣其人天且劓无初有終曳以制反掣昌逝反劓魚器反周公之象睽六三云云何也曰六三以隂柔不當之位當睽上下之交本與上應而心疑目眩見若乘輿者牛曳之而上其一牛又掣之而下又其人若天且劓而刑焉者葢兑為毁折而三又以隂柔居之故其象如此然有應在外説而能明初睽終合者也故占為无初有終六三在二四兩陽中輿曳牛掣象與上方暌天劓象象曰見輿曳位不當也无初有終遇剛也孔子之傳睽六三云云何也曰言見輿曳者六三之位處不當也无初有終者于上九之剛初雖睽而終必遇也九四暌孤遇元夫交孚厲無咎周公之象暌九四云云何也曰言九四以剛居四而初非正應大臣而无應則无輔而睽孤矣然以體居離明尚能知初九元夫之德而同氣相孕故初雖非其正應而厲而陽剛相遇終必合志同方而自能无咎耳象曰交孚无咎志行也孔子之傳睽九四云云何也曰言四之交孚无咎者雖以與初非正應而孤終以與初交孚而志行耳葢求同德以相輔乃可行志也六五悔亡厥宗噬膚徃何咎噬市制反周公之象暌六五云云何也曰六五居位得中正所謂柔麗乎中正悦而上行者也與二又屬正應為在巷之遇故其象為厥宗噬膚无暌有合睽而終合徃尚何咎乎故占取无咎象曰厥宗噬膚徃有慶也孔子之傳睽六五云云何也曰言六五之厥宗噬膚无咎者明良遇于一時何睽不合何事不吉自然相悦有慶也上九睽孤見豕負塗載鬼一車先張之􅋃後説之􅋃匪寇婚媾徃遇雨則吉􅋃音胡説吐活反媾古豆反周公之象暌上九云云何也曰上九處睽之終應下不當位之三始甚相暌則亦无輔而孤故其衷疑目眩亦與三同而始則見三之兑若豕之負塗泥中又見三之輿曳牛掣為載鬼一車且見三之若為我㓂讐而先張之弧以射之又見三之為婚媾而説弧不射所謂无見不眩无疑不生也然終以陽剛居明與三之兑説為正應始疑始察如隂陽既合得雨自吉耳葢以三柔而能應説而麗明終有必合之理也然仔細看來下三爻説體原不欲其終睽而上三爻明體故雖睽而終能察情求合總之睽者所值之位若見為睽而合者兩卦之情自有合理也吁合觀大象之同而異六爻之異而同周公孔子之大象小象總以暢𤼵文王之彖辭耳孰謂周公孔子之㫖與文王各自義也象曰遇雨之吉羣疑亡也孔子之傳睽上九云云何也曰言上九遇雨之吉者雨則隂陽合合則羣疑盡解而睽可合也然要之皆頼上九之明能察情知人耳嗚呼明固知人合睽之要義哉蹇艮下坎上睽而受之以蹇何也序卦傳曰乖必有難故受之以蹇蹇者難也蹇利西南不利東北利見大人貞吉蹇紀免反文王之彖蹇云云何也曰為卦艮下坎上為進而遇險足行難進之象故曰蹇也西南水鄉坤位平易容養之地而坎中五之所居故占象取利西南東北山鄉艮位險阻峻巖足所難行故占象取不利東北然其實文王繫彖時固即以所自處者明卦義乎葢東北暗指紂鄉而西南暗指周鄉也又爻九五剛中正位可以濟難之大人而得正獲吉故占象既取利見大人而又取于貞吉則文王殆又即其所自盡者明卦義乎葢文王正險中得正獲吉之大人而收貞吉之用者也獨其立言示象則以為當蹇時以止于西南平易容養之鄉為利以進于東北險阻難行之鄉為不利又必有陽剛中正以居尊位之大人乃可持危守正而得吉葢其示戒明教之義俱于言外令人自得也每讀此卦彖辭反復于心終覺諸儒註疏未安于心故愚見為此顧不知明易君子以為何如也觀觧之利西南為指坎言則知蹇之利西南自以指坎之九五為當又觀彖傳徃得中云云則西南指坎益明且卦乃險止相值何義不可取而明明指鄉為言非心感于身之所處又何為是舍義言方乎惜乎其无從質疑也彖曰蹇難也險在前也見險而能止知矣哉蹇利西南徃得中也不利東北其道窮也利見大人徃有功也當位貞吉以正邦也蹇之時用大矣哉難乃旦反知音智孔子之傳蹇彖云云何也曰言卦取蹇者取難進之義以其坎險即在前也坎險在前而能止非知者能如是乎然孔子釋彖時即下贊嘆之辭則示教之意已寓諸釋彖之中矣其曰蹇利西南者坎水西南之鄉而九五正位居中徃則得中也不利東北者其道多險阻而窮也利見大人徃見陽剛得中之大人則自能定難濟蹇也當位貞吉得九五剛中之君則得君道之正可以正邦而定難濟蹇也蹇雖不可徃而當其可徃亦自得中而有功正邦則蹇之時用亦大矣哉葢孔子當傳彖時亦見得蹇象蹇才非文王不足當故于言下隠隠指文王為言耳象曰山上有水蹇君子以反身修徳孔子之傳蹇大象云云何也曰山上有水葢水由地中行則平依山則險耳君子體此知徃而蒙難不如反身修徳焉葢徳修則身修可以處險亦可以濟險无在非西南耳蹇則難進知止故取反身修徳孟子曰行有不得者皆反求諸已蹇之象義也初六徃蹇來譽周公之象蹇初六云云何也曰初六居止之始上又无應有徃則得蹇而來則得譽象象曰徃蹇來譽宜待也孔子之傳蹇初六云云何也曰言徃蹇來譽者謂險阻方始時自宜待故徃則蹇而來則譽耳來譽有知止與反身修徳在内不然免悔吝凶咎可耳何譽之有六二王臣蹇蹇匪躬之故周公之象蹇六二云云何也曰六二柔順得正尚在險中而與五為正應故有王臣蹇蹇匪躬之故象嗚呼諸葛忠武之鞠躬盡瘁殆其以之象曰王臣蹇蹇終无尤也孔子之傳蹇六二云云何也曰言王臣蹇蹇雖蹇未遽出而人臣之分已盡終何尤乎葢人臣固以自盡為正時數非所知也九三徃蹇來反周公之象蹇九三云云何也曰九三正與上險相值是正徃則蹇而宜來反者也象曰徃蹇來反内喜之也孔子之傳蹇九三云云何也曰言徃蹇來反者險正在外不可前徃反内則喜之也六四徃蹇來連周公之象蹇六四云云何也曰六四正與險主相際前徃則蹇宜來連于三以共濟故象占如此象曰徃蹇來連當位實也當去聲孔子之傳蹇六四云云何也曰言六四之徃蹇來連者濟蹇在剛實九三當位而實四不宜獨徃取蹇而宜來連共濟也九五大蹇朋來周公之象蹇九五云云何也曰九五正在險中而以陽剛居正為上下所恃以共濟是為大蹇朋來象嗚呼下四爻其文王所處大難之地而九五一爻其文王修徳正位師師濟濟之休乎彖之當位貞吉正謂此耳象曰大蹇朋來以中節也孔子之傳蹇九五云云何也曰蹇卦六爻惟二五為濟蹇之主故諸爻皆有徃來之文而二五獨无然二為臣之濟蹇故匪躬者僅可以无尤而五為君之濟蹇其獲朋來之慶者以其剛健中正而適中乎蹇之節也其湯武革命之秋漢祖唐宗舉事豐沛建旗晉陽之日乎上六徃蹇來碩吉利見大人周公之象蹇上六云云何也曰上六已在卦顛徃更何之葢以徃則蹇而能來就九五之碩陽以濟此蹇難則吉又占為利見大人也象曰徃蹇來碩志在内也利見大人以從貴也孔子之傳蹇上六云云何也曰言上六之徃蹇來碩者志在内而就九五之陽剛也利見大人者處蹇以從九五尊貴之大人為利也或疑來碩為指九三于志在内為似然五亦在上之内且爻皆以九五得中有功正邦則碩指九五朱註自不可易耳解坎下震上蹇而受之以解何也序卦傳曰物不可以終蹇故受之以解解利西南无所徃其來復吉有攸徃夙吉解音蠏彖傳大象同坊本胡買反文王之彖解云云何也曰解為雷動在上坎險在下其占象則亦為利乎西南寛平容養之鄉葢蹇之初解不宜煩苛嚴急而宜寛大容養也又為无所徃其來復吉有攸徃夙吉葢當解之時而論其卦才卦徳其无所徃而來復也固吉即有攸徃亦自夙吉也細觀卦義彖辭大抵亦是文王自寓出蹇逄解之㫖故彖辭反復形之彖曰解險以動動而免乎險解利西南往得衆也其來復吉乃得中也有攸徃夙吉徃有功也天地解而雷雨作雷雨作而百果草木皆甲坼解之時大矣哉孔子之傳解彖云云何也曰言解之所以為解者以卦坎下震上是為險而能動動而免險故為解也利西南者西南坤鄉可以容養萬物而得衆也其來復吉者謂九二得中其來復固吉也有攸徃夙吉者謂由此而徃亦有功而早吉也天地云云者則傳彖時又見得天地以隂陽解而雷雨作雷雨作而百果草木皆甲坼以𤼵生解之時固大矣哉故解之彖辭利而且吉吉而又利也而孔子傳彖時亦若深幸文王之出蹇成解故于彖義一一致欣幸之思乎象曰雷雨作解君子以赦過宥罪孔子之傳解象云云何也曰言雷雨作而成解天地所以解散屯結之氣𤼵生萬物者也君子體此以好生為心于小過則赦而釋之于大罪則宥而寛之以宣萬民沉鬰寃抑之氣如雷雨之作而成解也觀解之取于雷雨作而解萬物可知人心疑而獲解結而獲解與人世之寃而獲解忿而獲解俱有雷雨作解之用孰謂人心不可與天同運初六无咎周公之象解初六云云何也曰謂初六居解之始上有四應何咎之有故象如此象曰剛柔之際義无咎也孔子之傳解初六云云何也曰言初六之无咎者以隂居初上應四陽剛柔相接可以解蹇自于義无咎也九二田獲三狐得黄矢貞吉周公之象解九二云云何也曰九二以陽剛居中為坎主于鄉為東南于徳為得中于徃為有功有田獲三狐並得黄矢貞吉之象葢坎為狐居二為中黄者中色而二以一陽横亘其中為得黄矢而其義則以九二得中故徃而得衆有功可以正邦耳葢其卦成解之機闗于四而能解之徳則由乎二也陽剛得中之徳固无徃而不可哉象曰九二貞吉得中道也孔子之傳解九二云云何也曰言九二之所以貞吉者以其得中道也道而得中何徃不正何徃不吉六三負且乘致寇至貞吝乘如字又石證反周公之象解六三云云何也曰六三當解之時居下卦之上乘坎戴震而處之以隂柔如小人本負販之侣而居乘軒之位貪鄙无行使人生脅奪之心雖自以為我得宦途之正而不知其可羞可吝莫甚于是也故象占如此象曰負且乘亦可醜也自我致戎又誰咎也戎古本作寇孔子之傳解六三云云何也曰言六三之負且乘雖自以為正亦可醜也其寇至乃自我致戎又可咎人乎觀自我致戎則知爻辭完字不宜作寇盗之寇解而以上下生脅奪之患解為當然觀慢藏誨盗即寇盗之寇自在其中矣九四解而拇朋至斯孚解佳買反象同拇茂后反周公之象解九四云云何也曰九四當解之時居動之始與初皆不正而相應故解以必解其拇然後朋至斯合而孚葢九四以剛居柔應又不正故戒以必解小人然後得孚君子也象曰解而拇未當位也孔子之傳解六四云云何也曰言六四必解而拇者以其以陽居隂應又不正處位不當也六五君子維有解吉有孚于小人解音蠏坊本佳買反象同周公之象解六五云云何也曰六五以隂居位下之諸爻信之以動君子小人交相來前之時也于君子則當維而不可解然非解小人則間離君子者必至矣故欲維君子又以能解小人為吉然非信能退小人則亦何以為能維君子之騐乎故又示象于有孚小人耳嗚呼聖人之為維君子慮亦深切矣象曰君子有解小人退也孔子之傳解六五云云何也曰于維君子而有解者謂其宜退小人而使小人退也不然則君子之維不固矣上六公用射隼于高墉之上獲之无不利射食亦反隼茍尹反周公之象解上六云云何也曰上六居解之終處動之極而與負乘之六三應其為解也必用法以制之使之不得自漏其奸如公用射隼于高墉之上獲之无有不利乃可耳嗚呼乘高位而以正法制小人何慮小人之不獲據正法以去奸邪又何慮徃之不利乎象之占以无不利宜矣上六居卦之上高墉象象曰公用射隼以解悖也解佳買反孔子之傳解上六云云何也曰言公用射隼所以解悖亂之人正王法以去之耳觀解之以解悖終則知解道以退小人為解之正義亦以能解小人為善用其解損兑下艮上解而受之以損何也序卦傳曰解必有所失故受之以損損有孚元吉无咎可貞利有攸徃曷之用二簋可用享簋音軌坊本音癸文王之彖損云云何也曰損者減省也為卦損乾之九三益坤之上六故為損也當損之時若能實信得是天道人事當損之時而有孚其于入世則損己裕人于修徳則損過就中自是大吉之道可以免過而无咎可以守正而可貞可以時宜而利有攸徃故道莫善于損也是故言其當損而損之用雖二簋之薄无不可以薦王公而羞鬼神但在有孚耳故損取有孚為吉利可貞利徃之道也凡有所損皆為有益而既益則實未嘗損故彖傳偹言損之美善享禮八簋為盛故以二簋為損之用彖曰損損下益上其道上行損而有孚元吉无咎可貞利有攸徃曷之用二簋可用享二簋應有時損剛益柔有時損益盈虗與時偕行上行之上時掌反孔子之傳損彖云去何也曰言損者為其損下之兑益上之艮其道上行也而所謂損而有孚元吉无咎可貞利有攸徃曷之用二簋可用享者當其時之可損則二簋不為薄當其時之宜損則損剛益柔不為損誠以損盈而益虗固與時偕行之道也嗚呼人事之損益益虗固屬順理之時而亦實天地鬼神之所共許立身渉世者无視損為損而不為也損于象為損下益上而在上用之則為損欲益徳于象為損剛益柔而在上用之則為損貪益亷悖入悖出弗損而實損之驗也散財𤼵身能損而非損之証也故善用益者以損為益不善用益者欲益反損也唐陸宣公奏議中深得此義可取以証此彖耳象曰山下有澤損君子以懲忿窒欲懲直井反坊本時征反孔子之傳損象云云何也曰言山下有澤山高澤深是損澤以益山也故謂之損君子體此知尊徳莫善于損過于忿則懲之使平如摧山于慾則窒之使止如塞竇亦如山下有澤也觀大象可見損只是減擔法觀君子體損之象以懲忿窒欲可悟養心之道養徳之道更可悟養生之道又可悟處處損則處處益時時損則時時益事事損則事事益念念損則念念益損固非損人事也故君子莫善用損初九已事遄徃无咎酌損之已音以遄市専反周公之象損初九云云何也曰初九當損下之時上應六四輟所為而速徃以益之則无咎然損下益上亦當斟酌其淺深故象占如此酌損者謂損下太過不量淺深始而下損不可以自立究且損上而終不得益故酌損二字所以教損下者亦以教受損者象曰已事遄徃尚合志也孔子之傳損初九云云何也曰言初之已事遄徃者初與四為正應四以望初之益已為志而初始此以尚合其志也九二利貞征凶弗損益之周公之象損九二云云何也曰九二以剛履柔是為志在自守而不肯妄損以益上之人故雖與五為應而以得正為利以徃益為凶以弗損下為益上之道故象占如此程子曰世之愚者有雖无邪心而惟知竭力順上為忠者葢不知弗損益之之義也至哉言乎象曰九二利貞中以為志也孔子之傳損九二云云何也曰言九二利貞也謂其位得中故其義以守中為志而不為損下益上之為使己既居于剥下奉上之損而上亦不得撙己裕下之益也嗚呼人臣守中固益上之正道哉六三三人行則損一人一人行則得其友周公之象損六三云云何也曰六三正所謂損下益上損剛益柔之爻故但取損象謂如三人行則損一人一人行則得其友也葢此爻原是三陽損一以益上而此一陽爻又徃上而成應故其象占如此而觀此爻者亦可知致一之為貴占此爻者又可知致一之乃得耳故夫子又于繫辭盡其義也象曰一人行三則疑也孔子之傳損六三云云何也曰言一人行則専而可得友三人行則疑而必損一人葢古今之人情大抵皆然也六四損其疾使遄有喜无咎周公之象損六四云云何也曰言六四隂柔當位又居止體而與遄徃之初相應是不肯過受損下益上之益而能損其貪欲之病者也如此則必使已事遄徃之初有喜而即已亦无過于損下之咎耳嗚呼為上者一能損其疾而人已皆得如此不肯用損何為哉象曰損其疾亦可喜也孔子之傳損六四云云何也曰言六四損其疾在初自是可喜之事而在己无咎亦正是可喜之事耳六五或益之十朋之龜弗克違元吉周公之象損六五云云何也曰六五當損時而居中履柔又為止體以應二弗損之益是損滿下賢而集忠廣益者也人君而能此羣策効力不眩不惑天下无難决之事而知臨見大君之宜矣故象取或益十朋之龜弗克違而占取于元吉耳龜决是非吉凶之物益之十朋之龜是喻在下之賢莫不損己自盡以益之之義葢人君虗己受善其自損而實益之道有如此象曰六五元吉自上祐也孔子之傳損六五云云何也曰言六五之得元吉者以其能損己受益是能得人之助矣安得不得天之助乎自上祐之所必然耳損至上而吉天道虧盈而益謙也故一卦之吉大于六五一爻而又皆備于上九一爻上九弗損益之无咎貞吉利有攸徃得臣无家周公之象損上九云云何也曰上九處損之終居止之極而下應六三是不以損下為益者也故其象為弗損益之葢以弗損為益于益民則為惠而不費于益君則為以財𤼵身損而如此咎尚何有得正而吉行无不利得臣无家一舉而四善備于此矣彖之所謂有孚元吉无咎可貞而利有攸徃者葢即指此爻耳故損以損為益也㸔來下卦悦體故以損下益上為義然亦取于酌損弗損者悦之以道也上卦止體宜以受下之益為義而又取于損疾弗損者不過損其下以自益正居上所宜止之道亦正上所自益之道也不然則天道忌盈人心惡貪莫益之或擊之欲益而自損且多矣故損卦以損為益以不損下為益上葢天道人事之自然也象曰弗損益之大得志也孔子之傳損上九云云何也曰言弗損益之者弗損下正所以益上而大得其志耳嗚呼六經四子中言薄歛厚下之道固皆此㫖乎為人上者尚其念諸益震下㢲上損而受之以益何也序卦傳曰損而不已必益故受之以益益利有攸徃利渉大川文王之彖益云云何也曰言益之為卦損乾之四陽益坤之初柔是乃損上益下之道故占象為利有攸徃又益之道可以濟險渉難故占象為利渉大川觀利渉大川指㢲木上動言而又不必指乾指坎可見象義固自不可為典要惟變所適也彖曰益損上益下民説无疆自上下下其道大光利有攸徃中正有慶利渉大川木道乃行益動而㢲日進无疆天施地生其益无方凡益之道與時偕行上下之下去聲施始䜴反孔子之傳益彖云云何也曰言益之為義謂王者能損上益下則民説无疆民説即上之益也自上而施惠以益下于為上之道乃為大光道光即上之益也利有攸徃則言二五中正相應而天下受慶有慶即上之益也至若利渉大川則取于上卦之㢲木上動而益下之利于渉險抑又可知利于渉險則无徃不利其為上之益則又不待言也乃孔子傳彖時則又見益之為道下動上㢲日進无疆不特于人事為悦民利徃之咸得即天地亦且以施為施生之无方凡為人君者所當與時偕行而不可不實行之耳葢孔子又極推益之卦義卦才而以益下望為上者也象曰風雷益君子以見善則遷有過則改孔子之傳益象云云何也曰言風烈則雷迅雷激則風怒風雷二物原相附益也君子體此以求己之益但見為善則遷不善以就善而善日以益但見有過即便速改而弗憚於改即過改而益復无過亦如風雷之相益也初九利用為大作元吉无咎周公之象益初九云云何也曰初九當益之時以陽剛雷動之資而得六四㢲入之應是用大作而无不利者也故占象為利用大作元吉无咎象曰元吉无咎下不厚事也孔子之傳葢初九云云何也曰言下本不當任厚事而初以得六四之任用不如是不足以塞責也按此雖本註意為説而終覺心未曉暢當俟知者問之六二或益之十朋之龜弗克違永貞吉王用享于帝吉周公之象益六二云云何也曰六二處中正而履柔順有虗中順從義而與九五有孚惠心惠徳之主相應故有或益之十朋之龜弗克違象而占象復為永貞之吉葢居中而應又中自然吉可長得正耳又以二之虗中而應五之孚衷亦有王用享于帝吉義也然觀損之六五為益之以十朋之龜弗克違而益之六二又為益之十朋之龜弗克違則知損益二卦以相反而成益之二固損之五而凡卦中一切外來之云大約以取于前後卦反對之徃來為正又其中亦尚有自乾坤來者葢乾坤大父母固一切剛柔之變所從來也若曰訟自遯而漸歸妹恐有可疑者象曰或益之自外來也孔子之傳益六二云云何也曰言或益之者理必得益自然益從外來亦莫知其然而然也六三益之用凶事无咎有孚中行告公用圭周公之象益六三云云何也曰六三處益之時隂柔不中而上應上九之剛剛必陵弱是為益之用凶事象然艱難成徳殷憂啟聖警戒震動自是増益不能之機亦正无咎也又卦三四皆居中處柔為有孚于中行如告公用圭之誠欵故雖外來之凶不免而自得中行之无咎耳象曰益用凶事固有之也孔子之傳益六三云云何也曰益而用凶事以為益者葢必如是而後動心忍性所以増益不能者乃固有之也六四中行告公從利用為依遷國周公之象益六四云云何也曰六四㢲主處柔而與三在卦中有中行象又與震初利建之侯為正應故占象為告公見從而利用為依遷國也象曰告公從以益志也孔子之傳益六四云云何也曰告公從者告之以益下之志而從乃所以益其志也九五有孚惠心勿問元吉有孚恵我徳周公之象益九五云云何也曰九五以㢲體居中得正又與永貞享帝之六二為正應是乃為天下得人以𤼵政施仁者也為有孚恵心象君而若此不問而可知其吉故占以元吉斷之且上既有信以惠于下則下亦必有信以惠于上故占象又為有孚惠我徳也葢上以實心實徳惠于下則下亦必以誠心誠意惠其上乃自然之理耳象曰有孚惠心勿問之矣惠我徳大得志也孔子之傳益九五云云何也曰言有孚惠心尚何待問而知其元吉乎至於惠我徳則上益下而下並益其上益下之志乃大得耳嗚呼居九五之位者一孚惠心既得勿問之元吉而又有惠我徳大得志之秋則益下又豈徒下之益也哉上九莫益之或擊之立心勿恒凶周公之象益上九云云何也曰上九以陽剛居益之極剛不當位求益反損有立心勿恒之凶故象占如此然其實剛暴擊下求益之人立心豈得有恒又必得以剛取擊之報所行豈能終利凶原即在此恃剛擊下之中也吁周公之示戒亦深哉象曰莫益之偏辭也或擊之自外來也孔子之傳益上九云云何也曰言莫益之者猶從其求益之偏辭而言也若究而言之則又必有擊之者自外來也嗚呼桀之暴刻湯來擊之紂之殘賊武王來擊之至于秦之暴虐且有陳勝呉廣來而擊之矣故或擊之自外者真不知其所自來耳可戒哉夬乾下兑上益而受之以夬何也序卦傳曰益而不已必夬故受之以夬夬決也夬揚于王庭孚號有厲告自邑不利即戎利有攸徃夬古快反號户羔反卦内並同文王之彖夬云云何也曰夬之為卦上兑下乾為五陽決一柔也然其決之也必正明其罪而盡誠以呼號其衆相與合力且有危厲不可安肆又止宜治其私邑而不可專尚威武則利有所徃也葢諸義皆本卦中自具而皆為戒辭以象之所以明剛決之亦自有道耳易教寡過豈不信然彖曰夬決也剛決柔也健而説決而和揚于王庭柔乘五剛也孚號有厲其危乃光也告自邑不利即戎所尚乃窮也利有攸徃剛長乃終也説音悦長丁丈反孔子之傳夬彖云云何也曰言夬者取其決之義也謂其以五剛決一柔也而卦徳則為健而説決而和耳其曰揚于王庭者柔乘五剛之上也孚號有厲者謂必危厲乃光也告自邑不利即戎謂太尚剛決則必窮也利有攸徃者剛再一長則隂終而消也象曰澤上于天夬君子以施禄及下居徳則忌上時掌反施始豉反孔子之傳夬象云云何也曰言為卦兑上乾下是為澤上于天也澤上于天未有不決以下流者故于象為夬君子體此以之施禄則普及于下如澤之自天而下以之居徳則忌居其上不敢如澤之上于天也吁觀吾夫子于夬之象法戒兼設可見聖人之于易真神而明之又可見聖人之于世真提携心切也不曰澤在天上而曰澤上于天則亦似有貪天為功之象又兑口喜揚而居五陽之上則亦似有居徳之忌之象不知明易君子以為何如也初九壯于前趾徃不勝為咎周公之象夬初九云云何也曰初九以剛居最下是壯于趾者用壯如此徃而不勝亦已明矣咎豈能免乎故象占如此象曰不勝而徃咎也孔子之傳夬初九云云何也曰言徃而能勝尚恐有咎不勝而徃咎何辭也九二惕號莫夜有戎勿恤莫音暮周公之象夬九二云云何也曰九二雖當夬之時而以剛處柔為得中道故能憂惕號呼以自戒備壯而知戒雖莫夜有戎亦可勿恤矣葢有備固无患之道也象曰有戎勿恤得中道也孔子之傳夬九二云云何也曰言雖有戎亦勿恤者以九二剛而得中知所戒也九三壯于頄有凶君子夬夬獨行遇雨若濡有愠无咎頄求龜反周公之象夬九三云云何也曰九三以剛居剛又下下卦之上壯于頄者也壯而如此視壯于趾者更甚矣必然致凶无疑然諸陽獨三與上六相應則亦有君子夬夬以決小人之義故其象雖為係私愛而與上應如獨行遇雨至于若濡而為君子所愠然小人終必決去則亦尚无大過也故象占如此朱註為温嶠之于王敦自為得之大抵剛決太過于諸事不宜以之決去小人則尚无咎象曰君子夬夬終无咎也孔子之傳夬九三云云何也曰言君子之夬夬雖過于壯然終能決去小人則亦終无咎也九四臀无膚其行次且牽羊悔亡聞言不信臀徒敦反次七私反且七余反姤卦同周公之象夬九四云云何也曰九四以陽居隂當決之時而所處如此如人臀之无膚而其行次且亦取悔之道矣然以牽率下之三陽連累不決則悔亦尚可亡也又其處隂遠上若不明於聼言而似于當決反退餒者然故象占如此象曰其行次且位不當也聞言不信聰不明也孔子之傳夬九四云云何也曰言其行次且者其居位之不當也聞言不信者无聼言之聰明也九五莧陸夬夬中行无咎莧閑辨反又胡練反周公之象夬九五云云何也曰九五以剛中履位而上決一隂如莧陸之夬夬至不難也然五為君位亦必得中而行乃无咎耳象曰中行无咎中未光也孔子之傳夬九五云云何也曰言中行无咎者以人君之尊去小人不能銷去于未萌之始而至使其揚于王庭而後決之則亦僅免咎耳其于人君之中道豈能大光乎葢又惜其決之不早也上六无號終有凶周公之象夬上六云云何也曰上六獨以隂柔居上雖以居兑口能號而更无同類可號故雖暫存一時而終為陽決耳凶可立俟也故象如此象曰无號之凶終不可長也孔子之傳夬上六云云何也曰言无號之凶者謂陽再一決則終于必亡不可長也嗚呼隂柔小人亦何為自取凶終哉姤㢲下乾上夬而受之以姤何也序卦傳曰夬必有所遇故受之以姤姤者遇也姤女壯勿用取女姤古后反取七喻反文王之象姤云云何也曰為卦一隂始生于下而遇陽如本非所望而卒然值之者然故為姤姤屬一隂始生非女壯而曰女壯此為上行剥陽之女故為女壯而占象戒以勿用取女也嗚呼其在文王以前則妺喜妲己方至之始在文王之後則賈氏武氏入宫之初乎然曰勿用取則文王已於方遇之隂申之以戒如周公象坤之初六履霜即戒以堅氷也聖人之防隂亦至矣彖曰姤遇也柔遇剛也勿用取女不可與長也天地相遇品物咸章也剛遇中正天下大行也姤之時義大矣哉孔子之傳姤彖云云何也曰言姤者遇也謂㢲初之柔遇五剛也勿用取女者謂方進之隂將長而未已其勢不至遯否觀剥不止以如此之女而用以自取是自取牝雞之鳴耳必不可與其長也至天地云云則傳彖時又見得卦體九五中有可推可取之時義而極賛之耳葢謂姤是天地相遇而推原其相遇之時則有品物咸章而𤼵育流行之義九五乃剛遇中正而推原其剛遇中正之時則有天下大行而乾徳上治之義姤之時義正自大矣哉故以之取女則宜知勿用之義而以之大行則又宜知謹㡬之義耳象曰天下有風姤后以施命誥四方孔子之傳姤大象云云何也曰姤乾上㢲下是天下有大風也王后體此以乾為施以㢲為命以之告戒四方如風行乎天之下也初六繫于金柅貞吉有攸徃見凶羸豕孚蹢躅柅乃李反又女紀反周公之象姤初六云云何也曰初六為㢲主而上行正所謂女之壯者也能止之以固則得正而吉若有攸徃則漸不可長不至剥坤不止即見凶耳葢初為㢲入而卑伏于下有羸豕孚蹢躅象故象占如此嗚呼姤始即繫之以貞其即遯彖小利貞之㫖乎以木指物為之柅卦體純乾金象而隂忽滯其底㢲又為繩繫象孤隂上附若繫故初六取象繫于金柅也上進之隂勢不可長徃而不已則消陽无已不特為陽之凶即隂亦不得中吉故象又取此象曰繫于金柅柔道牽也孔子之傳姤初九云云何也曰言繫于金柅者以隂柔方進貴于牽止也九二包有魚无咎不利賔周公之象姤九二云云何也曰九二陽剛而與初隂相比畜制之固則无咎若不能畜制反奉為賔而進之則是令其自得朋耳將女禍生矣故占象又取于不利賔葢魚隂物易制而賔愈進則衆故為九二近初之陽申戒象曰包有魚義不及賔也孔子之傳姤九二云云何也曰言包有魚者二之視初宜如包之畜魚義不可使隂柔小人之得朋日衆也九三臀无膚其行次且厲无大咎周公之象姤九三云云何也曰九三過剛不中下不遇于初上无應于上居則不安行則不進故亦取臀无膚其行次且象然既无所遇則亦自不為隂柔所繫故雖厲而无大咎也姤夬反對姤之三即夬之四而象正同可知反對之爻自有來往相通之義不獨損之六二與益之六五也若逺取他卦則恐渉凌亂耳象曰其行次且行未牽也孔子之傳姤九三云云何也曰九三雖其行次且然亦尚非初應不為柔所牽繫也九四包无魚起凶周公之象姤九四云云何也曰九四初應應而初已見包于二是為包无魚象居上而无民動成凶矣故占象為凶象曰无魚之凶逺民也逺元萬反孔子之傳姤九四云云何也曰无魚之凶者四居近君之位而遠民以自失其民自是凶道耳葢民之不可遠也如是夫為大臣者尚其鍳諸九五以杞包瓜含章有隕自天周公之象姤九五云云何也曰九五居乾之中陽剛中正不與剛中之九二同徳相遇而二已包瓜得民是九五遇二高大堅實之杞以包初六隂柔之瓜正所謂剛遇中正而大行者乎又五下覆乎初體乾履㢲是為施命誥四方之后亦有舍風動之文章自天下行之義故象又取此也象曰九五含章中正也有隕自天志不舍命也舍音捨孔子之傳姤九五云云何也曰言九五之含章原具大中至正可以風動四方之徳而不忘命誥動民之志故為有隕自天也乾為天九五天位自上而下為隕自天命指初謂誥命上九姤其角吝无咎周公之象姤上九云云何也曰上九處姤之終居姤之上又无正應是為姤角姤而以角亦可羞矣然此乃自懐狐疑識不知人自取之罪于誰而咎乎故象占如此尢咎似解以无可咎義為當故傳専以窮吝釋之象曰姤其角上窮吝也孔子之傳姤上九云云何也曰上九取于姤角之象者為其以剛居上過剛而道窮故羞吝也嗚呼姤之上九其亦乾之上九乎陽剛可過亢耶豐川易説卷七
