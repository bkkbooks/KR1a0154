body:
  text: 豐川易説卷二鄠縣王心敬撰上經屯震下坎上坤而受之以屯何也序卦傳曰有天地然後萬物生焉盈天地之間者惟萬物故受之以屯屯者盈也物之始生也屯元亨利貞勿用有攸往利建侯屯張倫反文王之彖屯云云何也震以一陽動於坎下不以坎險而止故占有元亨利貞象初陽在下坎險在上有難進象故占為勿用攸往乾陽初交是生長男而在羣隂之下主器者莫若長子有建侯象故占為利建侯也然曰元亨利貞則贊屯殊深曰勿用攸往則戒屯殊深曰利建侯則鼓屯之意亦深矣蓋草昧艱難人情易成易敗之秋亦人情難進難退之候故聖人於屯諄諄教誘也彖曰屯剛柔始交而難生動乎險中大亨貞雷雨之動滿盈天造草昧宜建侯而不寧難去聲孔子之傳屯彖云云何也曰乾一索于坤而得震即上遇坎險是動乎坎險之中有大通安貞之道也下震雷上坎雲二氣震動蓊鬱雜亂晦㝠百物于此勾萌其在人事即天造草率㝠昧之時利于建侯以經營締造而不遑寧處也動乎險中大亨貞可知在險而不能動心忍性増益不能咎不能免宜建侯而不寧可知濟屯而不能憂勤惕厲屯不能濟象曰雲雷屯君子以經綸孔子之傳屯大象云云何也曰言君子觀雲雷屯之象用以經綸天下之事而濟屯也蓋天地以雲雷作而生萬物英主以經綸運而開太平亦猶行天之道爾經綸于屯時以濟屯必有雷動雲合使天下鼓舞奮勵之意乃可故君子之經綸即取象于雲雷然則單寒而欲自樹于人倫初機而欲自底于清寧無貴齷齪委細因循怠惰從可知也初九磐桓利居貞利建侯磐歩干反周公之象屯初九云云何也曰初陽居屯之下有磐桓安固象故占取利居貞震長男侯象動乎坎中利建侯以濟屯象蓋欲濟屯而不居貞則將失義欲濟屯而無其人屯終莫濟耳象曰雖磐桓志行正也以貴下賤大得民也下遐嫁反孔子之傳屯初九云云何也謂其雖磐桓而其志在欲行其正非懐安也陽貴隂賤初九以陽下隂如以剛明之才不辭以身為小民經營教養不惜以貴屈下賢哲自然大得乎民心其于建侯寧不利乎孟子謂得天下在好民之好聚民之欲即此意也六二屯如邅如乘馬班如匪寇婚媾女子貞不字十年乃字邅張連反乘繩澄反又音繩周公之象屯六二云云何也曰以六居二乘下之動而當屯時有屯如邅如乘馬班如象二與五為正應而下逼于初不能即應然正應不與寇同時久終須應之故又有匪寇婚媾女子貞不字十年乃字象也然亦可見守正者終無不合之事德不孤必有鄰亦可自信矣乘馬但言乘動濟屯之義非謂六二下與初連以乘初之剛為乘馬蓋象傳以六二之難為乘剛是乃統釋爻辭非是專釋乘馬二字之義若以二之乘馬為乘初剛四乗三之乘馬難通矣象曰六二之難乘剛也十年乃字反常也孔子之傳屯六二云云何也曰言六二欲上行應五而難進者以其下乘初九之剛也故雖與五剛柔相應且反常至十年之久耳六三即鹿无虞惟入于林中君子幾不如舍往吝幾音機舍音捨周公之象屯六三云云何也言六三本非剛明之才兼上無賢明之應而居剛志躁亦欲動而濟屯徒自入于險難耳有即鹿无虞入林之象見幾之君子當此可以舍矣不然憑剛而往吝窮不免故占又有君子幾不如舍之象也象曰即鹿无虞以從禽也君子舍之往吝窮也孔子之傳屯六三云云何也言三本無濟屯之才又無濟屯之應而乘時妄動是從禽之欲耳不知濟屯非從禽比往則必窮見幾之君子自必舍之往則未有不吝窮也嗚呼亞父之事亦可鑒矣周公孔子繫爻繫傳皆于無才無援而妄動之戒甚明甚警六四乘馬班如求婚媾往吉无不利周公之象屯六四云云何也曰六四以隂居柔而當屯乘震亦有乘馬班如象與初利見之主為正應又有求婚媾象故占為往吉无不利也象曰求而往明也孔子之傳屯六四云云何也曰此正明四之當屯而知擇利見之初乃其明于擇主也嗚呼馬伏波其人乎而周公孔子之示濟屯者以擇主為要其義亦明矣九五屯其膏小貞吉大貞凶周公之象屯九五云云何也曰五雖陽剛當位而在坎中下應又懦小貞則吉大貞則凶之象也坎為水膏澤象象曰屯其膏施未光也孔子之傳屯九五云云何也曰五在險中施未能普豈能光乎然亦九五自居坎中囿于施耳其占則施之未得光為昭烈未知光為項羽而施光則武王之大賚四海善人是富繫曰憂悔吝者存乎介善用易者亦于此中變遷之機圖之而已上六乘馬班如泣血漣如周公之象屯上六云云何也曰上六居屯乘震亦有乘馬班如象而以隂柔居屯之終下無正應是處屯之極地無才無助終于屯而無可如何者悲傷涕洟有泣血漣如象也嗚呼項羽烏江之歎泣亦其事耳象曰泣血漣如何可長也孔子之傳屯上六云云何也曰言屯極而至于如此豈能長乎然何可長固以釋泣血之義其實上六窮于屯地更無所之亦有不長之象也大抵易道變化不特周公有時就義取象即孔子傳象亦時于爻象中自取一義也蒙坎下艮上屯而受之以蒙何也序卦傳曰屯者物之始生也物生必蒙故受之以蒙蒙者蒙也物之穉也蒙亨匪我求童蒙童蒙求我初筮告再三瀆瀆則不告利貞告音谷瀆音獨文王之彖蒙云云何也曰蒙坎險在下遇艮止在上險而止有蒙象也九二居中發蒙剛中而應正有亨道也九二為養蒙之主而六五以柔中應之有童蒙求我匪我求童蒙之象也發蒙之道取其人之以誠心求我不取其人之以機變相嘗故又有初筮告再三瀆瀆則不告而利于貞之象占也彖曰蒙山下有險險而止蒙蒙亨以亨行時中也匪我求童蒙童蒙求我志應也初筮告以剛中也再三瀆瀆則不告瀆蒙也蒙以養正聖功也孔子之傳蒙彖云云何也言山下有險險而止所以為蒙象也九二發蒙之主而居中處剛以亨行時中也六五正應乃童蒙之志應乎我匪我求童蒙也志應而後發正二剛中之所以善於養蒙正也瀆則不告正謂其志不應發之徒瀆蒙耳所以然者童蒙志應乎我而後告教之乃為培養其天真使成聖胎之正道不然則彼以機變嘗我我以機變鑿之適以瀆蒙而壊其天真耳故蒙以養正為聖功也大人不失赤子之心此善於自養其蒙者教人而望以立誠之道此善於養童蒙之蒙者嗚呼蒙以養正為聖功自養者可以知所養教人者亦可以知養人之道矣不識不知順帝之則聖人而蒙矣然其工夫則自無畔援歆羡來聖功只是善養其蒙九二剛中上應六五柔中之志則在五為誠求之切在二乃無失人失言之愆此當幾之教也不然蒙瀆我而我瀆蒙師弟兼失矣故為師亦何可易言蒙以養得正而正却以養其蒙得故教弟子者全要保䕶其一㸃知能之良論語弟子一章養正之聖功盡統于是朱子之小學其即弟子章學文之註脚乎蓋聖賢之成法事理之當然皆于此乎備也教子弟者須于此着眼若視此為迂濶即誤却童蒙而養失其正矣象曰山下出泉蒙君子以果行育德孔子之傳蒙大象云云何也曰上山下坎為山下出泉蒙迷之象君子體之以養蒙惟是果行而見善即遷過勿憚改則業可進育德而寛居仁行居安資深則德可修庶幾乎養蒙之聖功如山下出泉耳又艮以一陽止乎二隂之上有果行象坎以一陽蓄於二隂之中有育德象象傳坎為溝瀆未有泉象而蒙象取于山下出泉六十四卦中象固有非象傳所能盡者然亦可見象原不執於一也初六發蒙利用刑人用説桎梏以往吝説吐活反桎音質梏古毒反周公之象蒙初六云云何也曰初六以隂居下全無知識之蒙發之之道自宜利用嚴威以禁其放佚故有利用刑人之象蓋以如此之蒙而不加嚴威則蒙不知懼教亦不入故又有用説桎梏以往之吝象曰利用刑人以正法也孔子之傳蒙初六云云何也曰此言發蒙之道初間自是宜正法以禁其邪枉也孔子之治魯子産之治鄭諸葛忠武之治蜀其義即取諸此九二包蒙吉納婦吉子克家周公之象蒙九二云云何也曰九二居坎中為養蒙之主而六五以柔中應之有包蒙象六五應而九二養有納婦象六五居上孚下而九二居下承上有子克家象區區一爻既象蒙師又取此三種法象引伸觸類固可窮哉嗚呼讀易者知易取象之義即可明反身自占之道矣不必乾盡宜君坤盡合臣也象曰子克家剛柔接也孔子之傳蒙九二獨釋子克家何也曰包蒙納婦于九二取象為易明而子克家又取于二之以剛接五柔殊不易明故耳然則執象論易豈復有易六三勿用取女見金夫不有躬无攸利取七具反周公之象六三云云何也曰六三隂柔處險之極是不貞之蒙女子也本與上為正應而近繫于九二是見納婦克家之金夫而不有其躬之象取女取此何利之有故有无攸利之占也然占亦象耳故易者象也讀易知得象為象而即占亦象易斯可通爾象曰勿用取女行不順也孔子之傳蒙六三云云何也曰此言勿用取女者為其行不順理耳然則舍其君而君人之君皆見金夫不有躬之女非其臣而輒納為臣皆取見金夫不有躬之女也何利之有六四困蒙吝周公之象蒙六四云云何也曰居艮之下隂柔居隂又無正應蒙之困而不知自發者也吝其能免乎故象以困蒙而占以吝也象曰困蒙之吝獨逺實也逺于萬反實去聲孔子之傳蒙九四云云何也曰蒙之所以困者以其無陽應又與九二隔處蒙而無師無友獨逺乎實困何由發吝何由免乎然則處蒙地當蒙時者宜求明師良友端可知已六五童蒙吉周公之象蒙六五云云何也曰六五以柔中止于艮陽之下蒙之童者也而下有九二剛中正應為之師則是五以誠求二以誠教所謂養正之聖功其在斯乎蒙之最吉者也故象取童蒙而占則吉象曰童蒙之吉順以巽也孔子之傳蒙六五云云何也曰言童蒙之所以吉者自已順巽以受教則九二自開誠以養正也几受訓於人之道於此可悟上九擊蒙不利為冦利禦冦周公之象蒙上九云云何也曰上九以剛居艮上艮有手象有擊象過剛不利犯人而利于禦冦故占為不利為冦而利禦冦象象曰利用禦冦上下順也孔子之傳蒙上九云云何也曰程子之言上下順為上不過暴下得擊去其蒙上下皆順自為得之然亦上九以一陽止于五爻之上五爻皆順服其下是亦有上下順象也然則擊蒙而不順上下之心是真為冦耳其亦不占而已需乾下坎上蒙而受之以需何也序卦傳曰蒙者蒙也物之穉也物穉不可不養也故受之以需需者飲食之道也需有孚光亨貞吉利渉大川文王之彖需云云何也曰乾健在下欲進而坎險阻前有需待之義自有需待之象也九五為需主而坎中實有水光通天之義且居中得正故有有孚光亨貞吉之象以此渉險則有利渉之義兼以乾健而需坎亦為渉水之象故占又取象於利渉大川也彖曰需須也險在前也剛健而不陷其義不困窮矣需有孚光亨貞吉位乎天位以正中也利渉大川往有功也孔子之𫝊需彖云云何也言所以待須之義以坎險在乾剛之前也險在前而乗剛直進滅頂之凶即在是矣能无困窮乎故乾而能須則自不至䧟而其義不困窮耳有孚光亨貞吉者九五為需主是位乎天位者也中實則為有孚坎水内明則為光以此需方進之乾寧不亨通得正而吉乎而三陽以見險而須以此涉川自然往必有功耳象曰雲上于天需君子以飲食宴樂上上聲樂音洛孔子之𫝊需大象云云何也曰坎上乾下有雲在天上需雨之象君子之所需而養者飲食宴樂如雲上于天之需雨也君子生平之志不在温飽三樂戒損于宴樂孔子何以取象飲食宴樂乎易道人情之至即天理之至也屯經綸草昧蒙果行育德勞亦甚矣至此恬養不亦須于飲食宴樂以自頥其天和耶故飲食之在需非尺寸之膚宴樂之在需非荒淫之愆也時當需也需為等待之義而象又取乎需于飲食宴樂義茍可象聖人固不執一廢百也易可與權豈不信然欲速則不逹功固有以需而成者必世而後仁治有雖欲不需而不得者君子之左右逢源必須于深造自得愚柔之必明必強必須于已百已千類推之而天運之必須歴夏秋而後冬月之必先弦而後滿水之必由江河至海人之必經少壯而後老草木鳥獸之必由勾萌胎卵漸至于暢茂飛走皆需義也需之義亦廣矣但以有孚光亨為得正而吉耳故善需者不以怠緩廢弛賊義而以剛中漸進需時也君子之飲食宴樂義亦如此坎中滿有醉飽象初九需于郊利用恒无咎周公之象需初九云云何也曰需以乾剛阻坎水故三乾爻以需于水外為義初九則去坎尚逺有需郊象陽剛好進利在用恒能恒則不至致咎故占為利用恒无咎象曰需于郊不犯難行也利用恒无咎未失常也難去聲孔子之傳需初九爻義云云何也言需郊者乃不犯難而行也利用恒无咎者言乾行有常固不避險不進亦不改常犯難也嗚呼需亦不犯難行耳豈濡滯因循之謂哉九二需于沙小有言終吉周公之象需九二云云何也曰二去坎漸近有需沙之象漸近險則必有言然二以剛居柔有進退適中必孚于五之義故又有終吉之象也象曰需于沙衍在中也雖小有言以吉終也孔子之傳需九二云云何也曰言九二居中處柔寛裕不廹盡需之道者也以此而需咎敗何從雖小有言必以吉終也然則過剛非需之道亦明矣九三需于泥致寇至周公之象需九三云云何也曰三與坎接有需泥象坎為盜而三進而臨坎有致冦至象也象曰需于泥災在外也自我致冦敬慎不敗也孔子之傳需九三云云何也言三已近坎災即在外也自我致冦又將誰咎然亦豈無道以免敗乎敬慎庶可耳自我致冦以上釋需泥致冦之義敬慎不敗則孔子當機示教微㫖嗚呼聖人教人趨吉避凶之道亦明矣天下何冦不自我而致何敗不可以敬慎免引伸觸類是在讀易者六四需于血出自穴周公之象需六四云云何也曰四居坎下隂位有需血象又坎為險體二隂皆有穴象然四入上坎則已出乾而上近九五又有出自穴象也象曰需于血順以聽也孔子之傳需六四云云何也曰言四雖需血而隂以柔近五不與時競是順以聽時者也亦自能出穴而不至致凶矣然則處險而徒以剛犯難徒自陷于敗耳四隂柔需血而終出自穴者隂柔則敬慎敬慎則不敢犯難而靜以需時正合敬慎不敗之義故終出穴不敗耳嗚呼其即師卦左次无咎之㫖乎九五需于酒食貞吉周公之象需九五云云何也曰五居中為需主盡需之道者也正大象飲食宴樂之君子坎中為醉飽故象酒食居中得正故占為貞吉也象曰酒食貞吉以中正也孔子之傳需九五云云何也曰言五以剛中而正居天位乃中正而盡其道者也故得正而吉耳然則不盡其道而徒以飲食晏樂廢日曠業者殆飲食之人耳其不貞甚矣吉于何有上六入于穴有不速之客三人來敬之終吉周公之象需上六云云何也曰以六之隂柔居上為坎險之終有入穴象而九三上與之應有不速之客三人來象上六雖險極然以柔處柔亦有敬順之義夫以敬順待客客雖剛暴豈至凌犯乎則又有敬之終吉象也可以以柔恭待強暴乃天地間消免凌犯之道象曰不速之客來敬之終吉雖不當位未大失也孔子之傳需上六云云何也曰言客雖憑剛而至而主人柔恭以待則必得終吉此天理人情之必至耳故上之敬客雖若自處怯弱未為大光而要之自保終吉亦未大失也終吉以上終爻義雖不當位二句孔子足象意恐人以敬人為愧不肯屈下故明其㫖曰敬客雖未大光然亦無有大失不失即得吉矣何用為嫌乎則所以教人遇剛之道益明且切也訟坎下乾上需而受之以訟何也序卦傳曰飲食必有訟故受之以訟訟有孚窒惕中吉終凶利見大人不利渉大川窒張栗反文王之彖訟云云何也曰訟上健下險九二為訟主中實有孚象與五上下不應窒象居坎之中惕中象訟以孚窒成以惕中吉以終訟凶故占又有惕中吉終訟凶象然終訟之凶言之既以為戒亦所以明惕中必吉之㫖耳又卦中九五剛中大人而以下訟之必不得志有利見大人象卦體以乾履坎有䧟于深淵象故占又戒以不利涉大川也彖之取象至夥總之以宜戒其終使不得行為義文王之戒訟亦深矣彖曰訟上剛下險險而健訟訟有孚窒惕中吉剛來而得中也終凶訟不可成也利見大人尚中正也不利渉大川入于淵也孔子之傳訟彖云云何也曰謂訟以上剛下險而成也有孚窒惕中吉者謂九二剛自外之需來而得中也終凶者訟非善事終則必凶而斷不可成也利見大人者訟遇剛明之主則不行以其所尚中正也而九五居中履正固所謂訟者利見之大人也不利渉大川者乾履乎坎有入淵之象故取于不利渉大川也象曰天與水違行訟君子以作事謀始孔子之傳訟大象云云何也曰天上水下相違而行致訟之由君子體此知人情爭訟之道皆始于性情之違戾故凡作事必謀其始使協于天理人情則訟端自絶耳嗚呼天下何事不宜謀始獨訟乎哉初六不永所事小有言終吉周公之象訟初六云云何也曰訟雖以坎險成而初六處下居隂上又有援有不永所事象訟而不永雖小有言終吉之道也故占有終吉象而周公即繫此義于訟之初六其示訓亦切矣象曰不永所事訟不可長也雖小有言其辯明也孔子之傳訟初六云云何也曰不永所事者訟原不可長也雖小有言終吉者上有明應為援其辯明也嗚呼孔子之意補足周公之㫖而其切于示訓亦猶是矣九二不克訟歸而逋其邑人三百戸无眚逋補吳反眚生領反周公之象訟九二云云何也曰訟之所以成原以二為險主而九五剛中處正自非二之可敵故有不克訟之象也不克訟則必退而避之矣訟主既逋其牽連之邑人不且免眚乎故占又有其邑人三百戸无眚象也先儒多解其邑人三百戸无眚為自處寡約則可免災愚意竊覺解以訟主既逋即闔邑皆免株連擾費之災為得情且三百戸以需卦上六不速之客三人來例之于三百戸之象亦有取耳或曰需取三人此言三百戸何也愚意則又覺言客止可言三人言邑則宜言三百戸取象固取切近事理也象曰不克訟歸逋竄也自下訟上患至掇也掇都活反孔子之傳訟九二云云何也曰二之不克訟者歸而逋竄也訟而逋竄這便是明于處訟之道者何也自下訟上患乃自取豈得免乎則所以告訟者之宜知自退而無事牽累邑人其義益明矣六三食舊德貞厲終吉或從王事无成周公之象訟六三云云何也曰三居險終以六處之而上應剛此食舊德象也夫下之訟上大抵由于下之忘上舊德而結新怨耳食舊德則得正矣雖處危地自得終吉故有貞厲吉象然亦六三原居柔應上卦中自有此義故又取為占也六三上應上九亦有或從王事无成象象曰食舊德從上吉也孔子之傳訟六三云云何也曰言食舊德之吉者從上則吉也然仔細推詳從上吉也一語固所以明食舊德之吉亦實合下或從王事无成之㫖傳出耳傳固不可執一視也九四不克訟復即命渝安貞吉周公之象訟九四云云何也曰九才雖剛而居四則柔兼九五剛中既非可訟之人初六隂柔又非可恃之援有不克訟象居近九五惟五順聽為復即天命而渝變初心安于正理之象故占有吉象也復即命渝安貞于象外取義似不若即象為解故註以九四居近九五惟五順聽取義既覺取象為近亦且于傳義切合不知明易之君子以為何如象曰復即命渝安貞不失也孔子之傳訟九四云云何也曰言能復即命渝安貞則自無失而吉耳然觀初以不永所事吉二以不克訟无眚三以食舊德吉四以復即命吉嗚呼訟固以能止為善耳九五訟元吉周公之象訟九五云云何也曰九五為聽訟之主而剛健中正治訟得此等人自然得情合理故占有元吉象象曰訟元吉以中正也孔子之傳訟九五云云何也曰言訟之所以元吉者以九五剛中居正自然片言折獄可使無訟也而聽訟以剛明為貴亦從可識上九或錫之鞶帶終朝三褫之褫救紙反周公之象訟上九云云何也曰言上九處訟極而以剛履柔此乃終訟而僥倖得勝之人必且因終訟而剛過即折者也有錫之鞶帶終朝三褫象然曰或則未必能僥倖而曰終朝三褫即倖又豈可常僥乎至孔子之傳則又以為即僥倖亦何足貴嗚呼訟固必不宜終之事也象曰以訟受服亦不足敬也孔子之傳訟上九云云何也曰言終訟雖受服命之寵亦不足敬况又終朝三褫乎嗚呼三聖人之戒訟警訟者亦深切著明矣讀易者能識此義以處訟規訟斷訟即屬利見之大人不必在居九五之位然後足當之也師坎下坤上訟而受之以師何也序卦傳曰訟必有衆起故受之以師師貞丈人吉无咎文王之彖師云云何也曰師坎下坤上行險而順有貞象九二剛中為師主六五柔中而順應有丈人象行師而得正得人自然元吉咎何從至乎故占為无咎象也嗚呼彖僅六字已盡千古用師之道矣用師而不得正非貪兵即忿兵雖強民而心不從徒自毒毒天下之民耳故師貴貞然不得其人必致輿尸之凶即幸而勝亦不能以衆正而王也故師必以得貞得人為吉而无咎彖曰師衆也貞正也能以衆正可以王矣剛中而應行險而順以此毒天下而民從之吉又何咎矣孔子之傳師彖云云何也曰謂師言乎其衆貞言乎其正也能以我之衆正人而並使衆人之皆正可以王天下矣故師取占于貞也成湯放桀之師武王伐紂之師斯足當之丈人吉无咎者謂九二剛中而六五應下坎上坤而行險順以此毒天下乃為弔民伐罪之師而已之民心從天下之民心亦從則得道多助于何不吉以征不正又何咎乎成湯任一心一德之伊尹造攻自牧而東征西怨武王任天下大老之尚父用三千同心同德之義士而商人筐篚壺漿斯足當之行師傷財害人彼此兩毒之道必我之民從敵之民亦從乃為義師亦始得吉故孔子曰以此毒天下而民從之吉又何咎故師不正不可動不得其人不可動雖得正得人而民心不從亦不可動觀孔子彖傳見伊川先生解師貞之義自當而取穰苴淮隂以實丈人吉无咎之象特言差足當丈人吉者耳實不盡文王取彖丈人之㫖必如成湯伐夏之任伊尹而即克武王伐商之任尚父而即克乃足盡衆正可王之義象曰地中有水師君子以容民畜衆孔子之傳師大象云云何也言地中有水水聚地中故為師君子觀地中有水之象以容保其民畜聚其衆如地中有水也古者寓兵于農故民衆者師之所自出然師取容民畜衆又可見師道固以安民不殺為本原耳初六師出以律否臧凶周公之象師初六云云何也曰初六隂柔居下聽二指揮有師出以律象以隂居柔亦有否臧凶象然初居師出之始而即戒以律惕以否臧凶則周公之示象已至明也象曰師出以律失律凶也孔子之傳師初六云云何也曰言師出當以律失律則凶所以明師之吉凶决于當否而當否即宜决于初出之時耳九二在師中吉无咎王三錫命周公之象師九二云云何也曰九二為師之丈人而在五隂中則有在師中象居中得正而上有六五推心委腹之主則上无疑忌而下得展布有在師中吉而无咎象上坤三爻皆順而應下亦有王三錫命象故周公皆取之嗚呼惟王三錫命而九二乃得安然在于師中收衆正民從之效无毒民輿尸之凶王者任將之道從可識也自古未有將在千里之外而以專制廟堂之上吉者故九二以在師中吉以王三錫命而得安處師中為將者宜以此自審進退任將者宜以此自知所尚師毒天下事也而可漫易哉象曰在師中吉承天寵也王三錫命懐萬邦也孔子之傳師六二云云何也曰言在師中吉者以其承六五委任之寵也王三錫命者以王者不得已而出師原以衆正民從為主惟九二剛中之丈人乃能不至空毒天下而得民之從故王三錫命如此之諄復正是懐保萬邦而不欲其荼毒之至意也嗚呼古之聖王師不得不用而用師之意乃如此任將極其專而其心之所存乃如此故師不至流于毒衆將得自效其忠悃師出而天下諒其義功成而天下歸其仁也六三師或輿尸凶周公之象師六三云云何也曰三隂柔居險終師或輿尸之凶象也師可以柔險之人任哉任之柔險是自喪其師也象曰師或輿尸大无功也孔子之傳師六三云云何也曰言師或輿尸者所任不當大无功而至此耳或曰九二為師帥是丈人長子也則三皆聽二主張矣而亦有輿尸之凶何也曰吉凶以情遷爻自各為義象耳且雜物撰德辨是與非非其中爻不備于三四發輿尸左次之義而師道之是非勝敗吉凶乃始備也六四師左次无咎周公之象師六四云云何也曰師以陽進六四以隂處柔有量時退舍之義為將而能知已知彼不敢輕進亦守則有餘之道也故有左次无咎象象曰左次无咎未失常也孔子之傳師六四云云何也曰言行師之道有剛有柔知進知退乃常道耳四以隂居柔而能左次雖無丈人錫命之吉亦免失律輿尸之凶未為失常道耳此爻即所謂為將亦有合怯弱時義而光武謂長勝之家難與慮敵亦即此義六五田有禽利執言无咎長子帥師弟子輿尸貞凶周公之象師六五云云何也曰五為師君所以操行師用人之柄者也而坤為地有田象時當用師乃用是能以衆正毒天下而民從之㑹故有田有禽利執言象能以衆正則可以王毒天下民從則得大吉咎何有乎故占有无咎象而二三皆惟五所用故又有長子帥師弟子輿尸貞凶之象嗚呼觀于有禽利執為无咎可見兵者必不得已而後可用也觀于長子帥師弟子輿尸雖貞亦凶可見委任不明用舍失宜皆取凶之道也象曰長子帥師以中行也弟子輿尸使不當也孔子之傳師六五不釋田有禽義而專釋長子帥師云云何也曰有禽利執之義易明而長子帥師弟子輿尸之義則恐讀易者視為長子弟子之功罪而與六五任用之主無涉耳故曰以曰使所以明長子弟子之功罪皆由六五任用之昏明也嗚呼大君之用舍顧可忽哉長子帥師廉頗以之弟子輿尸趙括其人然皆趙主之所使也故責在大君上六大君有命開國承家小人勿用周公之象師上六云云何也曰師之上六師終而大君賞功時也上以六之隂柔居之有用小人象兼坤為地有開國承家象故有大君有命開國承家勿用小人之戒也然周公之垂戒亦切矣象曰大君有命以正功也小人勿用必亂邦也孔子之傳師上六云云何也曰正所以申明大君賞功不可用小人之㫖耳蓋軍功之成固有小人而才者若賞以開國承家則是天下之民不毒以一時之師而長毒以開國承家之小人矣豈用師衆正可王本㫖乎故孔子特釋之曰大君有命乃正功時也所謂小人勿用者則以小人開國家必凶于爾國害于爾家而亂邦耳嗚呼師之為道必以能以衆正取其貞以寵命丈人取其吉以勿用小人防其亂乃能盡善而吉无咎耳不然則非凶即咎非輿尸即亂邦所必至矣大君容何利乎比坤下坎上師而受之以比何也序卦傳曰衆必有所比故受之以比比吉原筮元永貞无咎不寧方來後夫凶比平志反文王之彖比云云何也曰比以九五居中比衆隂衆隂亦以順應比九五有吉道五為坎中比主而心亨尚中有誠信而大得常正之義故占取原筮元永貞无咎象上下順比有不寧方來象上六比外无首有後夫凶象故象占悉取之蓋占亦象爾原筮先儒多取為再度之義愚嘗反覆尋味原筮所以明九五剛中之德故象傳合元永貞為言而以剛中釋之似于再度無所取義若近取蒙卦初筮告為例以明九五剛中誠一有心孚尚忠之義則于元永貞既有來歴于彖傳之釋以剛中亦合且與蒙之九二坎中取于初筮不悖也顧不知明易君子以為何如彖曰比吉也比輔也下順從也原筮元永貞无咎以剛中也不寧方來上下應也後夫凶其道窮也孔子之傳比彖云云何也曰謂比之所以吉者以比取輔義也自四而下皆順從之義也原筮元永貞无咎者九五剛中原具此德也不寧方來者上下皆應五而親比也後夫凶者上六居上比之无首其道窮也象曰地上有水比先王以建萬國親諸侯孔子之傳比象云云何也曰物相親比無間者莫如水在地上所以為比也先王則體比之象以建萬國而親諸侯如地中有水也蓋天下至廣兆民至衆一人治之勢所不及分建賢哲以安民撫衆即此為王者親比四海兆民之道也他象皆言君子而比獨言先王者以建萬國親諸侯王者事故變君子言先王耳後倣此初六有孚比之无咎有孚盈缶終來有他吉缶俯九反他湯何反周公之象比初六云云何也曰初六居坤之初而上比于五擇君慎始比得其主何咎之有故有有孚无咎象又坤體而居初處隂順以從五有孚盈缶象以盈缶之孚遥順五顯比之聖君自然在五德教親比之中故又有終來他吉象然曰有孚他吉則是必誠信真足孚上而後无咎來吉耳甚矣誠信乃比人之道也其漢之竇融乎象曰比之初六有他吉也孔子之傳比初六云云何也曰言比之初六有孚盈缶則自然有他吉耳益信誠之必足比人也六二比之自内貞吉周公之象比六二云云何也曰六二内卦之中心孚九五而比之比之自内象居中守正有貞吉象象曰比之自内不自失也孔子之傳比六二云云何也曰言比之自内而貞吉者心傾聖主而居中守正却不自失耳嗚呼太公西歸磻溪之日庶足當之六三比之匪人周公之象比六三云云何也曰六三體柔居剛而應上六弱才而懐躁動之志應人而比匪類之人者也有比之匪人象象曰比之匪人不亦傷乎孔子之傳比六三云云何也曰言六三越五而比于上六是比後凶之匪人所比者且將不免而欲求自託得乎亦可傷矣隗囂之比公孫述即其証也六四外比之貞吉周公之象比六四云云何也曰六四内無正應外與五親是外比之象得賢主而輔自有得正而吉之道故占有貞吉象也宋之吳越亦其事也象曰外比于賢以從上也孔子之傳比六四云云何也言外比之貞吉者以五當位居中是為賢主而四能上而從之寧不得正而獲吉乎九五顯比王用三驅失前禽邑人不誡吉周公之傳比九五云云何也曰九五以剛中居天位而比虛中待比之諸隂上下開誠見心有顯比之象五既開誠比下則是自盡其公道無驩虞要結以求必比之私有王用三驅失前禽象而四隂亦虛心開誠以比亦有邑人不誡之象此自顯比之吉故占有吉象也嗚呼成湯開三面之網即其義而古王者奉無私以照臨天下天下亦應以皥皥即其象也象曰顯比之吉位正中也舍逆取順失前禽也邑人不誡上使中也孔子之傳比九五云云何也曰言顯比之所以吉者以九五居中正之位有中正之德故有舍逆取順中正之比而邑人亦有不誡而中正之應爾嗚呼王者以中正比天下天下亦自以中正比王者此理之必然然究之天下不誡之中正皆王者顯比而使之中正也故王者之比貴乎中正彼霸術要結一時驩虞或得之不久而天下之心渙然散矣終何益師六五曰田有禽利執言比九五曰王用三驅失前禽可見王者之用兵必不得已而後用王者之伐罪亦不期盡服其醜類舜禹有苗之師固如此也匪是師為否臧之師而比非顯比之比矣上六比之无首凶周公之象比上六云云何也曰一卦皆比九五上六獨居五上此正所謂後夫凶耳有比之无首而凶象象曰比之无首无所終也孔子之傳比上六云云何也曰言比之无首凶者上自絶于顯比之五將自顚殞无所終也防風後至之誅田横海島之死非明鑒乎嗚呼王者比人之道其莫要于義正仁育英雄比主之道其莫要于見明識定哉小畜乾下巽上比而受之小畜何也序卦傳曰比必有所畜故受之以小畜小畜亨宻雲不雨自我西郊畜救六反文王之彖小畜云云何也曰小畜四柔得位上下五陽皆為所畜而下健上巽二五皆剛有亨象以隂畜陽以小畜大畜終不極不通有宻雲不雨自我西郊象朱子曰宻雲隂物西郊隂方文王演易羑里視岐周為西方故云爾然亦文王羑里之自占乎由其詞味其㫖愴乎有餘悲矣彖曰小畜柔得位而上下應之曰小畜健而巽剛中而志行乃亨宻雲不雨尚往也自我西郊施未行也孔子之傳彖云云何也曰言六四隂柔得位而上下五陽應之曰小畜也下健上巽二五剛中志行乃所以亨也宻雲欲雨之時所尚在陽氣上往而雨澤降耳乃陽欲上往竟為隂畜但壅閼為宻雲者則以自我西郊尚滯隂方而所施還未得行也噫彖詞文王之自占而彖傳則孔子據文王之事占矣象曰風行天上小畜君子以懿文德孔子之傳小畜大象云云何也曰言卦以巽風行天上是乃以柔文剛故取象于小畜君子觀畜之象以懿美其文德則亦以柔文剛風行天上之義也然不曰飾文德而曰懿文德則文德固非君子修飾文為之事而乃懿美其德使之徽柔懿美耳又以懿文德繫之小畜則又可知君子以道德經綸之業為大而文章才藝固其小矣象義無不可通變易從道在讀者神而明之用者黙而成之也初九復自道何其咎吉周公之象小畜初九云云何也曰初與四為正應正應則復正道矣復得正道又何咎乎真天下最吉之事也故有復自道何其咎而吉象象曰復自道其義吉也孔子之傳小畜初九云云何也曰言復自道吉者其義吉也而言外不復自道之義為凶即從可知九二牽復吉周公之象小畜九二云云何也曰二與四非正應而當畜之時以剛中之德與初九正應之陽相比應四有牽復吉象象曰牽復在中亦不自失也孔子之傳小畜九二云云何也曰言牽復吉者非為人牽復而即得吉謂二自處剛中本無徴逐之情亦不自失其正故得吉耳孔子于文周彖象未顯之㫖往往補足其義類如此觀孔子此等傳象之㫖孔子之于文周後先相發隱顯相闡真如一家祖孫明聖作述規制益明如此乃云善于讀書即古人亦樂得今人耳近儒于前聖明白顯易之言往往曲加塗飾嗚呼竊恐古人不引為知已也反不如不釋之為本㫖自在耳九三輿説輻夫妻反目説吐活反周公之象小畜九三云云何也曰九三以剛處剛上與四比而非其正應則四必不應三亦必止而不行有輿説輻夫妻反目象三四非正應而亦曰夫妻者以隂陽剛柔言也象固多變耳象曰夫妻反目不能正室也孔子之傳小畜九三云云何也曰夫妻反目者三過剛不中不能自正其室而取之耳六四有孚血去惕出无咎去上聲周公之象小畜六四云云何也曰四以隂居柔處得其正又居巽體上比九五是乃柔順精忠與君交孚矣人臣如此自然傷害憂懼皆可以免故象為有孚血去惕出而占為无咎也象曰有孚惕出上合志也孔子之傳小畜六四云云何也曰四之所以有孚惕出者以與九五合志故傷害憂懼可免耳晏子之畜景公庶幾近之九五有孚攣如富以其鄰攣力傳反周公之象小畜九五云云何也曰九五巽體剛中與四同醴以畜乎下故為有孚攣如富以其鄰象象曰有孚攣如不獨富也孔子之傳小畜九五云云何也曰言有孚攣如者乃不獨富其富而必以及之鄰耳齊景悦晏子之言而興發補不足亦其義也上九既雨既處尚德載婦貞厲月幾望君子征凶周公之象小畜上九云云何也曰上九處小畜之極不雨者至此已雨尚往者至此無復可往有既雨既處象既雨既處則德已尚而載矣且上九居畜之最上有尚德載象苐四隂為畜主而至于如此婦之道雖得正無邪亦危甚矣蓋月而幾望則疑于無陽龍戰之災固可畏也君子尚可行乎故象占又取婦貞厲月幾望君子征凶象也嗚呼宋之宣仁后事殆類此矣當時所謂令官家别用一番人亦君子征凶義也又若反貞以論象則唐之武后優禮正人德載月望尤君子征凶時耳吁可戒哉又此爻若就文王自占論則羑里既出委任愈篤迨至有二西歸而文王純節自凛惟恐一有違行便為臣道之累亦其義也象曰既雨既處德積載也君子征凶有所疑也孔子之傳小畜上九云云何也曰言既雨既處則畜通而德積載矣君子征凶者言若如畜之隂柔至此而尚為之征是與于月望龍戰之㑹耳其禍真可疑也豐川易說卷二
