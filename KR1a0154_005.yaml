body:
  text: 豐川易說卷五鄠縣王心敬撰上經復震下坤上剝而受之以復何也序卦傳曰物不可以終盡剝窮上反下故受之以復復亨出入無疾朋來無咎反復其道七日來復利有攸往文王之彖復云云何也曰復一陽自剝而來窮上反下故為復自此陽日進日生直至于乾皆由此一陽之復有亨通義為卦下雷為動而上坤為順有順動義一陽出剝入坤有出入義自此五隂順動有朋來義而皆統于順動之體有出入無疾朋來無咎義又反剝成復有反復其道義卦爻六位陽自剝來閲歷六位而後復于數為七而陽又象日有七日來復義自此陽日以長隂日以消乃小人道消君子道長時也自有往無不利義故象占皆取之天地間無往不復乃循環之正理陽窮于上而反于下此即循環之義而謂之復者陽于天為生物之本于人為君子于心為善念聖人喜陽之反正故名曰復若曰陽其已反矣故深喜其復而備極其形容耳蓋就復而論其旨天道之閉極而復通國家之亂極而復治人心之私極而復公即其義也故復之一字乃萬事萬理轉凶為吉之樞紐其實一部易經四聖人亦祇是教人知復之道故文王孔子于復彖備極其美善也彖曰復亨剛反動而以順行是以出入無疾朋來無咎反復其道七日來復天行也利有攸往剛長也復其見天地之心乎孔子之傳復彖云云何也曰言復之所以亨者剛自剝上反下為震動而遇坤以順行也其言出入無疾朋來無咎者謂惟剛反而以順行是以一陽從剝上反下即自下仍漸漸前進而五陽由是偕進故無咎也其言反復其道七日來復者謂此非人力陽由剝六還于復初其期七日循環不已是乃天道自然之運行也其言利有攸往者謂陽剛初進漸至臨泰往無不利也而又曰復其見天地之心者則孔子于傳彖之際見得此一陽也方其未動天地之心藏于無形而不可見即陽氣充滿天地之心散為萬品亦不可見惟此一陽初動冲漠無朕而生機不息如雷藏地中于此見天地生物不息之心也然即其言天地而可默㑹于聖人體道之心矣復於本心為善念之來復故六爻中皆以為仁取象象曰雷在地中復先王以至日閉關商旅不行后不省方孔子之傳復大象云云何也曰雷動地靜動來靜中動極復靜有復道焉故謂之復先王體此于冬至一陽來復之日閉關不啓商旅不行后不省方以順天道而養此微陽也嗚呼其在人心則紛紜擾攘而復其本心亦雷在地中之象乎即先王之閉關可悟復仁之在閉其情竇即商旅之不行可悟復仁之在戒其貪行觀后不省方可悟復仁之在無役志于耳目初九不逺復無祇悔元吉周公之象復初九云云何也曰復一陽甫終于上即反于下故其象為不逺復復而不逺則是一念偶失旋覺即復形跡未著而念慮立時已化乃人心天真不汨而日新又新之機也尚何悔之可言而吉之不大耶嗚呼顔子之不善未嘗不知知即未嘗復行其庶幾乎象曰不逺之復以修身也孔子之傳復初六云云何也曰言不逺之復者神志清明主宰在我則視聽言動之間自然非禮不履而所以修其身為成已之仁者在是耳大學之心正而後身修亦即此義復之初九在人心即最初一念有理無欲之天機也而觀于自二以上之五爻依此者吉違此者厲應此者無悔而逺此者便凶吾輩亦可以知復仁之方矣六二休復吉周公之象復六二云云何也曰復以初為不逺至二稍緩故于初象知幾敏速于二象保養休息于義則友仁事賢為能依仁以自養者也故象占特取于休復吉其在孔門即冉閔之徒乎二居中得正有受善獲益之象故取象如此又初為震主陽性剛健如雷之迅故不逺即復二當震中隂柔空虛有從容改圖之象故為休復象曰休復之吉以下仁也孔子之傳復六二云云何也曰言六二休復之吉以下近初九之仁也嗚呼近仁乃得休復休復即無不吉近仁何負于人耶六三頻復厲無咎周公之象復六三云云何也曰三以隂居陽當動之極上下之交有頻復而操舍不常之象其亦厲矣然頻失而頻復雖若危厲而頻厲而頻復則亦自無咎也故象占取此其在于古則日月至焉之諸賢乎楊廷秀曰頻復非危頻過為危厲無咎者聖人危其頻過而開其頻復也余則謂頻復因于頻失失豈可頻而頻焉自是危事然頻失終能頻復復仍無過而亦尚能頻則亦自可免咎故頻復無咎一言不惟聖人開其頻復亦是聖人憂其頻復而喜其頻復也象曰頻復之厲義無咎也孔子之傳復六三云云何也曰言頻復雖厲猶知改過徙義之義故于義無咎耳六四中行獨復周公之象復六四云云何也曰六四處順當位而與初為正應是處羣隂之中而獨能居天下之廣居立天下之正位行天下之大道願學聖人者也其在戰國則儀衍楊墨紛紛門户之日而獨能私淑孔子之孟子乎噫難矣象雖不言吉凶然吉而無咎又豈待言象曰中行獨復以從道也孔子之傳復六四云何也曰言六四之中行獨復者初見天地之心而四能率由之以從道也中行謂在五隂之中行由乎中則自無過差應乎初則為從道六五敦復無悔周公之象復六五云云何也曰六五以隂居陽處坤之中坤為土有敦厚義居中又為至順義蓋安土敦乎仁者也初不逺復則無悔五敦復寧有悔歟故象占取此其在孔門則篤行之曽子乎象雖不言元吉而吉亦正自可知爾象曰敦復無悔中以自考也孔子之傳復六五云云何也曰言六五之敦復無悔者謂其敦篤質誠日省不怠而能以中道自考也嗚呼信非曽子不足以當此上六迷復凶有災眚用行師終有大敗以其國君凶至于十年不克征周公之象復上六云云何也曰上六以隂居復終下無正應去初獨逺所謂迷而失道者也故占有凶象凶則更無所之而災與眚無一可免矣故占有有災眚象坤為師象上亦君位十年坤數之終故又有用行師終有大敗以其國君凶象且有十年不克征象嗚呼一迷復而諸凶皆備然則自暴自棄者其可安于終迷而不悔也耶象曰迷復之凶反君道也孔子之傳復上六云云何也曰言上六迷復之凶至于如此之極者以其盡反乎君道耳觀孔子之傳則知上六君象亦自可知易象變通豈得專以五屬君位復于天道為隂陽剝復之關在人無往不具而于國家治亂人心理欲所關為大故六爻中下五爻言理欲上一爻言治亂所以明天德必復後全王道非復即迷復則為吉迷即成凶復之所關最大也然言能復者備極階級而言迷復者要只屬一迷則又以明復之道層纍而難盡迷復之凶只一迷便無不至此正所以明夫復之難而迷之易也蓋聖人之致教于復致惕于不復如此至也故易為聖人憂患後世之書無妄下震上乾復而受之以無妄何也序卦傳曰復則不妄矣故受之以無妄無妄元亨利貞其匪正有眚不利有攸往文王之彖無妄云云何也曰無妄下震雷上乾天是為動而順天五陽居上六二居下是為剛中而應有元大亨通利宜貞固義故象占取此而又曰其匪正則有眚不利有攸往者易所以責重人事故聖人處處以人事提撕斯人也善讀易者以此自占于心知得心能無妄則自當元亨利貞如其匪正則必然有眚而不能利往時時間邪存誠舍妄即真即天祐不在天而在我易不在易而在我爾無妄是人心天心來復之機于學者為意誠之候意誠則心真動直無物不孚物我天人一其感召矣故元亨利貞皆其自有然不曰誠而曰無妄者即本然無加之義也嗚呼學者亦可㑹吾心無妄之真矣匪正有眚之旨大抵如小人無忌憚之類蓋其自以任放僞無妄不本天心來復之機這樣人自以為任真不知却是目見空華迷真成妄耳安得利往彖曰無妄剛自外來而為主于內動而健剛中而應大亨以正天之命也其匪正有眚不利有攸往無妄之往何之矣天命不祐行矣哉孔子之傳無妄彖云云何也曰言無妄而元亨利貞者剛自大畜之上來而為主于內震動乾健五剛中以應六二是天降衷而人率性大亨守正所行皆順帝則而合天命者也何不利之有其匪正有眚不利有攸往者動違天行無妄生妄往將何之乎徒逆天違人一步難行耳觀孔子傳彖以大亨以正為天之命無妄之往為天命不祐可見天人相去不逺更可知吾心即天欲利往者斷須順天之命欲順天者又須祛心之妄世人以妄心行妄事起心動念早與天違矣焉得天祐人助乎聖人先天不違則自然元亨利貞學者後天奉時亦必然攸往可行欲攸往者宜知起心動念即當隨順天命矣即孔子無妄一傳直可作一部感應篇綱領聖言真天覆地載無所不具亦真是取之不窮用之不竭善窮理者只于聖言窮之體之即深造自得之道也象曰天下雷行物與無妄先王以茂對時育萬物孔子之傳無妄大象云云何也曰言天下雷行震動發生萬物之蟄者起萌者達無心同得是天以無妄之命命萬物而萬物亦各得其性命以自物其物也先王體此知大造公物因時並茂以此順時愛養一如天下雷行之無妄也先王茂對時育萬物之義即月令一篇可見其概即孟子王民皥皥一章可明其義初九無妄往吉周公之象無妄初九云云何也曰震以一隂居初誠一未分而為無妄之主是陽道之直遂無係而動與天合者也以此而往天命祐之吉自不待言耳故象占如此象曰無妄之往得志也孔子之傳無妄初九云云何也曰言初九無妄之往乃率性而行雖有往而未始失吾本志耳嗚呼其斯不識不知順帝之則者乎帝謂明德乃眷西顧何疑也六二不耕穫不菑畬則利有攸往周公之象無妄六二云云何也曰六二中正而效初以動是處無妄之時能無希望如不耕穫不菑畬與世無纍者也以此居心制行即天行之無私何不利之有故象占取此二與五剛柔正應有應則宜求而妄生矣然卦本無妄而二虛中居正故雖應不求雖應不纍為不耕穫不菑畬之象象曰不耕穫未富也孔子之傳無妄六二云云何也曰言六二虛中無妄淡然屢空無求富之心故亦不富而仍自無妄耳或疑世安有不耕穫菑畬之理周公之象得無教人素餐如佛老之為乎不知聖人特取無妄虛中不貪之象如孟獻子所云不察雞豚之義耳非教人不須耕菑也若泥其語即艮其背為背真可艮不見其人為真不見人矣豈其可然亦可見無妄之在聖人則為直養不染法在學者則為寡欲減擔法也故孔子以屢空之回為貨殖之賜言之使知自損耳六三無妄之災或繫之牛行人之得邑人之災周公之象無妄六三云云何也曰六三處動之終以柔履剛上應上九是妄動而有繫戀者也妄動則必失既失則喪得是為無妄之災而其象占則為或繫之牛行人之得而邑人之災也蓋無妄本非有災以外有繫應乘剛而動所求非所得而災耳先儒以或為指二恐亦不然或之者取象欲活之義猶曰或如某象云耳又以僞乾離同體有牛象亦恐不然隂柔皆可為牛六隂柔安在不可為牛且義取于有繫則失之旨正不必于爻實索牛象也或又為上九變則外四爻為坎坎為盜有得牛之象又或以為上九變則為隨之上六拘係從維繫牛之象又以為上九行在外為逺行行人之象皆恐不然總之此爻以六居三處動之終為動必有失之義周公繫牛四語只借此一事以示象所謂義象也義象則皆可以義會矣恐不容如此穿鑿附㑹也象曰行人得牛邑人災也孔子之傳無妄六三云云何也曰言行人得牛邑人受災受災者非得牛之人故其災為無妄耳九四可貞無咎周公之象無妄九四云云何也曰九四雖處非其正然爻體居柔下無係應則亦能固守無妄之義者也故象占如此象曰可貞無咎固有之也孔子之傳無妄九四云云何也曰言可貞無咎固守此無妄者也嗚呼君子從容中道自然無妄豈可固守乎然賢于三之妄動必失亦逺矣九五無妄之疾勿藥有喜周公之象無妄九五云云何也曰九五陽剛中正本自無妄以其下與二應故為無妄之疾然本屬正應但無大生係戀之意即疾自可已初不待藥一藥則仍即藥為病耳故象占如此象曰無妄之藥不可試也孔子之傳無妄九五云云何也曰言疾本得之無妄而復藥之則反為妄而生疾矣此藥萬不可嘗試也嗚呼程子不須窮索不須防檢之旨其此義乎而孔子不逆詐而先覺尤其象也上九無妄行有眚無攸利周公之象無妄上九云云何也曰上九無妄之終更何所往獨以陽亢不正下係六三而遂生妄想此正所謂貪欲不止無妄之往何之者也招災不利自不待言故象占如此象曰無妄之行災之窮也孔子之傳無妄上九云云何也曰言上九無妄之行總是任情罔終故其數盡理窮天命不祐而災不免耳何利之有嗚呼古今之以妄想貪行招災致釁者舉此類也聖言真如蓍蔡可畏哉大畜乾下艮上無妄而受之以大畜何也序卦傳曰有無妄然後可畜故受之以大畜大畜利貞不家食吉利涉大川文王之彖大畜云云何也曰大畜以艮山止乾健是之謂大畜而卦中艮以一陽踞最上乾以純陽止艮下有人君畜賢象故占象為利貞又上既有養賢之主則士自以不食于家為吉卦德行健知止以之遺大投艱亦自能無往不濟故象占又取于不家食吉利涉大川也然于大畜之利貞則知凡一切畜人畜學畜物者不可不正于不家食吉可知國家以畜賢為大經大猷于利涉大川可知行健知止乃涉世攸往之利耳卦中本無坎澤而亦取利涉大川天本不可以山畜而卦竟以山畜天成大畜則又可知讀易者求象于物宜通象于義也易道變通多端真活潑潑地後儒往往執象舍義不得則穿鑿附會求之緯稗噫誤矣彖曰大畜剛健篤實輝光日新其德剛上而尚賢能止健大正也不家食吉養賢也利涉大川應乎天也孔子之傳大畜彖云云何也曰言大畜者下以乾健上遇艮止乾精斂而篤實艮止明而光輝止以畜健健以受止誠明並進兩相磨而德日新所以為大畜也又為卦艮陽在上有貴德尚賢之義卦德取于止健有大正之道上有尚賢之君則士不可復食于家故為不家食吉濟世艱難以艮道之光明應乾行之剛健何憂不濟故曰利涉大川也象曰天在山中大畜君子以多識前言往行以畜其德識如字又音志行下孟反孔子之傳大畜大象云云何也曰言天體之至大而山以靜虛止畜之故曰大畜君子體此則多識前言往行以畜在中之德焉蓋吾德本大與天同體而非經好古敏求之後則亦無由開發印正而使之還其本量彼前言往行則皆古之聖賢由道德之精藴發為菁華而言為德言本精義之實得見諸制行而行為德行可以印正開發吾德者也故君子于前言往行多見多識神明默成以畜其德而使之篤實輝光焉觀君子之多識前言往行以畜其德可知徒事虛靜者德終不大又可知不為畜德而徒以多識前言往行為畜者所畜不足言大也吾輩欲體大畜之旨者必以道問學為尊德性之實功然後廣大精微髙明中庸一以貫之于大畜也其庶幾乎又朱子曰天在山中不必實有是事但以其象言之耳可見全易之中義象固多也初九有厲利己已夷止反周公之象大畜初九云云何也曰乾之三陽為艮所止初九為六四所止者也而以剛居剛易生躐等躁動之弊故占象為有厲為不利于行而利于己已止也象曰有厲利己不犯災也孔子之傳大畜初九云云何也曰言初九有厲利己者躁動而不已則必犯災能止而受畜則不犯災也九二輿說輹說吐活反輹音福周公之象大畜九二云云何也曰九二得中履正上應六五有待用之期而當畜之時則以其中正知止不進故雖有可駕之輿竟脫其受軸之輹止而不進焉嗚呼伊尹之幣聘而囂囂其類此乎象曰輿說輹中無尤也孔子之傳大畜九二云云何也曰言輿說輹者九二剛中材大得中無躁進之過也嗚呼信非伊尹囂囂之象不足當之也九三良馬逐利艱貞曰間輿衛利有攸往周公之象大畜九三云云何也曰九三以剛居剛當乾之終而與上敵應是乃下之畜積已多而可行之時也故為良馬逐之象然自處重剛又遇剛應必艱難守正以謹績家修廷獻之學使真足為國家干城好仇黼黻皇猷如日間輿衛之義乃利攸往耳故象占如此象曰利有攸往上合志也孔子之傳大畜九三云云何也曰言九三之利有攸往者上九陽剛與九三陽剛之志合也六四童牛之牿元吉牿古毒反周公之象大畜六四云云何也曰六四以隂畜初陽有畜之于早之義故有童牛加牿象畜而如是自然養成其材而足為我用故占又有元吉象也象曰六四元吉有喜也孔子之傳大畜六四云云何也曰六四之元吉者蒙養既豫自然小子有造他日當得真才而心喜耳六五豶豕之牙吉豶符云反周公之象大畜六五云云何也曰據程朱二先生說六五以柔居尊位而為上所畜如豶去其勢以制其牙為得機會而可制之象義自可取但細味經文豶豕之牙四字終覺注與經語脈未合且如此則與六二不殊又五當君位乃士子嚮應而畜道至此已成之時也亦不應又言初事耳顧無從更向二先生面質也象曰六五之吉有慶也孔子之傳大畜六五云云何也曰言六五之吉者畜士而養之已成自然足為王國之楨為社稷之慶耳上九何天之衢亨周公之象大畜上九云云何也曰上九以陽踞止之上畜極而通不特三之日間輿衛者至此而良馬彚征即初二之利己者至此而進說輹者至此而行矣所謂上有好賢之主而士皆奮翼天衢鵬摶萬里者其在此乎故占有亨象象曰何天之衢道大行也孔子之傳大畜上九云云何也曰上九何天之衢者謂所畜者至此乃得其道大行耳蓋以上有尚賢之主故士乃得大行其道而以不家食吉為吉也頤震下艮上大畜而受之以頤何也序卦傳曰物畜然後可養故受之以頤頤者養也頤貞吉觀頤自求口實文王之彖頤云云何也曰頷頦曰頤所以飲食養人者也卦體外實內虛下動上止有頤象故取于頤也頤以養生惟正而固則吉故占有貞吉象也養有所養之道故象取于觀頤又有所以自養之術故象又取自求口實也然此言義象耳其實仔細玩味為卦全象似離本有觀象而四隂在中亦自有口實象則義象象象固未始不貫也彖曰頤貞吉養正則吉也觀頤觀其所養也自求口實觀其自養也天地養萬物聖人養賢以及萬民頤之時大矣哉孔子之傳頤彖云云何也曰言頤貞吉者養得其正不以饑渴害心則吉也觀頤者動而知止以觀其所為養也自求口實者頤以虛待實所求口實之物不可不自觀也彖義止此矣而又言天地云云者蓋孔子讀易至此又見得頤道更有至大至正而不徒自養之口實者在故又特推而廣之以示人使知頤時固至大耳其曰天地養萬物云云者則言萬物莫不養而皆資于天地萬民莫不養而皆資于聖賢天地養萬物聖人養賢以及萬民此養之得正而吉也天地聖人民物不能廢養則其為時豈不大矣哉此頤之不可不觀口實不可妄求而惟其時之為貴也觀聖人養賢以及萬民則知養賢方可以養民而養賢乃養民之實事不然所養非賢而令親民者多貪殘將日思剝民以肥已即人君悉心民瘼朝令夕申民且日見瘠羸耳故欲養萬民者以觀其所養之賢不賢為要也然使名曰養賢而不能使賢足以自養究之不能養及萬民耳何者既富方穀即凡厥正人固莫不然耳故養賢者又當以忠信重祿為大經虞書曰在知人在安民此即養賢及萬民之旨而中庸曰忠信重祿所以勸士此即養賢之實六經四子原相表裏善讀易者融六經四子于一貫可也象曰山下有雷頤君子以慎言語節飲食孔子之傳頤大象云云何也曰山下有雷山止乎上雷動乎下其卦象頤也君子體此而知此口之所為禍者由動不知止耳于是于言語則加慎于飲食則加節焉蓋言語口之所出也雖時當言語不能不動而言語而為難言訒不使多言喪心飲食口之所入也雖時當飲食不能不動而飲食而節性止貪不使嗜味生疾以此為養德養生之要務耳觀君子云云可知凡事以動而知止為自養之道初九舍爾靈龜觀我朵頤凶舍音捨朵多果反周公之象頤初九云云何也曰初九陽剛在下可不賴人而食者而乃上應六四是動于欲而仰人之養也故為舍爾靈龜觀我朵頤象頤而如此大非養正之義矣故占有凶象象曰觀我朵頤亦不足貴也孔子之傳頤初九云云何也曰言觀我朵頤是不能自觀其所養而徒仰養于人乃齊人乞墦昏夜之行亦何足貴乎嗚呼孔子之示戒更切矣六二顛頤拂經于丘頤征凶周公之象頤六二云云何也曰言六二以隂居柔不足自養求養于初則顛倒而違于常理求養于上則非其正應而征凶故象占取此李氏以顛頤指上以上居艮上為山顛也以邱頤為指五以征凶為五方仰養于上不能養二此亦足備一說象曰六二征凶行失類也孔子之傳頤六二云云何也曰言六二往上凶者二上非應行失其類也嗚呼今之于非類求養者皆于丘頤類也其當慎所往哉六三拂頤征凶十年勿用無攸利周公之象頤六三云云何也曰六三處動之終居非其正雖于上為正應然下動上止終不得其養故有拂頤征凶象又有十年勿用無攸利象十年不必于二體中求象只是形其終不可得之義象曰十年勿用道大悖也孔子之傳頤六三云云何也曰言十年勿用者養太失道終不可用耳下三爻多凶者以其處動耳頤固以動而知止為正也六四顛頤吉虎視耽耽其欲逐逐無咎耽都含反周公之象頤六四云云何也曰六四與艮同體居柔得正是賴上之養而得所欲者故象占為顛頤之吉又卦似離目有視象位當頤中為口實象而虎則視下而専逐逐其欲正以象其自求口實之義也頤而如此是欲動而能視以觀其所養者則亦可無咎耳故象占又如此虎視不必于象求解但取其求養得常之旨耳嗚呼文王善養雖伯夷太公皆來就之况同體耶故傳曰上施光耳象曰顛頤之吉上施光也孔子之傳頤六四云云何也曰言六四當上下之交與上九同體止而能明以仰上九之養而上九以大烹之養養之其上施本光故雖㒹頤而吉也六五拂經居貞吉不可涉大川周公之象頤六五云云何也曰言六五處尊位隂柔不能自養而止賴上之養是反乎常理也有拂經象然處柔得中能止而順上則亦自得吉道耳故占有居貞吉象但頤而如是雖得其正而終不足以濟險蓋其以柔處止而又無正應是力不足以養天下者亦安能涉險乎故占又有不可涉大川象象曰居貞之吉順以從上也孔子之傳頤六五云云何也曰言六五居貞之吉者大君虛己養賢上九一陽為所倚重五惟順上以養天下而已上九由頤厲吉利涉大川周公之象頤上九云云何也曰上九陽剛為艮主羣隂無不仰欲給求頤之所由成者在此所以厲者亦在此故象占為由頤厲吉又艮以一陽剛果無前則自足以濟大過之事而勝任故為利涉大川也然要之涉川取于艮剛之堅而實由于由頤之吉蓋惟上九足以養賢及萬民故無險不濟耳觀傳義亦自可見也象曰由頤厲吉大有慶也孔子之傳頤上九云云何也曰言由頤雖厲得吉者以克艱之心居此位則自能澤被天下大有福慶耳嗚呼觀上九一爻曰厲曰涉大川勢綦危矣而終得吉則亦可知動而明者之能保令終也嗚呼其斯伊周諸葛足以當之乎大過巽下兌上頤而受之以大過何也序卦傳曰不養則不可動故受之以大過大過棟橈利有攸往亨橈乃教反文王之彖大過云云何也曰為卦取于四陽居中過盛為大過而以上下二隂不勝其重為棟橈二五得中內巽外說為利往亨通而其義則謂大過有棟橈之象亦有利往亨通之占也彖曰大過大者過也棟橈本末弱也剛過而中巽而說行利有攸往乃亨大過之時大矣哉孔子之傳大過彖云云何也曰言大過者謂四陽大者過也棟橈者本末皆隂柔而弱也剛過而二五得中下巽而上說以行故利有攸往乃亨也其曰大過之時大矣者則孔子又于觀象繫辭時真見得天下大過之事非有大過人之材不能濟故推廣而贊歎之耳象曰澤滅木大過君子以獨立不懼遁世無悶孔子之傳大過大象云云何也曰朱子謂澤滅于木大過之象不懼無悶大過之行自為得之蓋以時危勢急之中而能獨立不懼天地閉藏之時而能遁世無悶此真屬過人之行然要非有大過人之識大過人之養則亦豈能砥柱中流屹立不移乎故大過人之君子其立身行己大過乎人原是其識見涵養大過乎人也大過之君子說而能巽蓋所謂處隂氣錮寒之時盡已順命者也否之君子儉德避難所以處否世大過之君子不懼無悶所以自盡道然要之儉德避難之君子原有此不懼無悶之學故能如彼耳不然則避難為懼禍而儉德有悶心非吾夫子翼易所取象之君子矣初六藉用白茅無咎周公之象大過初六云云何也曰大過以四陽居中而初六以隂柔處下有藉用白茅象孔子曰錯諸地而可矣藉之用茅慎之至也天下百凶皆起于放肆而百福皆起于敬慎敬慎若此尚何咎乎故占又有無咎象也嗚呼觀周公于藉用白茅則繫之無咎易四聖人教人寡過之書而其實教人敬而無失之書乎白茅柔嫩巽初柔象初居下而上踞四陽藉用象初六潔齊以承衆剛小心慎重自能無咎象象曰藉用白茅柔在下也孔子之傳大過初九云云何也曰言藉用白茅者以下承剛而能用柔則自然無咎耳誠以剛不可以承剛也然須合繫中此爻之文言觀之則爻義始盡耳蓋孔子初繫此爻時特釋象辭而繫言則並其義暢發之其餘如困六三爻大有上九諸爻皆然九二枯楊生梯老夫得其女妻無不利梯杜兮反周公之象大過九二云云何也曰陽過之時而二比初隂有枯楊生梯老夫得其女妻象是則强陽難過猶借隂柔以調和其下于六二尚為無咎而往則有利故占有無不利象二元根于下而上接羣剛有枯楊象下資于隂有萌蘖象二陽與初隂比為得妻象陽剛履中得正無不利象大抵象皆爻所本有非外借也故知讀易無事穿鑿附會他卦以隂陽正應為夫婦而大過以剛柔相比為夫婦蓋聖人取象固惟其義之適耳豈拘拘如律例之一定不可移易乎讀易者亦可以知易之為書不特其道變動不居惟變所適即象亦變動不居惟變所適也象曰老夫女妻過以相與也孔子之傳大過九二云云何也曰言老夫女妻者剛居二柔居初以隂之過調陽之過以相與也九三棟橈凶周公之象大過九三云云何也曰三四二爻居卦之中棟之象也九三不惟以剛承剛剛過必折亦且下近于地原有棟橈之象棟橈豈能勝重乎故占有凶象象曰棟橈之凶不可以有輔也孔子之傳大過九三云云何也曰言六三棟橈之凶者以九三棟已近地下邊容不得支撐而不可以有輔耳九四棟隆吉有它吝它徒何反周公之象大過九四云云何也曰九四位已居上而又以剛處之此棟之隆而不橈者也故象占取于隆吉然以下應初隂則是一橋兩棟三既橈矣而初六一隂兩承亦太費力矣故象占又取有他吝也然此語孔子未釋來歷皆以意釋顧不知竟何如耳象曰棟隆之吉不橈乎下也孔子之傳大過九四云云何也曰言九四棟隆之吉者蓋以四視三居位已髙似棟之隆然獨起不橈乎下耳九五枯楊生華老婦得其士夫無咎無譽周公之象大過九五云云何也曰九五以陽過之極又比過極之隂有枯楊生華老婦得其士夫象大過如此雖于隂陽之義無乖要非適可之耦雖可以濟壯陽之偏要未可成生育之功故雖無咎而亦無譽耳象曰枯楊生華何可久也老婦士夫亦可醜也孔子之傳大過九五云云何也曰言枯楊生華轉眼便萎何可久也老婦士夫亢陽極而求耦于窮隂既非其配又無生育天下事之最可怪而可醜者也上六過涉滅頂凶無咎周公之象大過上六云云何也曰上六以窮隂處大過之終所謂末弱者也于橋梁則為木過柔而滅于水于行人則為橋已斷而涉滅頂過涉之凶從可知矣然卦象為澤滅木而木中立于人象則涉滅頂而人未仆則又所謂獨立不懼遁世無悶者也故雖凶而又有無咎象既凶矣又無咎何也凶以言乎滅頂無咎言乎滅頂而仍涉也嗚呼孔孟雖隱滅于春秋戰國之時而其挺然獨立則于千古之道德無咎也龍逢比干雖死滅于夏桀商紂之時而其致命遂志則于萬古之綱常無咎也讀易者能于此引而伸之觸類而長之亦可以神明乎易而默成居安矣象曰過涉之凶不可咎也孔子之傳大過上六云云何也曰言上六過涉之凶雖凶其身而實義所當過亦不可咎耳觀孔子不可咎之釋則似宜解無咎以自已過涉尚于誰咎為近然如程朱之說自于名教有關也坎坎下坎上大過而受之以坎何也序卦傳曰物不可以終過故受之以坎坎者陷也習坎有孚維心亨行有尚文王之彖坎云云何也曰坎于象為陽陷隂中外虛中實而卦則上下皆坎是為習坎習坎之象取其陽實在中則為中有孚信取其中實則為中心誠一誠一則自能動物而為維心亨又惟誠一則行可嘉尚而居險亦尚乎行以出險則行有尚也蓋彖辭于卦中無義不顯固如此易道探賾索隱豈不信然彖曰習坎重險也水流而不盈行險而不失其信維心亨乃以剛中也行有尚往有功也天險不可升也地險山川丘陵也王公設險以守其國險之時用大矣哉孔子之傳坎彖云云何也曰言習坎者謂其為重險也于卦象則水流而不盈于卦義則行險而不失其信是為有孚也維心亨者以剛在中而亨也行有尚者本誠實而行則可尚濟險亦尚乎實行也天險云云者則孔子于傳彖時又推重險之用而廣之蓋以為此險在天則不可升也在地則山川邱陵也在王公則知險之不可陵而設為城郭潢池之險以守其國而保其人民是用險之時其用固甚大也象曰水洊至習坎君子以常德行習教事洊在薦反行下孟反孔子之傳習坎大象云云何也曰言卦以上下兩坎為水洊至故取義習坎是殆如水之原泉混混不舍晝夜盈科而後進者也君子體此取其有常則常久其德行而至誠無息居安資深取其洊習相受則以習熟其教令之事而勞來匡直使之自得蓋以德行非常不熟而教令非習不喻也為之不厭常德行也誨人不倦習教事也易之精藴孔子時時于言行證之欲求易義者能求之于孔子之行止言論即易道可以默識初六習坎入于坎窞凶窞徒坎陵感二反周公之象坎初六云云何也曰初六當坎之時而以隂柔處下是習坎而且入坎窞者也則終無出理矣其凶可知故象占取此象曰習坎入坎失道凶也孔子之傳坎初六云云何也曰言由習坎而更入坎窞失道之甚豈有出險之日乎無怪其凶也嗚呼世之積惡而益肆為惡亦猶是已九二坎有險求小得周公之象坎九二云云何也曰九二當坎之時處險之中所謂方有其險者也然以其剛中心亨則亦可以濟險而小得其求不至如初之入于坎窞耳嗚呼其申屠蟠袁閎之流乎程子曰剛則才足自衛中則動不失宜其解求得至明二正在險中故為有險剛中而實故求小得向非有險則求大亦得以二本陽剛而大者也然向非中實則且陷而無得故求得亦惟九二之中孚心亨也象曰求小得未出中也孔子之傳坎九二云云何也曰言求小得者以陽剛之才本可濟險而尚未出險故所求僅小得也六三來之坎坎險且枕入于坎窞勿用周公之象坎六三云云何也曰六三在下坎之終而上際上坎又以隂柔居不中正是來之坎坎險且枕而入于坎窞者也如三之所處如是是豈可用者乎故象占如是嗚呼古之君子見險而止知難而退者殆即善用此爻勿用之旨者乎象曰來之坎坎終無功也孔子之傳坎六三云云何也曰言六三來之坎坎云云者進退皆險處又不安若用此道當益入于險終無功耳六四樽酒簋二用缶納約自牖終無咎簋音軌缶俯九反周公之象坎六四云云何也曰言六四上險初出而近與五比是君臣之間險中交際以克艱時也以其爻位爻德皆隂虛有不豐不實之義故取樽酒簋二用缶以為艱難交際象又六以隂而四亦柔有誠信相得義故又取納約自牖象大臣如是始雖艱難終必無尤故占又為無咎也樽酒簋二用缶寧武子之橐饘馮異之麥飯豆粥庶幾似之納約自牖子房四皓之悟漢髙觸龍少子之悟趙后亦為近之也樽酒簋二用缶先儒或以樽酒簋三字為句二用缶三字為句又或以樽酒為讀簋二為讀用缶為讀前說以酒食器為義後說以樽酒簋食缶樂為義總之象大臣于君艱難中交際之義但得此義固不必定其何當亦無從質其何當也第觀離卦鼓缶而歌又詩云坎其擊缶則用缶于樂義差近耳六四之無咎總是于九五君臣結約雖在險難之中而同心有禮可以終濟之義九五坎不盈祇既平無咎周公之象坎九五云云何也曰九五以陽剛中正居尊位且居上卦之中時亦將出矣而尚居于中則有坎不盈象而以其時將出則又為祗既平象傳所謂水流不盈行險有常者九五之謂也故雖處乎險上而中孚心亨行尚則亦自無咎耳嗚呼其在中主創業之始則昭烈正位之際而在聖人克艱之心則大禹祗台之懷乎象曰坎不盈中未大也孔子之傳坎九五云云何也曰言坎不盈者雖陽剛中正而尚屬坎中未大光耳上六係用徽纆置于叢棘三嵗不得凶纆音墨置音置周公之象坎上六云云何也曰上六以隂柔居險極有係用徽纆置于叢棘三嵗不能脫出象居坎如此凶終釁末不可救矣故于占為至凶也嗚呼其怙終不赦而屏諸四夷者乎象曰上六失道凶三嵗也孔子之傳坎上六云云何也曰言上六如此云云者以其處險而隂柔成性故自致于罪而凶三嵗耳觀上六以隂柔失道而凶則可以悟彖辭二五以剛實而有孚心亨行尚之旨且以悟濟隂之端賴剛中也離離下離上坎而受之以離何也序卦傳曰陷必有所麗故受之以離離者麗也離利貞亨畜牝牛吉文王之彖離云云何也曰為卦上下皆離火之繼續不絶者也而其占象則為利貞亨而忌飛揚躁擾為畜牝牛吉而喜柔順安靜耳然離之二五兩隂爻俱在剛中原自有畜牝牛象而彖取于此易象往往有義象雙融恰好合符者此類是也彖曰離麗也日月麗乎天百穀草木麗乎土重明以麗乎正乃化成天下柔麗乎中正故亨是以畜牝牛吉也孔子之傳離彖云云何也曰言離者兩相附而謂之麗也如日月則麗乎天而光明百穀草木則麗乎地而光華物固無不以麗而化成者况人為萬物之靈明以繼明麗乎至正則大明普照有不化成天下乎而為卦二五皆以柔體麗上下二卦之中是重明無偏倚邪曲而麗乎正者也何用不亨是以象占取于畜牝牛吉也而凡人生麗人宜得其正居心欲麗于正從可類推他彖傳皆以推廣時用義之旨繫于釋彖辭後而麗獨繫于釋卦名下聖人之立言得心寫意固無成例有如是乎象曰明兩作離大人以繼明照于四方孔子之傳離大象云云何也曰言離之為卦兩明相繼故成繼明之離大人體此聰明睿智以照臨天下使天下無不達之隱九重無不照之時德則日新繼以又新治則善政繼以善教常使光明不息以坐照于四方如離之兩明相繼也嗚呼其古之明明德于天下者乎初九履錯然敬之無咎錯七各反周公之象離初九云云何也曰下卦之離取于日而初則日始出而未大曉有開户出門各營所事而視履錯然參差之象當此時也能謹而不為所錯乃得無咎故象占如此初在下有履象以剛居之有敬之象聰明每多躁擾則聰明反為自焚之具故宜于當初即敬象曰履錯之敬以避咎也孔子之傳離初九云云何也曰初九履端之始吉與咎之所由分人無不求吉而避咎者然莊敬日强安肆日偷天下之定理視履錯然之初而能以敬持之所避咎之道莫外于是六二黃離元吉周公之象離六二云云何也曰六二履柔處中如日之方中所謂柔麗乎中正以化成天下者也故其象為黃離得中而其占為元吉大利嗚呼其古之濬哲文明溫恭允塞者乎宜其得無為而天下治之吉也象曰黃離元吉得中道也孔子之傳離六二云云何也曰六二六五為離卦之主而二尤居中而得正文明之世而有用中之君含𢎞廣大蕩蕩平平所以一世遵道遵路而元吉也後世如光武治天下以柔道行之之言庶幾近之而秦之苛酷隋之操切適以自促其元氣也九三日昃之離不鼓缶而歌則大耋之嗟凶周公之象離九三云云何也曰九三于日為既昃之離人之老耋時也正宜有以自娛以忘其老倘不能鼓缶而歌則戚戚于日暮之窮而昏作罔休是自速其亡也大耄之傷何能免乎故占為大凶嗚呼世之耄耋而不知自樂者其尚鑒于此象曰日昃之離何可久也孔子之傳離九三云云何也曰言日昃之離時已過矣其能久乎此正宜自樂以娛老時也噫合象以觀而見周公孔子之為日昃者警亦至矣故曰易聖人為憂患天下後世而作也九四突如其來如焚如死如棄如突如忽反周公之象離九四云云何也曰九四前火來迫後火相促而自已又以剛乘之其凶可想而知故象占特取于突如來如焚如死如棄如也人之處非其正而又輾轉附麗益非其正者俱可作此觀已象曰突如其來如無所容也孔子之傳離九四云云何也曰言九四之突如其來如云云者謂其麗太不當無所容之象也六五出涕沱若戚嗟若吉沱徒何反周公之象離六五云云何也曰六五柔麗乎中與六二同而位則人君之位人君以一身坐照天下而自恃其聰明則昏蔽反多而大化不成必須時時有臨淵履薄克艱憂厲之心乃為麗乎中正故象占特取于出涕沱若戚嗟若則吉也二若字亦即五如字之義極形其憂危戒懼之象耳不必于卦爻索象也嗚呼其古知難之君乎一言興邦是即其吉耳象曰六五之吉離王公也離音麗孔子之傳離六五云云何也曰言六五之吉者所麗得王公之正位也蓋居在上之勢而明察事理畏懼憂虞以待之乃得吉耳所謂危乃保其存者六五其知之矣故六五正為柔麗乎中正以化成天下者耳上九王用出征有嘉折首獲匪其醜無咎周公之象離上九云云何也曰上九居明之終履位之髙明之及乎至逺者也又離為甲胄有征象故象取于出征而嘉折首獲匪其醜焉蓋用兵欲其殲厥渠魁脅從罔治以正有罪而安四方耳然非王者真有不濫及脅從之仁察及首從之明則亦不能嘉折首而匪獲醜也故于上九離之繼明逺照發之嗚呼王者固以恩威並用寬猛相濟為明之至乎象曰王用出征以正邦也孔子之傳離上九云云何也曰言王者用此上九之德以出征而行罰乃所以正治其邦國剛明居上之道也然則聖王之出征固義取于正邦匪是即不以興師動衆從可知矣豐川易說卷五
