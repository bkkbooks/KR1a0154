body:
  text: 豐川易說卷九鄠縣王心敬撰下經艮艮上艮下震而受之以艮何也序卦𫝊曰物不可以終動止之故受之以艮艮者止也艮其背不獲其身行其庭不見其人無咎文王之彖艮云云何也曰艮體一陽上止外實內虛如人之妄見胥屏善性明靜時也而卦則兩山對止不相往來尤為各止其所之象故於義尤屬得止之正耳蓋學問之道不震動不能進德非艮止不能成德故震卦之後繼之以艮使知艮因震逹震以艮止動而能止止以善動雖動履紛紛之中而此中常靜常定常安常慮常如兩山之凝凝則主敬立極與天地合德日月合明德至是乃為明德而善至是乃為至善耳故艮以艮其背而人我皆忘無咎也然其所以取義艮背者人之一身變動盡在乎面不在於背故背為不見之地苛艮其面則終不能止縱使知其動而止之亦終不止也何者止非其所故耳唯艮其背則面皆如背而一切耳目口鼻四肢之所為一如其背故雖酬酢萬變而天君明靜屹然如山內無我而不獲其身外無物而雖行庭不見人矣嗚呼其孟子不動心之學乎若如告子輩之強制乃艮其限列其夤厲薰心者也烏足語之彖曰艮止也時止則止時行則行動靜不失其時其道光明艮其止止其所也上下敵應不相與也是以不獲其身行其庭不見其人無咎也孔子之𫝊艮彖云云何也曰言其所謂艮者取諸一陽止諸二陰之上得所止也其所以取於得止者非不動而一於靜之謂一於靜則又獲靜之身見靜之人不得為止得其所矣惟時止則止時行則行動靜以時無行非止而其道光明耳而所謂艮其背者言乎止其所也而其義則取諸上下兩山隂陽敵應不相往來也止而如此則自然天光發乎泰宇其動如靜其行如止內不牽於耳目口鼻四肢而不獲其身外不纍於聲色臭味安佚而行庭不見其人一生皆明定之日無處非明定之境自燕居獨處以至於大庭廣衆皆吾背之艮也何咎之有嗚呼微矣非文王緝熙敬止不識知而順帝之則孰與滿其量乎時止四句明艮非致虛守寂之學乃動靜時中之㫖如四時之錯行而不移其度日月之代明而弗動其體也此乃大學明新之必始定靜孟子之學問在求放心聖學之一大頭腦而乾翼知至至之知終終之實義也是在善學易善進道者知所自占耳象曰兼山艮君子以思不出其位孔子之象艮云云何也曰言物之善止莫如山而艮則兩山連立各止其所而不相應是為兼山艮君子體此而知人心處感之道亦當如山隨此身所在之位即思所當止之理而不出其位焉於富貴貧賤患難也則素位而行不願乎外於君臣父子五倫也則仁敬孝慈各止其所於視聽言行九事也則各思所以善其行以無失其時安土敦仁如兼山之艮也雷風水火澤五子之兩者皆有來往之義惟艮兩山並峙不相往來故於義為止也思心之用豈能不來往者惟是動靜之間能不出其位而畔援歆羡之盡絶一一還他一個當止之所則雖萬變紛紜而吾心屹如山嶽不可移易即兼山之義耳此乃聖學之歸極故大學綱領以止至善終之初六艮其趾無咎利永貞周公之象艮初六云云何也曰艮之六爻以身取象初六居下為足趾故象為艮其趾趾動而能止則躁動之咎亦免矣然動靜惟時乃得正而可久故占象又為利永貞以戒之嗚呼其步亦步之學乎象曰艮其趾未失正也孔子之𫝊艮初六云云何也曰言初六當初而即能止亦未為失正但當求永貞之道為得耳趾本動物而能止未為失正但當艮初即欲不行亦恐非時行之止故戒以利永貞蓋即爻之中即示以補過之道也嗚呼易無一卦無一爻非教人寡過之㫖而於此等處尤其彰明較著矣讀易不逹寡過之義真飲食忘味耳六二艮其腓不拯其隨其心不快拯音丞周公之象艮六二云云何也曰六二於位為腓腓乃隨足以動之物而當艮止之時心本欲不行而又不能不隨足以動是為不拯其隨其心不快之象嗚呼是欲其止而恨其不能止之學乎日月至焉殆類是歟象曰不拯其隨未退聽也孔子之𫝊艮六二云云何也曰言不拯其隨其心不快者謂雖不能拯其隨而即使之止亦不肯自安於隨而便聽足之命此意固可取耳未退聽三字最是初學知止得止之機蓋初學豈易即臻於止惟是知不能止而不甘退聽則必自求所以光明之道而日進於光明於以得止不難矣九三艮其限列其夤厲薰心夤引真反周公之象艮九三云云何也曰九三於位為上下之交而以剛據二體之中限絶上下其於人身則為夤限之地是艮而斷列其夤者也此非勉強把持亦莫能至此然其危厲薰心亦甚矣嗚呼限非背也而欲止止其限也而厲薰心此亦知學之貴艮而未得所以艮而光明之道故錯認機緘乎告子之不動心殆類是也千古不動心之道真至此而列其夤矣象曰艮其限危薰心也孔子之𫝊艮九三云云何也曰言九三之艮其限雖自以為艮矣而止非其所危厲之薰心亦甚也然愚讀易至此又以惜告子輩之不聞此言耳六四艮其身無咎周公之象艮六四云云何也曰六四當身之位以隂處柔而居艮是艮其身者也艮其身則亦自無非禮之視聽言動矣乃無咎之道也故象占如此止諸身以不僅屬貌恭看為當謂凡身之所動無不得所止耳咸四於此位為心而艮以四為身者身可統心且咸取心感而艮取其背言身自於艮為切也象曰艮其身止諸躬也孔子之𫝊艮六四云云何也曰言六四之艮其身為止諸其躬而視聽言動無不得其所止也六五艮其輔言有序悔亡周公之象艮六五云云何也曰六五於位為輔頰之地而以柔中處之是艮其輔而言不妄發各得其序者也言行君子之所以動天地言而有序自然言皆法言而無一非禮之言雖言滿天下無怨惡矣悔安得不亡乎嗚呼言豈細故哉象曰艮其輔以中正也孔子之𫝊艮六五云云何也曰言六五之艮其輔者六五艮而得其正中自然為難言訒言必有中而無悔也上九敦艮吉周公之象艮上九云云何也曰艮於卦為一陽止於二隂之上敦實堅確隆然守安而上九又踞兩卦之最上以為艮道之成是大人之真能止善君子之至死不變者也艮而至此渾厚淳龎安土如山矣彖之所謂不獲身不見人者其在此乎真大吉之道豈獨無咎而已耶故象占如此嗚呼堯舜之聖而安止幾康孔子之聖而從心不踰其敦艮之至極乎下此如曽子之賢而疾啓手足武公之賢而耄修不倦是亦無愧敦艮之義者也讀易者能踐敦艮之㫖以幾成德不難矣象曰敦艮之吉以厚終也孔子之𫝊艮上九云云何也曰言止道貴終佻薄之人徒自失其所止而鮮終耳上六敦艮之吉者謂其敦厚所止以為令終之道也漸艮下巽上艮而受之以漸何也序卦𫝊曰物不可以終止故受之以漸漸者進也漸女歸吉利貞文王之彖漸何也曰漸取進之漸義為卦止於下巽於上木因山髙以止為體以順為用有漸進義而象占則為女歸吉為利於貞也觀漸彖女歸吉利貞之㫖可知士君子進德修業誠能進而得正自無德之不進無業之不修更若本此道以進身涉世亦當不至有欲速好徑之失浚恆始深之凶漸臻無所不吉之道又豈獨吉於取女也易道神明皆得但在善用易者知反身自占耳彖曰漸之進也女歸吉也進得位往有功也進以正可以正邦也其位剛得中也止而巽動不窮也孔子之𫝊漸彖云云何也曰言漸之進也謂其漸以進如女之歸以漸則吉也蓋止而巽莫如女歸之無造次陵節得正而吉也何言乎利貞也卦本乾坤六進居四隂得隂位九退居三陽得陽位一往而剛柔以正是有功也而所以謂之有功者何也君子進以正則上下莫不正而可以正邦者在是且三進則柔居四九退居下則中四爻各當其位而九五以剛得中下皆以隂從陽以下從上君正莫不正而國定也又下止則內而安靜上巽則外而和順其動有常其行不疚自然如卦之木因山髙止而日進而何憂於窮乎此漸之所以利貞也按注謂漸之進之字疑衍或是漸字愚嘗反覆經義漸進中加一之字似是言漸之進以别於晉之進耳蓋晉亦進之義但晋之進為君臣而漸之進則男女故晋則康侯日晉三接而漸則利如女歸之以六禮既備也觀進以正可以正邦可見枉己者必不能正天下古之君子所以不肯枉道狥人也又觀止而巽則動不窮可知居德莫善於知止進德莫善於巽順而古之君子所以強立不反日進無疆也嗚呼漸之時義大矣哉象曰山上有木漸君子以居賢德善俗孔子之𫝊漸象云云何也曰言為卦艮山巽木木生於山以漸而長外若不見其長而日以浸盛是物之循序不驟者莫如山上之木也君子體此知居賢德善風俗皆取乎漸而不以欲速見小亂之亦如山上之木焉蓋賢德非積纍無成習俗非久道難化也注謂或賢字衍或善下有脫字得之然相其語脈似善下脫字也居賢德取於山之陽剛上止善俗取於巽之風行入人又俗為風動之義而止居則宜於賢德巽風則又宜乎上善則正聖人教人隨事從道之義而亦可見其精義入神之妙也初六鴻漸於干小子厲有言無咎周公之象漸初六云云何也曰漸義取漸進而鴻之為物其飛有序知長幼之禮其羣有偶厚夫婦之别其來有候適寒暑之期物之進而能漸者亦莫如鴻故又取為女歸以漸之象夫彖以女歸取漸象而象又以鴻象女歸然則象者像也所以顯義之難顯而又以一象顯千萬象也吁知者觀其象而思過半矣初六為鴻漸之始是鴻之去水而漸干者也以其居止之下既不當位而外又無援故為危厲而有言然亦自無咎也故象占如此女之將歸如鴻之離水故稱干猶在未歸故稱小子女子始字將逺父母兄弟有唧唧不安之意故又稱厲稱有言以其未能遽進自于漸義無咎耳象曰小子之厲義無咎也孔子之𫝊漸初六云云何也曰言小子之厲于漸義自無咎也故初象取小子厲又取無咎耳嗚呼此一爻也其在於女則將歸未歸之時乎而在於士則方在草野而人主欲羅致之候在於學問則方屬疑殆之地討論之初矣故易之為道反身自占無卦不可用無爻不可用亦且無人不可用無時不可用只視人之知用何如也六二鴻漸于磐飲食衎衎吉衎苦干反周公之象漸六二云云何也曰六二漸進於初又與五為正應然尚居止中是為鴻漸于磐飲食衎衎之象漸而如此真如女之得正配良配而得所矣自有吉道故象占如此象曰飲食衎衎不素飽也孔子之𫝊漸六二云云何也曰言六二柔止得中與五正應其飲食衎衎乃得正之養非徒素餐之飽也然則士之未得正應而輕身妄進以食人祿者皆素飽之類矣九三鴻漸于陸夫征不復婦孕不育凶利禦寇周公之象漸九三云云何也曰九三居止之陽過剛無應是鴻之漸陸者也鴻水鳥而漸陸則大非所安矣故其象為夫征不復婦孕不育之凶然以其剛而善於止物也則又為利用禦寇之象陸象艮三之陽夫征象艮三陽之往上婦孕不育則三以少男無正應徒與四長女相比而孕是為夫征不見復婦孕不敢育也故為失道而凶嗚呼男女之進不以正者皆是類也而士之進不以正亦從可例矣象曰夫征不復離羣醜也婦孕不育失其道也利用禦寇順相保也離力智反孔子之傳漸九三云云何也曰言夫征不復者三以一陽離羣醜而獨往也婦孕不育者失其正應非道而比也利用禦寇者陽止隂上順而下濟以相保也觀周公孔子於九三一爻未嘗不摘其離羣失道之凶而正未嘗不揭其利於禦寇之用爻中本有之善惡二聖人一一闡出無遺即此見聖人之精義入神亦見聖人之大公無我後世惡而不知其美遇人一言之失便舉其生平棄之嗚呼是亦不占而已六四鴻漸于木或得其桷無咎桷音角周公之象漸六四云云何也曰六四離乎下卦而進於巽初又以隂居柔處亦得平故為鴻漸于木或得其桷象漸而如此非其正矣然以巽順漸得其安亦尚無咎也故象占如此象曰或得其桷順以巽也孔子之𫝊漸六四云云何也曰言六四之或得其桷者以其巽順得棲身之地故無咎也九五鴻漸于陵婦三歲不孕終莫之勝吉周公之象漸九五云云何也曰九五居艮之上當巽之中而以剛中應下六二之柔中故為鴻漸于陵之象與二應而限以三四為三歲不孕之象然巽體剛中中乃正應則亦終莫之勝而得吉也故象占如此五之漸陵非不安乃不苛安也三歲不育非不育不宜苛配而育也終莫之勝而吉則守貞擇配終必得偶也嗚呼在女則孟光之於梁鴻而士則伊尹太公諸葛之流歟縱終不勝猶謂之吉而况終莫之勝乎然則士君子抱道自處者亦可自信矣象曰終莫之勝吉得所願也孔子之𫝊漸九五云云何也曰言九五終莫之勝者漸而得位得正剛中如此自然有功正邦巽止不窮而得所願也上九鴻漸于陸其羽可用為儀吉周公之象漸上九云云何也曰上九以剛居漸之極德以漸而崇是為漸于九達之逵鴻漸至此振翮髙飛乘風翺翔其亦超然流俗之表矣然仰視其羽舒徐雍容有倫有序可用為人道之儀何吉如之嗚呼桐江一絲丕振二百年無限忠節義氣之風上九之吉非子陵孰足當之范文正謂為蠱之上九特言其志之髙耳亦豈知其志正可則乎故惟漸之上九乃為盡先生之功也象曰其羽可用為儀吉不可亂也孔子之𫝊漸上九云云何也曰言其羽可用為儀吉者以鴻飛有序不自凌亂人道之儀型莫過於此鴻至此而後盡漸吉之道也而觀於孔子之以不自亂解可用為儀然則士君子進退行止安容自亂哉歸妹兌下震上漸而受之以歸妹何也序卦𫝊曰進必有所歸故受之以歸妹歸妹征凶無攸利文王之彖歸妹云云何也曰為卦以兌之少女從震之長男是為歸妹而卦體則下說上動為說以動從之義從男不以正而以說動以此而往凶亦甚矣何往而利乎故象占如此歸妹與漸反蓋少女尚未可歸而從震長男是少女無知而徒以情欲相感也女之歸人不以正而相感以情欲則是見可欲而昏動不以禮矣安往而可乎故漸女歸吉而歸妹征凶妹為少女無知之象言其無知昏昧也觀歸妹之彖是以君子貴艮漸而戒輕說彖曰歸妹天地之大義也天地不交而萬物不興歸妹人之終始也說以動所歸妹也征凶位不當也無攸利柔乘剛也孔子之𫝊歸妹彖云云何也曰言歸妹者少女歸長男是為男女配合天地之大義也蓋天地不交則萬物無由發生男女不合則人道無由終始故歸妹為天道人事之至情耳然其為卦下說上動狥情昧禮所歸者乃無知之妹也故謂之歸妹而曰征凶者則是謂其卦位皆與漸反漸于位皆正而歸妹則隂上陽下隂外陽內位皆不當也又曰無攸利者則是謂二四本隂而得剛三五本陽而得柔以柔乘剛縱欲遠理終必將敗故無攸利也象曰澤上有雷歸妹君子以永終知敝孔子之𫝊大象歸妹云云何也言澤上有雷雷動澤隨為男女昏昧以說而動之象君子體此則凡事始慮其終動謹其敝焉蓋物必有終有以永之則令終事久必敝有以知之則不敝故君子鑒歸妹征凶無利而用心如此也初九歸妹以娣跛能履征吉娣音弟跛波我反周公之象歸妹初九云云何也曰九于初最少而上無正應有娣象故為歸妹以娣蓋娣女之從嫡婦者也非嫡則不敢輒行而似跛矣然其以剛居初是女子而尚有賢正之德者以是為娣往自得吉故象占如此象曰歸妹以娣以恆也跛能履吉相承也孔子之𫝊歸妹初九云云何也曰初以少媵長是以常禮行也跛能履吉者娣承嫡而行初剛自能承嫡以佐其君也九二眇能視利幽人之貞周公之象歸妹九二云云何也曰九二陽剛得中女之賢而待聘者也而居於澤中最幽之地是乃女之行不踰閨窺不出户而幽閒貞靜者耳故其象為眇能視占象為利幽人之貞蓋二乃少女得中為正嫡小君之象初與三皆待以行而能守正以需月之望故為幽人之貞如是則利也象曰利幽人之貞未變常也孔子之𫝊歸妹九二云云何也曰言利幽人之貞者處歸妹之時衆皆急欲二獨守中未變六禮待行之常道也六三歸妹以須反歸以娣周公之象歸妹六三云云何也曰六三隂柔不中正上無正應又為說主而與四相比以女悅男是乃女之不正而人莫之取者也故為歸妹以須而反歸以娣之象象曰歸妹以須未當也孔子之𫝊歸妹六三云云何也曰言歸妹以須而反歸以娣者三與四本非其偶而徒以悅而動歸之於理未當故宜舍所須而反也九四歸妹愆期遲歸有時周公之象歸妹九四云云何也曰九四以陽居上體而下無正應是賢女不輕從人而愆期以待于歸之象嗚呼古之孟光非耶象曰愆期之志有待而行也孔子之𫝊歸妹九四云云何也曰言九四愆期之志乃有待于良匹而後肯行不然則寧愆期也六五帝乙歸妹其君之袂不如其娣之袂良月幾望吉袂彌計反周公之象歸妹六五云云何也曰六五柔中居尊下應九二于歸妹則為帝乙歸妹之象於身之飾則為君之袂不如娣之袂良之象然處貴而能下賤貴德不貴飾乃女德之最盛如月之幾望者也歸妹如此吉可知矣象曰帝乙歸妹不如其娣之袂良也其位在中以貴行也孔子之𫝊歸妹六五云云何也曰言帝乙之歸妹在當日原不如其娣之袂良也蓋其位當中正是能以貴行其中正之道耳上六女承筐無實士刲羊無血無攸利刲苦圭反周公之象歸妹上六云云何也曰上六以隂柔居歸妹之終而無正應是約婚而不終者也故其象為女承筐而無其實士刲羊而無其血將何往而利乎象曰上六無實承虛筐也孔子之𫝊歸妹上六云云何也曰言上六之無實者上六隂虛無實是夫婦之不終而承虛筐者也嗚呼歸妹固以得中應正為實乎匪得中匪正應則皆承虗筐之類耳宜戒哉豐離下震上歸妹而受之以豐何也序卦𫝊曰得所歸者必大故受之以豐豐大也豐亨王假之勿憂宜日中假庚白反文王之彖豐云云何也曰豐之為卦火明雷動是乃君作於上明照天下無幽不照無微不動而成崇隆豐大之業者故豐有亨道而所以亨則王假之也蓋惟明主當陽知臨四海故能至此耳然當此時也又勿以日無常中為憂但宜時時明此明德本明以動而不向於晦暗即時時日之方中耳嗚呼其古帝堯之欽明大禹之日孜成湯之聖敬日躋乎宜其卒享豐亨之慶也大學之日新又新乃日中之實義蓋日新則新民新命而時時日中即時時豐亨耳又何以時無常豐為憂乎彖曰豐大也明以動故豐王假之尚大也勿憂宜日中宜照天下也日中則昃月盈則食天地盈虛與時消息而况于人乎况于鬼神乎孔子之𫝊豐彖云云何也曰言豐之為義取乎其大也為卦下明上動是為明以動故成豐大也王假之尚大者惟王向明出治知臨天下所尚者大故能享其大而亨也勿憂宜日中者但宜以明動照臨天下即天下時時日中也又何憂乎所以然者日中則昃月盈則食此乃天地四時自然之盈虛消息不惟人不能違即鬼神亦不能違何用憂乎且觀於天地盈虛與時消息則知日昃者正復能中但在王者時時明動即時時日中抑又不宜憂日之不中而只宜圗日之方中也吁聖人之示教處豐者亦至矣象曰雷電皆至豐君子以折獄致刑折之舌反孔子之𫝊豐大象云云何也曰言雷電並至是明威並至也故謂之豐君子體此以折獄而照察奸僞致刑而懲創不貸一如雷電之並至焉耳豐與噬嗑皆明動相兼噬嗑則明罰敕法而豐則折獄致刑者噬嗑動先於明慮或未中故明罰敕法以示威於下豐先明而後動既得其情故折獄致刑以運威於上大抵折獄非明不當而致刑非斷不决又折獄亦須雷之斷而致刑亦須離之明二者原交相資故噬嗑豐二卦皆用之也然則不明不斷者何以明罰敕法又何折獄致刑哉初九遇其配主雖旬無咎往有尚周公之象豐初九云云何也曰為卦明動相資初以剛處明始而四以陽為動始是初與四同德相應而四與初為敵體配主也敵體相遇雖旬何咎往自有尚而必遇爾故象占如此愚按配主之辭則旬以均平敵體取明動兼資為正若以離日謂旬為日取旬日相遇以見天地盈虛消息之自然義亦通也姑記於此俟質髙明象曰雖旬無咎過旬災也孔子之𫝊豐初九云云何也曰言初九之雖旬無咎者明動原屬配主故均敵正自無咎但過旬則明斷必偏斯為災耳六二豐其蔀日中見斗往得疑疾有孚發若吉蔀音部周公之象豐六二云云何也曰六二正成離之主以柔中應柔暗之五又在二剛之間是如豐其蔀而日中反見斗之在天者也以是而動必反見疑然以二之明中遇五之動中自必兩心交孚而始疑終發以得吉蓋亦天道消息盈虛之自然也故象占如此象曰有孚發若信以發志也孔子之𫝊豐六二云云何也曰言六二之有孚發若者二為離主以虛明誠信之心見照於五以發其見信之志故初疑終吉也嗚呼觀信可以發志則知疑疾固可以信藥醫也士君子無慮人之見疑止慮吾之不信九三豐其沛日中見沫折其右肱無咎沫作昧亡大反坊本莫佩反折食列反周公之象豐九三云云何也曰九三居震之下上有晦明之雷雨處離之終下有見傷之昃日故其象為上遇豐沛之雨日中不見日而反見雨沫之象又為折其右肱而不可動作之象然日中則昃而日昃則復中日明必晦而日晦亦必明乃消息盈虛之自然但得日在則亦自無咎也故象占如此注謂沛為幡幔沫為小星似覺不及沛沫作雨為不煩詮釋蓋沛沫字皆從水而三處雷雨晦明之下於雨近也象曰豐其沛不可大事也折其右肱終不可用也孔子之𫝊豐九三云云何也曰言豐其沛如日之值雨豈可動大事乎折其右肱終尚何用乎九四豐其蔀日中見斗遇其夷主吉周公之象豐九四云云何也曰九四為動主而正當雷動晦明之地則是亦日之豐於蔀日中不見日而反見斗者也然四與初同德相應故初視四為配主尚往而四亦視初為夷主必遇是乃日之既晦而復明人之始疏而終遇亦天道之自然而大吉者也故象占如此象曰豐其蔀位不當也日中見斗幽不明也遇其夷主吉行也孔子之𫝊豐九四云云何也曰言豐其蔀者謂四處雷動晦明之位不當也日中見斗者謂幽暗不能明見也遇其夷主者則同德相遇明可資動而行之最吉者也六五來章有慶譽吉周公之象豐六五云云何也曰五居動中而與離中相應於時則為雷雨既過天日開霽而萬象光華在王者則為如日中天明動相資而尚大宜照故其象為來天下之明章享坐照之豐亨而王者亦自得明主之美譽耳此正彖所謂王假日中豐之亨而最吉者也故象占如此象曰六五之吉有慶也孔子之𫝊豐六五云云何也曰言六五之吉謂其能明以資動坐照天下而有慶也上六豐其屋蔀其家窺其户闃其無人三歲不覿凶闃苦鶪反周公之象豐上六云云何也曰上六以隂柔居動終是日之已晦者矣而又遇豐沛折肱之九三是不獨豐其蔀且豐其屋而蔀其家矣斯時也日之既晦豈復見人家之獨豐豈復得人其與困之困蒺藜坎之置叢棘者殆同一不可救耳入其室且必不見其妻縱三歲豈能興而覿乎凶亦甚矣嗚呼豐其屋亦何益哉象曰豐其屋天際翔也窺其户闃其無人自藏也孔子之𫝊豐上六云云何也曰言上六之豐其屋者亦自謂能豐其家富而大有若與天游耳而不知正所以自蔀其家必至有屋無家有户無人自豐而實以自藏其身也嗚呼商紂鹿臺巨橋之豐殆類是乎孔子繫易至此蓋心惜之至而遂不覺其慨嘆之獨至矣豐其屋而凶至此者以其止知動而自照不知所以照天下不能如日之中故終於不能自照而反致幽暗耳然則王者照天下不求自豐而自豐在其中照一身欲以豐屋而反成藏其身彖曰宜日中信乎其宜日中也一豐屋而翔天者自藏得失禍福之機亦可畏哉旅艮下離上豐而受之以旅何也序卦𫝊曰窮大者必失其居故受之以旅旅衆也旅小亨旅貞吉文王之彖旅云云何也曰旅羈旅也蓋為卦上離火下艮止火在山上去其所止而不處有旅之象下止上明亦為止於明明而止有旅之義故謂之旅也有小者亨之道故為小亨又在旅亦惟守正知止則吉故又為旅貞吉然曰小亨貞吉則旅之為道固在柔之得中而非正不吉又可知矣彖曰旅小亨柔得中乎外而順乎剛止而麗乎明是以小亨旅貞吉也旅之時義大矣哉孔子之𫝊旅彖云云何也曰言旅之小亨者謂離之柔得中乎外而順乎在內艮止主人之剛是以內卦之止能麗外卦之明遂有功於旅而旅小亨旅貞吉也至其大旅之時義者蓋孔子𫝊彖時又見得卦之內體三爻則為商賈士庶人之旅外體三爻則為君侯卿大夫之旅而或以旅興或以旅喪其時義為大也象曰山上有火旅君子以明慎用刑而不留獄孔子之象旅云云何也曰言火在山上逐草而行不能久留故象旅君子體此而知人情之留滯寃抑者莫如獄於是以離之明艮之慎火速因罪用刑而不使獄囚之留滯亦如火之在山耳蓋獄情留滯既使正犯之旅情愁苦難堪亦且令其舉家奔走鄉里牽連而盡皆成旅故用獄一事不特不明者為害甚大即明而不决不速者亦為害不淺明慎用刑而不留獄聖人真窮理盡性之至者哉初六旅瑣瑣斯其所取災周公之象旅初六云云何也曰初六隂柔居旅初旅之在下而瑣瑣者也旅而如是是但知旅之宜慎而不知乃所以取災者耳蓋寬一分則童僕受一分之惠而寬一著亦主人盡一分之心也象曰旅瑣瑣志窮災也孔子之𫝊旅初六云云何也曰言初六之旅瑣瑣而災者非有别災也志窮於刻瑣故出門即災耳嗚呼旅豈可以隂柔刻削處乎六二旅即次懷其資得童僕貞周公之象旅六二云云何也曰二以柔順中正之德處旅則剛柔得中主人既止而相麗童僕亦順以聽命所謂小亨者二得一半矣故有旅即次之安有懷資之裕有得童僕之貞蓋旅之最得其道者也故象占如此象曰得童僕貞終無尤也孔子之𫝊旅六二云云何也曰言二以中正之德而得童僕貞不特此日無尤即更進一日亦終無尤不特在此處無尤即更旅一處亦終無尤也蓋童僕固與旅人終始者也童僕不得其貞即今日無尤終必得尤固所必然耳九三旅焚其次喪其童僕貞厲喪息浪反象同周公之象旅九三云云何也曰九三以剛處剛下離二隂上接離陽在旅則為過剛不明又不知止旅而焚次喪童僕長得危厲者耳故象占如此象曰旅焚其次亦已傷矣以旅與下其義喪也孔子之𫝊旅九三云云何也曰言旅而焚其次亦已傷矣况又有喪僕之事乎則以當旅時而以此過剛與下若不喪僕無是理也故曰其義喪也此處旅而過剛又有所不可者也大抵瑣瑣固取災而亢厲亦致焚故在下之旅以六二為得也九四旅于處得其資斧我心不快周公之象旅九四云云何也曰九四方進乎下止之上而就於離明之位是尚無六五正位之安而旅于處者也彼其以陽為動主而又下有初應是亦得其資者矣然終屬旅人未得就安則其心亦不快耳蓋晉文居齊之日昭烈寓荆之時得資斧矣而其心實鬱鬱不樂也象曰旅于處未得位也得其資斧心未快也孔子之𫝊旅九四云云何也曰言九四之旅于處宜得位矣而尚未得位故雖得其資斧而志自有在心終未快也六五射雉一矢亡終以譽命射石亦反周公之象旅六五云云何也曰六五柔順文明正彖之所謂柔得中而順乎外亦分得一半貞吉者也離中文明為雉有射雉象陽為直為矢易一陽以一隂一矢亡象蓋在旅則始出失利始舉失事其象固如此然以五乾之剛健而得柔之文明得中乎外以順剛則亦終以射雉之故獲文譽文命之上及而終以譽命也故象占又如此象曰終以譽命上逮也孔子之𫝊旅六五云云何也曰六五之終以譽命者始雖未吉而終必得位上及也上九鳥焚其巢旅人先笑後號咷喪牛于易凶喪易並去聲周公之象旅上九云云何也曰上九以剛處旅之終象其在離之上則為鳥焚其巢蓋下之旅尚可依次而上之旅則無歸也象其在離口離目則為先笑後號咷蓋焚巢則號咷自其情形又惟先笑樂自得而其後號咷自悲亦理也象其離乎六五之陰而即乎上九之剛則為喪牛于易蓋自恃無事而不知大物即喪于此也嗚呼旅而至此凶尚可言耶故象占又如此象曰以旅在上其義焚也喪牛于易終莫之聞也孔子之𫝊旅上九云云何也曰言上九以旅在上者言乎其義之自取焚巢而無所于歸也喪牛于易者言乎其般樂怠傲曾一善之不聞自以為日亡吾乃亡而竟不知牛之已喪而終莫聞知也嗚呼夏之太康隋之煬帝非耶大抵在下者雖欲不旅不可得但在性情中正柔順即可無咎過剛即失柔中順剛之義在上者則義不可以旅不得已而旅非譽命上逮有不可過剛亦必有焚巢喪牛之凶甚矣處旅之道固亨以柔順乎剛而凶以純恃乎剛也剛可恃乎哉然又豈獨旅也巽巽下巽上旅而受之以巽何也序卦𫝊曰旅而無所容故受之以巽巽者入也巽小亨利有攸往利見大人文王之彖巽云云何也曰巽之為卦一隂伏於二陽之下蓋隂善入而陽伏聽所謂巽而能權非怯懦之謂也其所以取象於風者物之虛而善入者莫如風隂巽乎陽亦如此也其所以取於君命者撓萬物者莫疾乎風君命之動萬民亦猶是也而為卦則重巽相因是以隂之小者得亨而有攸往之利見大人之利耳嗚呼君子小心謀理殫思精義無微不入無隱不搜其即學問之重巽乎彖曰重巽以申命剛巽乎中正而志行柔皆順乎剛是以小亨利有攸往利見大人孔子之𫝊巽彖云云何也曰言重巽所以申命也蓋風為天之號令命乃君之風行大君有命三令五申欲巽以入之故重巽以申之也所以小亨利有攸往利見大人者卦之九二以剛而巽乎五之中正故申命之志得行而二柔皆順乎剛是以小亨利有攸往利見大人也姤之彖曰后以申命誥四方渙之象曰渙汗其大號可知巽之大人惟九五當之象曰隨風巽君子以申命行事孔子之𫝊巽大象云云何也言巽乃風之相隨而繼續是動萬物撓萬物而至柔至剛者也君子體此知事之行下不可以遽必先以命申之而使之入於無形然後事可行而人不駭亦如風之重巽也風必真能動物而後物賴風命必真為行事而後人始信故申命以行事為實義而行事端賴申命也若徒申令而無實行之事此盲風狂風颶風徒以撓物而耗物耳久之人且徒厭其擾矣何貴焉故君子以申命行事而不徒命之申也初六進退利武人之貞周公之象巽初六云云何也曰初六於下為巽主卑巽之太過者也於象為進退不果須以武人之貞處之則有以濟其不及故象占又為利武人之貞嗚呼沉潛剛克猛以濟寬非此之謂乎而教㫖即寓於象中則聖人補過之義即行於效動之中矣易真無有師保如臨父母也象曰進退志疑也利武人之貞志治也大抵下三爻謀順以出命初志疑不决三無謀不斷故以二之剛中能權為得中九三下巽終而接上巽有頻象六四悔亡田獲三品周公之象巽六四云云何也曰四以上三爻則重巽申命之事矣而四又以隂居柔巽順之至又上近九五剛中之君是大臣之奉命布令者也彖所謂柔順乎剛四其是矣自然小亨而悔亡利有攸往而田獲三品也象曰田獲三品有功也孔子之𫝊巽六四云云何也曰言六四之田獲三品謂其柔順乎剛利有攸往而有功也三品謂上中下之三品象下三爻九五貞吉悔亡無不利無初有終先庚三日後庚三日吉先西薦反後胡豆反周公之象巽九五云云何也曰九五正所謂剛巽乎中正而志行者以此居尊制命自然得正而吉悔亡而無不利是故就其命之必待重申而言則為無初就其剛中而志行言則為有終而其象則為先庚三日後庚三日以重巽申命鄭重周詳如此自然令出民從志行而吉也先庚後庚之說考諸𫝊注總覺未安於心姑依經文無初有終相因解下稍覺可通顧不知明易君子以為何如也象曰九五之吉位正中也孔子之𫝊巽九五云云何也曰言九五之吉如此者以其位之中正故其志得行而吉也蓋九五乃彖之所謂大人故利見之吉如此耳上九巽在牀下喪其資斧貞凶喪息浪反下同周公之象巽上九云云何也曰上九以過剛處巽終巽而無謀無斷一味巽懦下人是位本上而反巽在牀下亦為無斷而喪其資斧矣巽而如是雖正亦凶故象占如此象曰巽在牀下志窮也喪其資斧正乎凶也孔子之𫝊巽上九云云何也曰言巽在牀下志窮失中無謀無斷而反下也喪其資斧者雖自以為正而不知其正是凶也大抵上卦行命為事故四以斷有功五制命中正而志行上無謀無斷而凶蓋巽原以能權為正也兑兑下兑上巽而受之以兌何也序卦𫝊曰入而後說之故受之以兌兑者說也兌亨利貞文王之彖兑云云何也曰兌剛中柔外而為卦兩澤相麗兩兌相孚有師友之道焉故有亨義然利在得正故象占如此蓋天地間未有不說而能通亦未有不正而能說者爻中三之來兑上之引兑可鑒也象曰兑說也剛中而柔外說以利貞是以順乎天而應乎人說以先民民忘其勞說以犯難民忘其死說之大民勸矣哉說音悅下同先酉薦反又如字難乃旦反孔子之𫝊兑彖云云何也曰言兑者言乎說也為卦說本柔情而二五陽剛得中隂皆在外內正直而外和悅也說以利貞者言非苛悅也是以明君之上順天命下應人心為大悅也說以忘勞云云則孔子𫝊彖時見得兑說之義於民更大而在為君者更申其教耳蓋為君而能發政施仁感動乎民令其心悅則以此勞民悅而忘勞而勿亟子來在所必然以此犯難則民悅忘死而親上死長自不容己天命順人心應民豈有不勸者哉大抵兑之卦雖從一隂取象而實以二五剛中得正故卦言利貞𫝊言剛中柔外說以利貞蓋惟剛中柔外則說乃得貞此爻中四陽之所以善也非剛則不貞非貞則凶此爻中二隂之所以失也故兑說以剛中得正為利象曰麗澤兑君子以朋友講習孔子之𫝊兌云云何也曰兑為悅而兩澤相麗則為相說以麗君子體此則取於兩口對語而與朋友講論取於兩澤相麗而與朋友重習時習則說朋來則樂悅而且樂兑孰甚焉故朋友講習尤君子麗澤之兑也而凡兩相麗而為兑俱凖此矣初九和兑吉周公之象兑初九云云何也曰初九以剛居兑初上無係應處兑而與物無競利以和義者也故其象為和兑以此居下吉也何疑故象占又如此嗚呼其栁下惠處世之時乎象曰和兑之吉行未疑也孔子之𫝊兑初九云云何也曰言和兑之吉行而自為人所信即己亦前途無阻礙耳語曰和而不流此爻以之九二孚兑吉悔亡周公之象兑九二云云何也曰九二剛中柔外而與五以剛中相麗正所謂說而得正者故其兑乃真信其志而以上孚為說者也以孚為說寧有妄說即九五同志豈有不心說而志孚者吉而悔亡又何疑乎故象占如此嗚呼殆傅說之於髙宗乎其次魏徴之於唐太宗亦庶幾焉象曰孚兑之吉信志也孔子之𫝊兑九二云云何也曰言九二孚兑之吉者謂九二與五以剛中相麗不以妄說為說而以真信其志為說也九二以不同為和和而能不同抑又君子之兑矣六三來兑凶周公之象兑六三云云何也曰三與上六兩相麗者而以隂柔居兑口是中無誠信而徒以口舌說上者也說豈能亨乎惟見其凶耳蓋三所麗者上六之隂柔三既不以誠說上而徒以口說來兑上又不以誠說下而徒以口說引兑小人之以非道說人而小人亦以非道為悅兩悅皆妄兩人皆小凶待言乎故象占如此嗚呼古之諧臣媚子與市道交皆然也來兑二字亦可謂盡其情狀矣象曰來兑之凶位不當也孔子之𫝊兑六三云云何也曰言六三來兑之凶者以六三以隂柔居兑口本無孚兑之吉亦異和兑之吉而位不當耳九四商兑未寧介疾有喜周公之象兑九四云云何也曰九四居下兑六三之上以剛居柔而上比九五之剛中則是大臣欲陳善納誨惡六三小人來兑之失而欲商其所兑者也言其心則未遑安寧言其意則病三如讐而言其終則亦正有喜耳故象占如此嗚呼王文正之于丁謂殆類是也象曰九四之喜有慶也孔子之𫝊兑九四云云何也曰言九四之喜非私說也佞人遠則正直親而天下國家乃有慶耳九五孚于剝有厲周公之象兑九五云云何也曰九五剛中而下麗九二之剛中是同以剛中之德相孚而悅者故其象為孚於剝蓋九二剛中能陳善閉邪不以來兑為兑而以孚兑為兑九五剛中亦能納善受言不以引兑為兑而以孚剝為兑正明良相合君臣克艱之時也能無厲乎嗚呼殆太甲之于伊尹髙宗之于傅說乎其次若漢文于引席之袁盎唐宗于面折之魏徴亦為近之象曰孚于剝位正當也孔子之𫝊兑九五云云何也曰言九五之孚於剝者九五剛中之德居大君之位位正得其當也蓋爻位原得其當故象取如此而人君之納善受言為職分之當然亦從可知矣上六引兑周公之象兑上六云云何也曰上六居兑終而當兑口與三上下相悅是無孚兑之誠而徒尚口以引三之來兑者也嗚呼其亦巧令之徒矣縱得人悅亦奚貴乎故象雖不言吉凶而𫝊獨譏其未光也象曰上六引兑未光也孔子之𫝊兑上六云云何也曰上六引兑不能為孚剝之兑並不能商兑和兑而徒以口舌說人為兑亦豈光大之道乎蓋隱諷之中而刺譏之意殊深矣兑之亨也安得不取利貞哉豐川易說卷九
