body:
  text: 豐川易說卷六鄠縣王心敬撰下經咸艮下兌上下經之首咸何也序卦傳曰有天地然後有萬物有萬物然後有男女有男女然後有夫婦有夫婦然後有父子有父子然後有君臣有君臣然後有上下有上下然後禮義有所錯蓋天地者人物之本上經所以首乾坤夫婦者人倫之始下經所以首咸恆也咸亨利貞取女吉文王之彖咸云云何也曰咸之為卦山澤通氣感應以無心之謂也凡物不感則不通咸則此往彼來相與偕適自有亨道故占有亨象然利于得正不然非道之悅不可亨矣故占又有利貞象卦以少男下少女相得以正佳耦之合故象占又為取女吉耳為卦六爻皆應有咸和通暢元氣昕合自然而然之義其在人心則無欲之感應乎咸本自亨自正故象占取于亨以贊之取于利貞以戒之然恆為夫婦之常經不先恆而先咸何也男女惟少則感之真而為卦二五相得男下女尤感之真也且天地感而萬物生男女感而子女生易生道取其氣通而行變化耳惟少男女感則生生則相感于無窮故首咸又所以明生生之道行變化之義也而取于艮兑何也女應以悅男止以感乃能恩義以篤倡隨以辨節宣以時往來以中雖感而不失其正不然悅而不止即六氣淫而災沴生非其道矣聖人取象明義真是于天道人事觀會通以行典禮至矣哉非明于天地人物之情者其孰與于斯彖曰咸感也柔上而剛下二氣感應以相與止而說男下女是以亨利貞取女吉也天地感而萬物化生聖人感人心而天下和平觀其所感而天地萬物之情可見矣孔子之傳咸彖云云何也曰言感者謂其男女相感也兑柔上而艮剛下二氣感應以相與兑女上乎男而艮男下乎女是以亨利貞取女吉也而又推之天地感萬物云云者則孔子觀咸之象會咸之旨而見得此以正相感之義雖天地化生萬物聖人和平天下皆不外此故終之曰觀其所感而天地萬物之情可見云爾也觀咸彖傳可知霸者歡虞之感人心係應之感皆非其正故王者過化存神君子大公順應也象曰山上有澤咸君子以虛受人孔子之傳咸大象云云何也曰言卦艮下兌上是山上有澤澤通氣于山而山受澤潤以生物交感為咸耳君子體此知人心惟虛乃能容物受善于是大公無我虛以待感亦如山澤之通氣也嗚呼非大舜之舍己從人樂取為善孰能當之寂然不動感而遂通可作咸義底本注腳廓然大公物來順應乃為人心自然之感通初六咸其拇周公之象咸初六云云何也曰咸以人身取象初六感于最下咸拇之象是感之尚淺進不由己者也故卦不言吉凶以吉凶在人自取耳艮為指拇乃足之大指初以柔居下其動甚微故為咸其拇象象曰咸其拇志在外也孔子之傳咸初六云云何也曰言咸其拇者拇原非有心獨以上與四應而四為心志乃拇所受命故曰志在外耳大扺感以無心為正初之志在外亦未合無心虛受之義但吉凶悔吝生乎動咸初感志尚未及動故吉凶悔吝尚不可見孔子亦只以志在外釋之耳六二咸其腓凶居吉周公之象咸六二云云何也曰人身在下動莫若足其不動而動者惟拇與腓股二在足上正腓之地也自宜聽命于心以為行止故徒咸其腓則感而成凶能止不動則吉無不利蓋爻中原具此義故象占一一拈出也二與五應故有咸腓之凶而居正柔中故亦有居貞之吉象義多通俱如此類總之教人知所以隨處寡過耳象曰雖凶居吉順不害也孔子之傳咸六二云云何也曰言六二雖凶居吉者腓順股止不自專行故不害也九三咸其股執其隨往吝周公之象咸九三云云何也曰三于人身當股地處咸之時下乘腓拇故為咸其股象股不能行隨足以運故為執其隨象又三居止體而為止主原以靜為正若往而從人則吝之道耳故象占皆取之象曰咸其股亦不處也志在隨人所執下也孔子之傳咸九三云云何也曰咸其股者處感之時股亦欲動而不處也志在隨人所執者下所以往而見吝耳嗚呼今之不能自立而志在隨人者吾不知其所執何如也九四貞吉悔亡憧憧往來朋從爾思周公之象咸九四云云何也曰九四居股之上脢之下又當三陽之中心之象咸之主也然不言心者心無形不可以象言耳心之感物當正而固乃得其理而九四以陽居隂為失其正故因設戒以為能正而固則吉而悔亡若憧憧往來不能正固而纍于私感則亦徒朋從爾思而至耳嗚呼周公之于此爻既示以得吉免悔之道又戒以往來朋從之思聖人之為後世人心計者真詳且周而其明于此心貞悔之機者亦至精且明幾希之統信乎周公接四聖人後學亦可于此知操心養心之道矣孟子養心莫善于寡欲心之官則思先立其大則小者不能奪可作此爻義疏而虞廷危微精一四語尤此爻之淵源㑹合欲讀易者要須先明二帝三王周公孔孟之心傳乃可耳象曰貞吉悔亡未感害也憧憧往來未光大也孔子之傳咸九四云云何也曰言貞吉悔亡者以靜正順應而不以汨亂其本靜之體雖感未有感之害也憧憧往來者謂以念慮之紛紜汨其虛靈之宅舍而不能廓然大公以遂其光明正大之體所以為害也嗚呼心之為體豈能不感亦以靜正順應為光大耳談心學者尚其于主靜立極求之九五咸其脢無悔周公之象咸九五云云何也曰九五居心之上口之下為喉骨之地乃動而上行食息所必由者也然亦不能為主而悅體倚成于上故象取咸脢而占取無悔耳然益可知感以無心而善也脢以取于喉骨之在口下心上者為近實故從之象曰咸其脢志末也孔子之傳咸九五云云何也曰言咸其脢者志欲悅而宣乎口必由脢達于上之末耳故曰志末也上于象象末大過之上云末弱亦其證也上六咸其輔頰舌頰舌協反周公之象咸上六云云何也曰上六當感之終居兌之口有咸其輔頰舌象是以言感人者也嗚呼感人以言不亦淺乎象雖不言凶而悔吝所不免矣象曰咸其輔頰舌滕口說也滕騰通用孔子之傳咸上六云云何也曰言咸其輔頰舌者謂感人以言徒騰口說以悅人在我為感非其實在人亦徒聽而心不感也嗚呼其末世之文誥禦人之口給乎庸何貴焉恆巽下震上咸而受之以恆何也序卦傳曰夫婦之道不可不久也故受之以恆恆者久也恆亨無咎利貞利有攸往文王之彖恆云云何也曰恆乃常久之義卦中自具亨通之道而亦自具無咎利貞利有攸往之義蓋有咎則不亨而恆則循理無咎不利安貞則不亨而恆則自正而固不利攸往則不亨而恆則不窮而利有攸往故恆有亨道而彖占備取于無咎利貞利有攸往也恆固天下最善之事乎彖曰恆久也剛上而柔下雷風相與巽而動剛柔皆應恆恆亨無咎利貞久于其道也天地之道恆久而不已也利有攸往終則有始也日月得天而能久照四時變化而能久成聖人久于其道而天下化成觀其所恆而天地萬物之情可見矣孔子之傳恆彖云云何也曰言恆者久也震剛以長男居上巽柔以長女居下男尊女卑分得常也一陽初動乎隂為震一隂初入于陽為巽陽動隂入相與得常也卦以巽承震動而能順爻以柔應剛倡而有和感應得常也兼此數常久之道故謂之恆也而其所以亨無咎利貞者亦只是取義于恆久之得其道耳蓋雖天地之道亦不過此恆久之得道况人而有恆有不亨通利貞乎故恆則亨無咎而利貞也所謂利有攸往者亦以恆則能隨時變通終而復始耳蓋天地間萬物萬事惟此恆之之道無為不成故日月得天終始而能久照四時變化終始而能久成聖人久于終始之道而天下化成恆所以利攸往也觀天地日月聖人所為恆而知天地萬物惟是屈伸往來終始相循不已耳天地萬物之情不可見乎甚矣恆之為貴也象曰雷風恆君子以立不易方孔子之傳恆大象云云何也曰言卦乃震雷動而在上巽風入而在下二氣得常不易之理所以謂之恆也君子體此以常久其德自立于大中常久之道而不變其方所如雷風之有常焉嗚乎恆之君子其即中庸和而不流中立不倚有道不變塞無道至死不變之君子乎而亦可知易理即中庸之理也初六浚恆貞凶無攸利浚荀潤反周公之象恆初六云云何也曰初六巽體主入初又居巽最下而與四正應所謂不量其淺深而浚恆者乎以此望人凶終釁末所不免矣故象占取此象曰浚恆之凶始求深也孔子之傳恆初六云云何也曰言常久之道取其寬裕如天地不能遽春而必歷秋冬以至春月魄不能遽盈而必歷朔弦以至盈聖人不能遽仁天下而必世後仁今初六始即求恆是乃始即求深而浚恆之凶必不免耳嗚呼學者之入世交人亦可推此而知恆之之道矣九二悔亡周公之象恆九二云云何也曰九二以陽居隂本當有悔而以其得中自得悔亡故象占取此象曰九二悔亡能久中也孔子之傳恆九三云云何也曰言九二悔亡者以其陽剛居中是能久于執中者也執中能久尚何悔乎九三不恆其德或承之羞貞吝周公之象恆九三云云何也曰九三位雖得正而過剛不中志從乎上是為不恆其德之象德而不恆則人皆得笑之薄之慢之而承之以羞矣雖居位得正吝所不免故象占取于或承之羞貞吝也九三在雷風之交躁極熱中故為不恆其德之象象曰不恆其德無所容也孔子之傳恆九三云云何也曰九三之不恆其德而或承之羞者躁極熱中行無所往此身無所容于天地之間也嗚呼世之不恆其德而不為人容者亦無致怨于人可矣九四田無禽周公之象恆九四云云何也曰九四以陽居隂既非正位又應初六之隂虛是田而無禽者也象取于此而占即可知象曰久非其位安得禽也孔子之傳恆九四云云何也曰言九四之田無禽者久非其位安得禽乎嗚呼世之久非其道而欲有求者其尚鑒于此六五恆其德貞婦人吉夫子凶周公之象恆六五云云何也曰六五以柔中應剛中是亦能恆其德者然以柔中應人為恆雖得貞恆之義却是婦人之道而非夫子之宜也故象占為婦人吉夫子凶象取婦人吉夫子凶者五以柔中居震男之動體而下應九二巽女之剛中于義取不能自立而從婦之象是恆所不當恆者也故占為在婦人吉而在夫子凶象曰婦人貞吉從一而終也夫子制義從婦凶也孔子之傳恆六五云云何也曰言婦人貞吉者不自主而從一以終乃婦人之道也言夫子凶者惟義所在者夫子之道也而但執柔中以應剛中是從婦矣夫子而從婦凶也何如嗚呼唐之髙宗其明鑒也而凡不能制義而但以從人得吉者亦皆婦人之吉耳夫子制義制字下得極好蓋義無常主惟變所適惟精義入神者始能制之猶禮惟達于禮義者始能制之耳夫子宜以精義制義為道豈宜執中無權乎故孔子以無適莫而比義為君子以硜硜信果為小人而孟子亦以為大人惟義所在也嗚呼孔孟之所謂大人君子其即易恆之君子而孔子之所謂小人其即恆五之婦人乎學者尚知所以從事哉上六振恆凶周公之象恆上六云云何也曰上六以隂柔居動終不能以陽剛立不易方而但以隂柔矜持為恆是虛而為盈約而為泰難乎有恆者也終歸于凶耳故象占如此象曰振恆在上大無功也孔子之傳恆上六云云何也曰言以隂柔矜持為恆豈能有恆乎徒無功耳安得不凶嗚呼恆固以久于其道而亨非其道而求恆皆大無功者耳遁艮下乾上恆而受之以遁何也序卦傳曰物不可以久居其所故受之以遁遁者退也遁亨小利貞文王之彖遁云云何也曰遁退避也謂四陽應時而退避也應時而退是為宜遁而遁有亨道故占取于亨又二隂浸長不止則否觀剝坤將至故占象又戒以小利貞嗚呼文王之彖遁以利貞其猶周公象否初六以貞吉之旨乎聖人懼隂柔小人之浸長既深而教隂柔小人之以正亦至矣教之以正即所以導之以利孰謂易不為小人謀乎然惟是教之知趨乎正以為利宜之路則聖人仁育義正曲成萬物之大造洪罏原不徒為小人區區之利謀耳彖曰遁亨遁而亨也剛當位而應與時行也小利貞浸而長也遁之時義大矣哉孔子之傳遁彖云云何也曰言遁而亦亨者宜遁而遁自得亨也向使宜遁而不遁可望亨乎而遁之所以亨者則以九五剛當位而二相應是乃與時偕行耳與時偕行何不亨之有小利貞謂二隂浸長雖尚未如否剝之凌抗然亦自以守正為宜所以戒隂柔小人無使滋蔓也其曰遁之時義大矣哉者遁在君子則當位時行在小人則宜于守正遁之時義豈不大矣哉然亦聖人傳彖時又見于遁時之義如此而教人識其所大云爾也象曰天下有山遁君子以逺小人不惡而嚴逺袁萬反孔子之傳遁大象云云何也曰言天下有山天在山上陽去而艮不能止故為遁所謂天自髙而山自不可及耳君子體此與小人處只自立其操自持乎正未嘗有疾惡太甚之跡而小人自不得親亦如天之于山無心絶之而山自莫及也蓋與小人居而周旋太密不惟慮傷于朋比亦且自墮于卑柔若刻核太甚不惟使小人應之以擠陷不肖之心亦且非君子曲成萬物之意故惟相接以禮相導以正無惡怒之加而有方嚴之守逺之以不惡而嚴之道為正耳嗚呼非君子精義之學其孰與于斯初六遁尾厲勿用有攸往周公之象遁初六云云何也曰初當遁之時以隂居初有遁尾象重隂之下以隂柔之質遁而居後危可知矣有厲象而以隂柔居止體亦有勿用攸往象故占又戒以勿用有攸往也即爻義隨即取戒易固聖人教人寡過之書也夫象曰遁尾之厲不往何災也孔子之傳遁初六云云何也曰言初六雖有遁尾之厲然不往則自無災耳故象辭戒以勿用攸往也六二執之用黃牛之革莫之勝說勝音升說吐活反周公之象遁六二云云何也曰言六二才柔居止而位尚得中知守如執物用黃牛之革而人莫能解故為象如此而占即在中矣二柔中黃牛之革象止體居下卦中執之用革莫之勝說象象曰執用黃牛固志也孔子之傳遁六二云云何也曰言執用黃牛者謂二知止能固守其遁而在下之志也大抵下卦止體故皆有宜止而遁下之義上卦乾體故皆有宜健而上遁之義又下卦二隂乃小人小人則欲其以知止遁下為正上卦諸陽乃君子君子則欲其以見幾上遁為正故二初皆以不用往執不說為戒似不宜以應五為解也且遁卦君子小人不相謀陽原欲其上遁隂原欲其下遁應義自無取耳顧不知明易君子以為何如也九三係遁有疾厲畜臣妾吉周公之象遁九三云云何也曰九三以陽居剛是乃君子而處止之終履非其正且下與二初同體則是宜遁而係自蹈于病而危厲之道也故象占如此然三以一陽覆冒二隂則亦是能畜臣妾使止于所之象故占象又為畜臣妾吉也象曰係遁之厲有疾憊也畜臣妾吉不可大事也孔子之傳遁九三云云何也曰言係遁之厲者謂其有疾憊也畜臣妾吉者謂其不可大事惟畜臣妾吉也九四好遁君子吉小人否周公之象遁九四云云何也曰九四健體與五上同往心好乎遁者也然惟君子則能自克而見義即决小人則有所係吝而徘徊不去矣九原陽剛之君子四乃隂柔之小人故象占並取之而自為一例象曰君子好遁小人否也孔子之傳遁九四云云何也曰言君子則好進之心不勝好退是以終遁小人反是是以否也九五嘉遁貞吉周公之象遁九五云云何也曰九五陽剛中正遁之最可嘉尚者也得正而吉從可知矣故象占如此象曰嘉遁貞吉以正志也孔子之傳遁九五云云何也曰言嘉遁貞吉者九五以剛中之德能正其遁之志而毫無係吝也其詩白駒之伊人乎上九肥遁無不利周公之象遁上九云云何也曰言上九以陽剛居卦外于遁為優游世外長往不返是遁之逺且裕而肥者也以此避世于何不利嗚呼襄陽薊門殆其人與象曰肥遁無不利無所疑也孔子之傳遁上九云云何也曰言上九之肥遁無不利者决策長往無復疑慮也大壯乾下震上遁而受之以大壯何也序卦傳曰物不可以終退故受之以大壯大壯利貞文王之彖大壯云云何也曰卦以四陽盛長故為大壯但過壯則用剛憑氣自以得正為利耳故象占如此然亦可知壯之不可終用也彖曰大壯大者壯也剛以動故壯大壯利貞大者正也正大而天地之情可見矣孔子之傳大壯彖云云何也曰言大壯者乃陽之大者壯也而所以名曰壯者謂其下剛上動是為剛以動故為壯耳而所以曰大壯利貞者謂其四陽大者進得其正大者正耳既大且正天地之情且可于此而見故大壯取乎利貞也象曰雷在天上大壯君子以非禮弗履孔子之傳大壯大象云云何也曰言雷在天上乘天以動動而合天故謂之大壯君子體此則非禮弗履動與天游亦如震之乘乾也嗚呼君子之大壯亦以義禮自勝耳豈曰憑剛使氣乎觀大壯之象愈可知君子以自勝為强非血氣之謂也初九壯于趾征凶有孚周公之象大壯初九云云何也曰初九以剛居下壯于趾者也居下而壯于進其凶必矣故象占如此初在下有趾象當壯而以陽剛居初有壯于趾象不必震乃為足也征凶有孚則取義象以申戒耳亦不必于卦爻索象象曰壯于趾其孚窮也孔子之傳大壯初九云云何也曰言壯于趾而征凶者乃理之必然信乎宜困窮也九二貞吉周公之象大壯九二云云何也曰九二陽剛中正是所謂非禮弗履者也壯而如此與壯趾者逈别得正而吉從可知矣故象占如此象曰九二貞吉以中也孔子之傳大壯九二云云何也曰言九二之所以貞吉者以其剛健中正故得正而吉也九三小人用壯君子用罔貞厲羝羊觸藩羸其角周公之象大壯九三云云何也曰九三處壯之時而當乾之終際震之陽以剛居剛是過剛不正者也在小人則為用壯在君子則惟用罔若當此而用壯則雖正亦厲耳蓋三雖强健而四陽阻前如羝羊之遇藩而觸徒羸其角厲何如乎故象占如此然觀此而知壯之不可過用所以君子惟知用罔也羝羊性剛喜觸陽性好進似之正不必兌之為羊然三本以九四一陽在前似藩三居四下進而遇四之剛必且自傷有羝羊觸藩羸其角象此正即象明義亦恐不容徒以義言象曰小人用壯君子罔也孔子之傳大壯九三云云何也曰九三以陽剛居陽位處乾之極乃剛之過而不中者凡物過剛則折故小人則干進務前之不已而君子尚消息盈虛則固以用罔為得也九四貞吉悔亡藩决不羸壯于大輿之輹輹音福周公之象大壯九四云云何也曰九四大壯之極而能自處于柔且前已無見阻之陽自能得正而吉悔可盡亡耳其象占則為藩已决而不致羸輿未大而壯其輹可以進無不吉也觀四之藩决不羸則知三之羸角以四之陽剛在前故余以三之羝羊觸藩為即象明義也象曰藩决不羸尚往也孔子之傳大壯九四云云何也曰言藩决不羸者前無所阻陽可直尚而往耳六五喪羊于易無悔喪息浪反易以䜴反周公之象大壯六五云云何也曰六五踰剛而處柔有喪羊于易之象當壯而如此是因時處順與世無爭者也則亦自有無悔之義故象占如此象曰喪羊于易位不當也孔子之傳大壯六五云云何也曰言六五之喪羊于易者五陽位而以六之隂柔居之位不得當故雖無悔而亦不能元亨耳然勝于觸藩羸角者多矣在他卦以不當位為悔而在大壯以不當位無悔蓋用柔可以濟剛也上六羝羊觸藩不能退不能遂無攸利艱則吉周公之象大壯上六云云何也曰上六以柔處壯終前更無位而體尚在動有羝羊觸藩不能退不能遂象是本無壯才而不達進退者也安能利乎然居終處上則亦尚有棲身之地但能固守其正則亦尚可圖此身之安耳故又戒以艱則吉也象曰不能退不能遂不詳也艱則吉咎不長也孔子之傳大壯上六云云何也曰言不能退遂者謂自已昧于進退之義而不能詳也艱則言者謂若能謹守此一步棲身之地則咎尚不長而得吉耳蓋前面更無餘地故保吉要須用艱也上六以隂居柔前無藩限而亦曰羝羊觸藩是但以卦本大壯羝羊乃用壯之物象之耳又不必陽之為羊可見象固不可執一論也六爻皆以剛得其正為壯故彖取利貞而大象取于非禮弗履蓋即孔子所謂義以為上乃君子之勇義也晉坤下離上大壯而受之以晉何也序卦傳曰物不可以終壯故受之以晉晉者進也晉康侯用錫馬蕃庶晝日三接文王之彖晉云云何也曰晉離明在上坤順在下日自地升也其體有諸侯覲王而王照臨備至之象蓋離為日象王坤為臣象諸侯日出地上地資日光象王侯相得坤有土有衆象侯坤道厚載象康坤為衆為牝馬衆偶在下象馬蕃庶馬在王下象王錫晝日則象離而三接則三隂爻之象也彖曰晉進也明出地上順而麗乎大明柔進而上行是以康侯用錫馬蕃庶晝日三接也孔子之傳晉彖云云何也曰言晉者言乎其進也離明出乎地上地順而麗乎離以成大明而六五之柔進而上行以成離主是其象義原有康侯用錫馬蕃庶晝日三接之象也故彖中備象之耳而人心之大明畢照亦猶是矣象曰明出地上晉君子以自昭明德孔子之傳晉大象云云何也曰言日之大明出于地上是之為晉君子體此以自昭明德不使氣拘物蔽亦如晉之日出地上也觀晉象之言德而曰明可見德之本明明而曰昭可見昭之乃明而昭明德而曰自又可見此格致誠正之功原匪他人可以旁貸之事乃君子自成自道之道也嗚呼大學自明之堯湯文王其即易晉自昭明德之君子乎初六晉如摧如貞吉罔孚裕無咎周公之象晉初六云云何也曰下卦三爻為坤順安貞而初為坤始上應匪人有一旦上進而即若有所摧乎其上之象是乃謙卑巽順之至者耳自是得正而吉之道斯時也縱與四罔孚而但以寬裕處之在我即無咎耳蓋欲求信于上而心太切非汲汲以失其守即悻悻以傷于義矣故象占如此嗚呼不附權貴固人臣貞吉之道正靜需時乃人臣無咎之義乎而凡進而涉世交人者皆可于此類推也曰如者非真有是事謂其心如是耳故得貞吉此似始至之康侯也象曰晉如摧如獨行正也裕無咎未受命也孔子之傳晉初六云云何也曰言晉如而即厪摧如之心者獨行其貞正之道不附權門也裕無咎者初尚未受四命固可裕以俟之豈肯媚權臣以求進乎六二晉如愁如貞吉受兹介福于其王母周公之象晉六二云云何也曰六二漸進之地又與五同氣相應而以居中處順有晉如愁如之象當晉而愁是晉為可喜而中實不喜也為臣如此柔順安貞必且進而有麗明之吉以受知于大明之君得蕃庶之錫故占象又取受介福于王母耳此似述職之康侯也王母謂六五乃君位而隂柔麗中象王母也即此一象辨物當名稱情俱備易真萬事萬物之權衡乎象曰受兹介福于其王母以中正也孔子之傳晉六二云云何也曰言六二受兹介福于其王母者以其有如是柔順中正之德也嗟乎人臣中正固受福之基乎六三衆允悔亡周公之象晉六三云云何也曰言六三當晉之時處順之極而偕二隂以並晉是衆允也殆與罔孚者異矣有臣如此順衆心而向大明自然無復摧愁悔何有乎故象占取于衆允悔亡嗚呼隨順衆心歸向明主人臣無悔之道固如是哉象曰衆允之志上行也孔子之傳晉六三云云何也曰言六三偕二隂以並進至此而上行之志乃遂耳九四晉如鼫鼠貞厲周公之象晉九四云云何也曰九四已晉而居上近乎君矣而以九處四外陽內隂是大臣懷貪殘之心者也守此不變危厲之道耳故象取晉如鼫鼠而占取貞厲愚按此貞以恆固作解為當謂其守此不變耳似不宜解以得正鼫鼠之晉何正之得顧不知明易君子以為何如也象曰鼫鼠貞厲位不當也孔子之傳晉九四云云何也曰言九四之晉如鼫鼠貞厲者謂其位處不當居離明之下而不敢當離明之照亦如鼫鼠踪跡詭譎晝見畏人雖欲不厲不能得也蓋周公為稱情之象故孔子特釋其義耳六五悔亡失得勿恤往吉無不利周公之象晉六五云云何也曰六五柔中得正正所謂地上之明進而上行之柔也大凡昏暗者多悔而九五則大明察察者多悔而六五則得中君而如此悔何有乎故占象為悔亡又其當大明之位處二陽之中聰明內含察察不用是乃精明中之渾厚渾厚中之精明有聰明睿智之實德而無綜核刻薄之流弊以此而往何往不吉以此而行何行不利故象占又取于失得勿恤往吉無不利也失得勿恤是言臣下小小得失勿以為憂而自出于察見淵魚之不祥蓋六五以大明當天原是羣隂畢照即間有雲翳頃刻自消正不用察察為明自傷大明之體耳嗚呼漢之文帝其庶幾乎象曰失得勿恤往有慶也孔子之傳晉六五云云何也曰言六五之失得勿恤正是晉五大明之用往自有慶故悔亡吉利備具也上九晉其角維用伐邑厲吉無咎貞吝孔子之傳晉上九云云何也曰上九離終象甲胄而以剛居晉上是晉其角者也晉角則剛而易觸于象為維用伐邑矣動兵邦內厲所不免故占象特取于厲然以君正臣罪亦自得吉無過故占象又取于吉無咎但此等事雖曰得正終非明世所宜有故終有羞吝之貽也維用伐邑吉與畜臣妾吉一例謂維此吉耳象曰維用伐邑道未光也孔子之傳晉上九云云何也曰言王者自宜明明德于天下使四海升平向化畏威懷德今也尚用伐其私邑則是近郊猶有未順之梗其于晉明之道尚未光大耳嗚呼王者固以兵不待用而天下自服為道之光乎明夷離下坤上晉而受之以明夷何也序卦傳曰進必有所傷故受之以明夷夷者傷也明夷利艱貞文王之彖明夷云云何也曰離為日坤為地離入坤下明受其傷故曰明夷所謂文明而處昏暗之世者也利在艱難守正故占為利艱貞嗚呼味斯言也文王蓋即本其自處者以繫彖乎故不覺語深而意悲矣彖曰明入地中明夷內文明而外柔順以蒙大難文王以之利艱貞晦其明也內難而能正其志箕子以之孔子之傳明夷彖云云何也曰言離下于坤是明入地中也明而入地則于明晦矣明晦是明傷也故為明夷離在下而居內是內文明也坤在上而處外是外柔順也以此韜光蒙大難內不失臣節外不即凶戮此文王所用以事紂之道也利艱貞者謂自晦其明同于入地之日也以此遭逢內難身被囚奴而卒能自正其志不為邪諂此箕子所用以處紂之道也嗚呼孔子雖不似文王箕子之大明蒙艱然以大聖人之明德而栖皇于春秋之世其亦離明而晦于地下者乎故其傳彖之言深覺愴乎有餘悲耳然于彖傳知為文王箕子之以則又以知惟聖人為能論世知人又知惟聖人能知聖人也夫明夷反晉故為明傷而在人心則耳目聰明不用而一靈炯炯不昧之時却是初學善養其明之一大功課易道固在人自取而神明之耳執象論義與執義取用皆無當也象曰明入地中明夷君子以蒞衆用晦而明孔子之傳明夷大象云云何也曰明夷為日入地下非無明而于晦中行其明故為明夷君子體此以蒞衆也用晦而明蓋明而明用之則炫才揚已察見淵魚不惟衆情有不安之弊亦且幽隱有不照之憂故君子惟用晦而明如日明之入地下也用晦而明不惟蒞衆宜然一切居家交人無不宜然蓋凡事聰明而藏諸渾厚乃為真明耳漢明之察察其實察于小而蔽者大察于人而蔽于己故古之帝王凝旒黈纊正欲以自晦善養其明也晉六五失得勿恤亦明夷大象用晦而明之義故為知臨大君之宜而悔亡往吉無所不利也初九明夷于飛垂其翼君子于行三日不食有攸往主人有言周公之象明夷初九云云何也曰初九居離之下離明受傷之始也其在于象則如鳥之飛而傷垂其翼其在君子則為于行而三日不暇食但有攸往則主人有言也嗚呼其文王已疑于紂事事挫抑責備之候乎而遑暇食哉離象鳥故取飛垂象口故取食取言下傷必有上傷之人故取主人而三日則取于地下之三畫也象曰君子于行義不食也孔子之傳明夷初九云云何也曰言君子于行三日不食者謂當見傷之時義不暇食故三日不食也六二明夷夷于左股用拯馬壯吉周公之象明夷六二云云何也曰六二當明夷之時居離之中正受傷之人也其象為夷及于左股斯時也不可以不拯而拯且不可以不速必如用馬之壯乃得吉也蓋拯之速則尚可救耳故象占如此蓋彖于此爻為文王羑里之時而象義則周公有感于拯救文王已出之效故為此用拯馬壯之吉以示教乎嗚呼周公之繫此爻亦大愴心也夫左股臣象但象其拯之宜速不必于卦爻互變求解也象曰六二之吉順以則也孔子之傳明夷六二云云何也曰言六二之所以吉者以其順人心合天則君父之傷可以救而非出于邪曲也蓋臣子救君父之難苟可委曲望全雖竊負而逃亦所不恤文馬珍幣之用何傷于日月之明乎于是爻見文王之為臣止敬亦可見周公之為子止孝九三明夷于南狩得其大首不可疾貞周公之象明夷九三云云何也曰九三以剛居離之上應上隂柔而可以得志又離為兵于方為南有狩于南而得其大首象故象占取之嗚呼其武王伐紂之事乎然狩貴時不可疾貞也故又為不可疾正之戒蓋貞取于正也一說不可疾貞為不以為疾而病之此乃天人之正亦通象曰南狩之志乃大得也孔子之傳明夷九三云云何也曰言南狩之志非富天下也乃伐暴救民之志如此而後得耳六四入于左腹獲明夷之心于出門庭周公之象明夷六四云云何也曰六四位近君側于象為出地之日于明夷為入君左腹獲其心意始得出此門庭而成生還之幸所謂向來受傷而至此始出也殆文王羑里初出之象乎象雖不言吉凶而吉無不利亦可知矣象曰入于左腹獲心意也孔子之傳明夷六四云云何也曰言六四之入于左腹云云者乃是揣其心意而設法以獲之故得出門庭耳嗚呼周公之象此爻慶幸殊深而孔子之贊此爻歆羡亦至矣六五箕子之明夷利貞周公之象明夷六五云云何也曰五居坤中上承晦主誼無可去惟有痛自屈辱以全其正所謂內難而能正其志者也正箕子之明夷以之故利在艱貞象曰箕子之貞明不可息也孔子之傳明夷六五云云何也曰言箕子之貞執志不回故雖明為所傷而終不可掩而息也上六不明晦初登于天後入于地周公之象明夷上六云云何也曰上六坤終而以隂柔處之此正日之沒于地中者也故雖本宜明者亦不明而晦矣昏昧至此初之登天者今且淪沒地下有必然耳嗚呼紂尊為天子而竟以不明求為匹夫不得非即此象乎而象亦實指紂言也象曰初登于天照四國也後入于地失則也孔子之傳明夷上六云云何也曰言初登于天者本可以照四國也後入于地者由其失君之則也嗚呼以本登于天之朗日一旦復入地下得喪存亡不啻較若天淵而獨以失則致之然則為人上者奈何可失則乎爻于二象文王而以順則王以上象紂而以失則亡然則此一則也固存亡興喪之關乎乃易以順則象文王而詩詠文王順帝之則然則易之則即帝則易之順則即詩順帝之則乎文王惟其能順帝則故為人臣止于敬當明夷之時即順明夷之則讀易者于易識則于文王識所以順則可也噫意深哉家人離下巽上明夷而受之以家人何也序卦傳曰傷于外者必反于家故受之以家人家人利女貞文王之彖家人云云何也曰為卦上巽長女下離中女是為二女相得而上順下明則是各得其職長上中下則是各得其序四為巽主而從五二為離主而從三則是各得其耦陽外隂內則是各得其事凡皆家齊之事而卦備之故曰家人而二卦却以長中二女相值而成故占象又取利女貞耳然其實家之所以不齊由于婦之不順不明不順則驕亢侈泰之弊必作不明則瀆倫亂禮之愆必生而家道遂不可言故家道必得女之順明乃成而卦體上順下明原備此義故彖亦遂即其自有者以為戒耳嗚呼牝雞之晨惟家之索桀亡以妹喜而紂復亡以妲己有家者安得不以女之貞為利而欲齊家以定天下者又安可不知利女之貞乎萬物齊乎巽而相見乎離人道齊乎家而相見乎國與天下為卦上巽下離風動火明正是即家之刑寡妻至兄弟以御家邦事也故彖言利女貞以即卦明戒而孔子更推其義以極于家道正而天下定耳觀二聖于家人一卦彖言之藴含者即于彖傳明補之大象之未盡者仍于小傳備發之反覆推原務使正家之道本末終始無一滲漏亦可知齊家之關乎治本者深且重也彖曰家人女正位乎內男正位乎外男女正天地之大義也家人有嚴君焉父母之謂也父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定矣孔子之傳家人彖云云何也曰言卦之所以為家人者固以女之正位乎內而實以男之正位乎外有齊家之道而男女皆得其正以合于天尊地卑天施地生之大義也蓋所謂男女者非徒家人中男女之謂謂其能巽齊離明足為家主而如嚴君之父母耳若曰家人之男女則豈足言嚴君哉所以然者惟這嚴君能內明外齊內外各正則型儀足法規嚴矩整恩不掩義義以濟恩上下明齊父父子子兄兄弟弟夫夫婦婦一家之中無一不出于正而家道皆正耳家道正而刑寡妻至兄弟便可御于家邦而天下以之定這真是以修身作齊家之本以齊家作治平之本者能之豈徒一女正之為乎然推觀厥刑則于女之得正而驗故家人以女貞為利也母亦稱嚴君者正位乎外者父而正位乎內者母家有嚴母能離明而巽齊則子弟之隱惡家衆之隱弊可以盡正內外之分别幃薄之防間可以備肅然後內外上下一歸明齊而家道可正一如嚴君之能明齊乎衆庶也故世俗稱妻為內君而夫子以母為嚴君嗚乎嚴君而可不正乎故家人利女貞家人人衆最忌在不肅故貴巽齊家人情淆最忌在不知故貴嚴明為卦下離上巽于位則為上齊而下明于家則為內明而外齊于分則為父齊而母明既明且齊家何不正之有既正矣又何不利之有故利貞之義本取于巽離為多彖因本卦義為戒耳象曰風自火出家人君子以言有物而行有恆孔子之傳家人大象云云何也曰上巽之風自下之離火而出謂之家人君子觀風自火出之象知家之本在身而身為風之自也于是先自正其身始言則有物而根諸義禮口無夸誕之辭行則有恆而遵道以行身無詭異之行一如火之為風自焉嗚呼大學之所謂其為父子兄弟足法孟子之所謂身不行道不能行於妻子非此意乎初九間有家悔亡周公之象家人初九云云何也曰初九以陽剛處離始是明于家情而間家于始者也家間于初則銷萌杜漸而諸悔可亡矣故象占如此又初九以一陽橫亘于隂下亦有間象然取于離明剛正以正家于初義自正大正不必索之爻象也象曰間有家志未變也孔子之傳家人初九云云何也曰言間有家悔亡者間之于衆志未變之始故悔亡也嗚呼非離之明陽之剛其孰知之而能之六二無攸遂在中饋貞吉周公之象家人六二云云何也曰言六二以隂居二陽之中正女之在家中者也亦正有無攸遂在中饋貞吉象故象占取此然其義則婦人無專制之義有三從之道故占象取于無攸遂無非無儀惟酒食是議婦之正也故占象取于在中饋而無攸遂在中饋則本是婦人正道吉道故占象又取于貞吉耳嗚呼象義雙顯占象俱融周公之繫易妙真難形矣惜乎吕雉武瞾二婦不知此義又惜乎漢髙唐髙不知此義也故上六以威如反身為吉象曰六二之吉順以巽也孔子之傳家人六二云云何也曰六二之吉者以六二能順以上從乎巽之九五此正位乎內之道也得其道矣安得不吉九三家人嗃嗃悔厲吉婦子嘻嘻終吝嗃呼落反嘻喜悲反周公之象家人九三云云何也曰九三居離之終而以剛處剛剛而過者也以此處家則未免傷恩然亦變患可銷故其象為家人嗃嗃雖始若有悔有厲而終能得吉若其反是則過寬必縱如家人婦子之嘻嘻然諧笑不謹始雖若和而終至羞吝矣嗃嗃嘻嘻皆取離似口又為火象故象取于離而字皆從口象曰家人嗃嗃未失也婦子嘻嘻失家節也孔子之傳家人九三云云何也曰言家人嗃嗃雖若太嚴而終未失則也茍婦子嘻嘻則和而無禮失齊家之正則矣六四富家大吉周公之象家人六四云云何也曰六四以離明之克家而至于巽之整齊是治家而至于富者也家而至富是必內以貞明之婦佐居位巽齊之男克勤克儉知禮尚義乃能之真為家人之大吉耳故象占取此嗚呼觀于富家大吉則富固非聖人之所不欲特以男女正位而得之則道之得正者耳象曰富家大吉順在位也孔子之傳家人六四云云何也曰言富家大吉者正以四為巽順之主乃巽順得正之位也而為富家者以巽順為保富之道可類推矣九五王假有家勿恤吉假更白反周公之象家人九五云云何也曰九五陽剛中正內聰明外齊肅正所謂正位乎外之男以倡正位乎內之女而家人之嚴父耳當此時也一家之人內外咸理大小得情尚何俟憂恤乎真吉之至者耳故象占如此嗚呼是殆無憂之文王歟以此齊家而即以此御家邦吉何如也象曰王假有家交相愛也孔子之傳家人九五云云何也曰言王假有家者謂其內外上下交相親愛父父子子兄兄弟弟無不各得其情耳嗚呼信非文王之刑于寡妻不足當之上九有孚威如終吉周公之象家人上九云云何也曰上九以陽剛巽齊居家人之終正所謂言物行恆以身型家之第一人也蓋其能以剛嚴明齊正已端範威如可畏終之得吉不言可知故象占如此象曰威如之吉反身之謂也孔子之傳家人上九云云何也曰言威如之吉者乃上九能反身自修端範于上言可為坊行可為表自然不言而上下以肅家道以正之謂也嗚呼家之本在身反身固齊家之第一事乎豐川易說卷六
