body:
  text: 豐川易説卷八鄠縣王心敬撰下經萃坤下兑上姤而受之以萃何也序卦傳曰物相遇而後聚故受之以萃萃者聚也萃亨王假有廟利見大人亨利貞用大牲吉利有攸往假更白反文王之彖萃云云何也曰卦為澤上于地于人心則順悅而萃聚之義也人心順悅以聚自是亨通之道故其象占有王假于廟之亨有利見大人之亨而亦利于正不正則雖聚必散也又申言其假廟也則宜體物聚時阜享禮宜豐之義而用大牲吉其見大人也則必然得衆能聚人心悅從而利有攸往蓋卦中原備此義故象占亦如此其詳耳彖曰萃聚也順以説剛中而應故聚也王假有廟致孝享也利見大人亨聚以正也用大牲吉利有攸往順天命也觀其所聚而天地萬物之情可見矣説音悅孔子之傳萃彖云云何也曰言萃者取乎人心萃聚之義也所以取乎人心萃聚之義者為卦下順上説九五剛中而九二應之故成萃也王假有廟者王者萃此心之精神致孝享于祖考也利見大人亨利貞者聚衆必以正也用大牲吉利有攸往者當萃之時時豐禮備下順上説所以順天命之自然也備觀萃聚之義可以見人情即天地萬物之情惟順惟悅即可以格神可以致治則天地萬物之情又豈出順悅之外乎故萃有亨道也象曰澤上于地萃君子以除戎器戒不虞上時掌反孔子之傳萃大象云云何也曰兑上坤下是澤上于地也君子體此知衆多之聚人情囂煩易有不虞之事則除簡戎器以戒備不虞耳蓋衆聚易鬭爭又衆聚藏姦邪有不虞之事亦必至之情故君子以除戎器戒不虞為處萃之道也初六有孚不終乃亂乃萃若號一握為笑勿恤往無咎號乎勞反周公之象萃初六云云何也曰初六上應九四而隔于二隂是有孚不終志亂而妄聚也若能號呼正應則一握為笑而更勿顧恤以往自無咎耳嗚呼上二句其隗囂之舍漢而萃公孫下數句其馬援之去隗而萃光武乎象曰乃亂乃萃其志亂也孔子之傳萃初六云云何也曰初六之乃亂乃萃者衆萃之中志亂而未知所適從也六二引吉無咎孚乃利用禴禴羊略反周公之象萃六二云云何也曰六二應五而雜于二隂之間必牽引以萃乃吉而無咎又二柔順中正虛中而上應九五剛健中正誠實以下交則亦有孚而利于用禴之象故象占如此然曰孚乃利用禴則又以戒二處萃之時誠敬為本耳細觀初二之象凡皆即爻象之自有隨申以戒聖人之教人寡過亦至矣而其事象則竇融引五太守以萃漢也象曰引吉無咎中未變也孔子之傳萃六二云云何也曰言六二之引吉無咎者初與三皆不中而有異志六二中正不變也六三萃如嗟如無攸利往無咎小吝周公之象萃六三云云何也曰六三隂柔不中不正上無應與欲求萃而不得故嗟如而無所利惟往從于四可以無咎然終是非應而往亦可小羞矣象曰往無咎上巽也孔子之傳萃六三云云何也曰言六三之往無咎者能舍不正而上順乎四也九四大吉無咎周公之象九四云云何也曰九四上比九五而據坤上以得衆得其萃矣然以陽居隂大臣而為衆之所聚必得君之同心同德相悅無間而因大以得吉然後無咎也象曰大吉無咎位不當也孔子之傳萃九四云云何也曰九四大吉乃無咎者以九四非當位之君位非君而得衆是臣之所不宜也嗚呼人臣惟得君而後宜得衆不然則擅權得衆之咎難免矣九五萃有位無咎匪孚元永貞悔亡周公之象萃九五云云何也曰九五以體剛履悅中正為下所萃是萃有位者也君道亦未為咎但羣隂承四而萃人心亦未盡孚為五計者惟體元長人永貞其德庶乎仁積信成匪孚之悔可以亡耳象曰萃有位志未光也孔子之傳萃九五云云何也曰九五雖有其位而四在其下為衆所萃未得如顯比之光也故比之元永貞言于彖而萃之元永貞言于五其教深矣上六齎咨涕洟無咎齎音咨又將啼反洟音夷象同周公之象萃上六云云何也曰上六處萃之終隂柔無位下又無應求萃不得者也其為齎嗟涕泗可想而知故其象如此然處悅知懼雖寡與無咎也故占象又如此象曰齎咨涕洟未安上也孔子之傳萃上六云云何也曰言上六之齎咨涕洟者是居上而以未得所萃不安于心也不安于心則必求所以萃之求萃則必得萃故亦自無咎耳升下巽上坤萃而受之以升何曰序卦傳曰聚而上者謂之升故受之以升升元亨用見大人勿恤南征吉文王之彖升云云何也曰升巽下坤上地中之木自下而升也有大亨之義有用見大人勿憂其不允之義有向南而進無所不吉之義故象占如此而升有大吉之道也南行以指巽坤之間南離之位為人臣朝見之鄉為當蓋此等字易中多不輕用用則必有所指不然則征吉利征何所不可而必曰南征吉乎彖曰柔以時升巽而順剛中而應是以大亨用見大人勿恤有慶也南征吉志行也孔子之傳升彖云云何也曰言升之為卦巽木之柔以時上升故曰升也其卦為下巽上順其德為九二剛中而應乎九五是以大亨也其曰用見大人勿恤者謂用此巽順之道見大人則必升階而有慶也其曰南征者坤巽之間離明之位欲升之志至此而可行也象曰地中生木升君子以順德積小以高大孔子之傳升大象云云何也曰為卦坤在上而巽在下為地中生木之象而地之生木也則順其生機由萌芽而方寸由方寸而拱把由拱把而參天凌雲無不由卑以至高田小以至大君子體此其為學也一一順乎德之漸至日積月纍由善信而充實光輝由光輝而為聖為神無凌節之行無襲取之為亦如地中生木積小而高大也觀君子順德積小以高大可見頓悟頓修之説終有病在初六允升大吉周公之象升初六云云何也曰初以順柔為巽主又上應巽順之六四正自方生日升之木無有阻遏所謂允升也升而如此孰能禦之吉之大者莫過此耳象曰允升大吉上合志也孔子之傳升初六云云何也曰言初六之允升大吉者以上之六四同心同德合志以應也九二孚乃利用禴無咎周公之象升九二云云何也曰九二剛中得正與六五為正應是乃君臣合德下進上援而升中告虔之日也故其象為上下相孚乃利于用禴而無咎也象曰九二之孚有喜也孔子之傳升九二云云何也曰言九二之孚九五君臣交孚而同升有喜無咎耳九三升虛邑一周公之象升九三云云何也曰陽實隂虛為虛象而坤固自有國邑象三與坤接以實升虛進無所阻故升虛邑也象曰升虛邑無所疑也孔子之傳升九三云云何也曰言九三之升虛邑者謂其前即三坤中虗陽升最為順利無所疑礙也六四王用亨于岐山吉無咎周公之象升六四云云何也曰六四以柔居順始而與五同氣相比順之至者也其象為王用亨于岐山以升中告虔升而如此吉而無咎從可知矣故象占如此象曰王用亨于岐山順事也孔子之傳升六四云云何也曰六四之王用亨于岐山吉無咎者以柔順之心行順升之事神必享之故吉且無咎耳而凡以順心行順事者其為天地神明所鑒享俱視此矣六五貞吉升階周公之象升六五云云何也曰六五為順主而下應九二之剛中自然得正而大吉又居下卦之上為地中出土之木乃升之更進一階者也故象占如此象曰貞吉升階大得志也孔子之傳升六五云云何也曰言六五之貞吉升階者謂五之柔順得中而下應又當故象為既貞且吉又能升階而升之大得所志者也嗚呼君子之升而得志亦惟其順乎中道而已矣上六冥升利于不息之貞周公之象升上六云云何也曰上六以隂柔之資積纍以升于最上之地是冥升不已者也寧有利乎惟是其冥升不已之義則可取為進德積行由小至大而不息之貞之利用耳嗚呼冥升于進身則不可而于進德則自利欲升者亦審機而善用之可也觀冥升利不息之貞可見學業最忌小成半塗亦最忌欲速助長象曰冥升在上消不富也孔子之傳升上六云云何也曰言冥升在上雖身則升而上富必消而貧正不獨見薄于月旦之評也嗚呼升以望富而升愈上則富愈消然則冥升者既消其品兼消其富得一虛而消兩實謂之冥升信乎其冥升乎漢之崔烈得無類此困坎下兑上升而受之以困何也序卦傳曰升而不已必困故受之以困困亨貞大人吉無咎有言不信文王之彖困云云何也曰困者困閉不通之義也為卦坎剛為兑柔所掩則是以君子而掩蔽于諛讒之小人以陽剛而屈抑于邪佞之巧夫困可知矣然卦德有可以亨通之道惟在安固守正而已故惟剛中之大人乃能亨能得吉能無咎也又兑上為口言之所出而為卦以兑處險亦有聞言不信之象故又戒以當困之時無尚口説徒使人不信耳蓋即象之自有又示以困非言之所能亨而亨固自有道也困而亨文王孔子孟子以之大人吉無咎亦非此二聖一賢不足當也至有言不信無論文王當羑里時如此即孔孟當時或且以為佞或且以好辨譏之矣然在今日則文王孔孟之言果何如乎故君子亦自信自亨而已不急以其言求信當世也彖曰困剛掩也險以説困而不失其所亨其唯君子乎貞大人吉以剛中也有言不信尚口乃窮也掩本義作掩于檢反孔子之傳困彖云云何也曰言卦之為困者以剛為隂柔所掩如下坎之剛掩于上兑之隂柔也且坎中一陽掩于二隂兑二陽掩于一隂初上皆隂而三陽盡閉于內皆所謂剛掩耳故謂之困而其所以亨者為卦下險而上説是身雖困而能不失其所以亨者也其唯剛中之君子能之乎若在小人身困而心亦困矣亨于何有也貞大人吉者九二之大人與九五之大人皆剛中相應故吉也若在小人之隂柔不正雖通泰尚不吉多過况困之時乎至所謂有言不信者言困而徒欲以言亨之是尚口乃所以益其困窮也故處困修德為身雖困而適自亨之道又况窮極必變否極必通正自有大亨之日乎象曰澤無水困君子以致命遂志孔子之傳困大象云云何也曰水宜在澤今澤在水上是無水也無水則巽木失潤故為困君子體此致命而聼之天遂志而修諸已不以困視困而以亨視困故身雖困而道自亨也致命遂志是履險而能悅之義履險而能悅是樂在其中患難不撓貧賤不移而無入不得者也故惟君子能亨亦惟大人貞吉初六臀困于株木入于幽谷三嵗不覿周公之象困初六云云何也曰初六以隂柔居困初與四應而隔于二三是困之深而出不易者也故惟君子能亨而入于幽谷雖三嵗不覿象困而如此象雖不言吉凶而凶悔亦可知矣困初六取于本卦則為困于佞而不能察推類盡義則為困于欲而不知出困于色而不知節困于貪而不知止困于忿而不知忍嗚呼既入幽谷迷在終身矣三嵗其能覿乎故象占如此按象初隂柔在下臀象株木象坎為隂伏溝瀆而初最下為入幽谷象與四應而隔二三為三嵗不覿象象曰入于幽谷幽不明也孔子之傳困初六云云何也曰言初六為入于幽谷者謂其不能知幾而幽而不明也九三困于酒食朱紱方來利用亨祀征凶無咎紱音弗亨讀作享周公之象困九二云云何也曰九二正在困中而坎實中滿有陽德正中雖困不餒之義故象取困于酒食與九五同德相應故占象取朱紱方來二五非正應而以誠相通故占象取利用亨祀又二在坎中正當困險之時自然宜來不宜他往故占象又戒以征凶二乃剛中當困而不失其亨故占象又終得無咎也象曰困于酒食中有慶也孔子之傳困九二云云何也曰言九二之困于酒食云云者陽剛中正上有同德之應君臣一德今曰雖困終有福慶也然亦二自有中正之德耳茍無其德五雖剛中豈援無德之困吾恐二之位在陷中正險于初之入谷不覿耳故亨困以自中其德為要而傳特發中則有慶之義也六三困于石據于蒺藜入于其宫不見其妻凶周公之象困六三云云何也曰三以隂居陽承乘皆剛有困于石據于蒺藜象以隂居陽又坎虛之地有入其宫不見其妻象困而如此凶何如乎故象占如此然據孔子繫辭之言則入其宫不見其妻乃非所據而據非所困而困身且將危妻安得見則又是于上二句推其義象當如此耳固不必索爻象以實象也象曰據于蒺藜乘剛也入其于宫不見其妻不祥也孔子之傳困六三云云何也曰言據于蒺藜者下乘九二之剛退無所歸也入其宫不見其妻者所據如此身且將危不祥之至而妻不可得見也嗚呼非所據而據者亦詳味孔子繫辭之旨可乎九四來徐徐困于金車吝有終周公之象困九四云云何也曰四應初而隔二三以剛體而居柔位皆有來徐不果之義與五比乃近君相悅之臣故又為困于金車而不得與初即應正應不急又為所阻未免羞吝然本屬正應困極終通也故象占如此象曰來徐徐志在下也雖不當位有與也孔子之傳困九四云云何也曰言來徐徐者謂其處位不當無剛中誠應之德也然雖不當位終必有與而相應耳九五劓刖困于赤紱乃徐有説利用祭祀劓音見睽刖音月説音悅周公之象困九五云云何也曰九五處困之時體本兑而一隂毁于上以虧其進下乘坎而初隂缺于下以阻其行上下俱困有劓上刖下象欲與二應而為四阻有困于赤紱象剛中居尊終與二遇有徐有悅象二五非應而以同德相感誠無不通有利用祭祀象也象曰劓刖志未得也乃徐有説以中直也利用祭祀受福也孔子之傳困九五云云何也曰九五劓刖者上兑虧而下坎缺其志未得也乃徐有悅者剛中誠直終相遇也利用祭祀者五以履中處悅悅以祭神神亦必悅而錫福五終受福也上六困于葛藟于臲卼曰動悔有悔征吉藟力軌反臲五結反卼五骨反周公之象困上六云云何也曰上六以隂柔居兑上于人為兑口于木為樹上之葛藟居高而柔亦動搖不安之甚矣如是而尚欲不變而自言曰勿動動則有悔則亦終悔于困耳惟征而求出則吉而悔乃可免故象占如此然周公于此爻既戒而復勸則所謂窮則變變則通而鼓之舞之以盡利耳象曰困于葛藟未當也動悔有悔吉行也孔子之傳六上六云云何也曰困于葛藟者隂居上乘剛未當位也動悔有悔吉者能動則其體變而初之臀困不行者至是可行而以吉行也嗚呼易為教人變易從道之書不亦信乎井巽下坎上困而受以井何也序卦傳曰困乎上者者必反下故受之以井井改邑不改井無喪無得往來井井汔至亦未繘井羸其瓶凶喪息浪反汔許訖反繘音橘羸律裴反文王之彖井云云何也曰穴土用木為幹以出水曰井為卦坎水在上巽木在下為木入水而取水象水上于木亦為以木汲水而水已出象故皆取義于井也井乃養道之自然而終不可窮之物固有及物之功矣然要在人汲之耳不汲井無喪也汲之井無得也來而汲此井常在往而不汲此井亦常在常在者井往來者人得喪者汲于井何與乎是故井可汲而不能求人汲此井之德也即如改邑者邑雖可改而井寧可改乎故用井者在知井之德而善用乎井也若汲方至猶未收繘井之綆而即羸其瓶則雖汲實未汲而凶立見矣故象占如此愚按井不可改乃指九二正在坎中而言至汔至以下則直取義為象矣不然得喪往來汔至繘井于卦象爻彖將何指定乎徒見穿鑿耳故讀易而通義象庶幾明文周設象之旨即易道可見一斑也愚按無地不有水可養而掘則成井則養固在人知求也無井之水不養人而汲則有功則養固在人之善取也率性之道正吾人取不禁而用不竭之井亦在人之知取不知取善取不善取耳性道豈任咎乎故君子深造以道欲其自得一章乃繘井之底本注腳率性之道不為堯存不為桀亡此改邑不改井無喪無得往來井井也堯則寒泉食勿幕有孚而桀則井泥羸瓶耳得喪皆自取于井何與乎然則世之心不知養養不得道而終于暴棄者是乃未汲與羸瓶耳可罪氣質哉彖曰巽乎水而上水井井養而不窮也改邑不改井乃以剛中也汔至亦未繘井未有功也羸其瓶是以凶也上時掌反孔子之傳井彖云云何也曰言井之為卦乃巽木入乎水而上水故謂之井井乃養人不窮之物也其言改邑不改井者謂九二剛中不變為泉食之主也汔至未繘井者已近水而未汲未有致養之功也羸敗其瓶者無出水之具不得致養是以凶也象曰木上有水井君子以勞民勸相上如字又時掌反勞力報反相息亮反孔子之傳井大象云云何也曰巽木入水坎水上出井之象也君子體此知養民而徒以利利民則在上費不給而在下惠必窮是欲養而反不得常養之道矣于是勞其民而勸勉輔相使之勤業立本自給不竭亦如井之為人取養焉初六井泥不食舊井無禽泥乃計反周公之象井初六云云何也曰初六在下象井之底其在新井乎則此井乃方泥而不可食者也其在舊井乎則此邑亦土邑丘墟雞犬亦盡井雖不改而不可用汲者也蓋初之象占固如此象曰井泥不食下也舊井無禽時舍也舍音捨孔子之傳井初六云云何也曰言井泥不食者謂新井則初六屬井下之泥未出乎水不可食也舊井無禽者謂舊井則邑已改雞犬盡時當其舍無人用也九二井谷射鮒甕敝漏谷余六反音育射石亦反鮒音付周公之象井九二云云何也曰九二既在坎中又失應比初有井谷射鮒象下有穴如谷而射注于鮒是為漏井甕復敝漏是為漏甕其不可食亦猶初矣蓋尚屬井之未成者也故其象如此而占從可知象曰井谷射鮒無與也孔子之傳井九二云云何也曰言九二之井谷射鮒者無正應又比初則無人成汲養之功而井漏甕敝也九三井泄不食為我心惻可用汲王明並受其福泄息列反周公之象井九三云云何也曰九三巽入之功已畢而坎中實之孚在下水已靜深不窮矣此正井之泄潔可食不同初二者也然以上無正應而不食則是賢人君子之道德已成正明主所宜汲以養萬民之日而反同于泥井敝井而置之矣夫初不食尚可言二不食尚可委至此而猶不食即行道且為心惻矣何也當此可用汲之井王若能有知人之明獨斷而汲之則必上下並受其福矣蓋王者不能以身親養天下又不能以身獨養天下全賴得泄潔之井為萬民養欲給求于不窮故但得王有知人之明即上下實享得人之福也象曰井泄不食行惻也求王明受福也孔子之傳井九三云云何也曰言若使井泄不食非但使我心惻即行道見之而且為心惻也至所謂王明受其福者則言行道之人亦望以求王之明耳而行道亦求望于王之明者則以為受福之故而求王明也不然何以王明之求為哉九四井甃無咎甃側救反周公之象井九四云云何也曰初為井泥二為井谷三為井水五為汲井之主上為井口四則井甃而修井者耳井必修而後可汲井甃則將來之受福在此矣故占象為無咎也嗚呼士君子閉户家修之日正四海引領望澤之年必實修實政使真可以致君澤民乃為無咎否則處士虛聲之誚必不能免咎能無耶故周公于三則致望于汲井之主而于四則又責以自修之井也象曰井甃無咎修井也孔子之傳井九五云云何也曰言井甃無咎者修井之道宜然也九五井洌寒泉食洌音列周公之象井九五云云何也曰九五剛中得正與九二同德相應是能汲井之王明也故其象為井洌寒泉食嗚呼井洌而能食則必免行路之心惻爻雖不言吉凶而有得無喪往來受福從可知矣象曰寒泉之食中正也孔子之傳井九五云云何也曰言寒泉之食者謂九五剛中得正能與九二同德相應而知所以汲享其養也上六井收勿幕有孚元吉收詩救反又如字幕音莫周公之象井上六云云何也曰上六井道已成養人攸賴而以隂柔虛中居之有井口勿幕象夫井已成而又勿幕將汲養不窮而任人隨取隨足矣前之所謂王明並受其福者實在于是其元吉也自理之必然又何待問乎故象占如此象曰元吉在上大成也孔子之傳井上六云云何也曰言上六之元吉在上者井道至此而大成也嗚呼一井耳不汲則為時舍則為甕漏而使人心惻一汲則有孚元吉而受福若此有養人之責者尚思用汲以為明哉革離下兑上井而受之以革何也序卦傳曰井道不可不革故受之以革革已日乃孚元亨利貞悔亡文王之彖革云云何也曰為卦上兑下離水火相息有革變之義故謂之革變革事之驚人聼聞者必革事已成而後人始孚之蓋凡民可與習常難與適變可與樂成難與慮始固古今之常耳又革者革物之義物不可以妄革亦必元亨利貞乃得悔亡耳嗚呼觀文王彖革之辭而知事之當革者不可慮其難而不革亦不可不計其有悔而冒行矣彖曰革水火相息二女同居其志不相得曰革已日乃孚革而信之文明以説大亨以正革而當其悔乃亡天地革而四時成湯武革命順乎天而應乎人革之時大矣哉説音悅當去聲孔子之傳革彖云云何也曰言卦謂之革者下火上澤水火相止而相生其燥濕往來如人之息而離中女兑少女二女同居水火不相得故曰革也已日乃孚者革已之日而後人信之也元亨利貞悔亡者離火文明有其才兑而人説有其民元大亨通有其時剛柔中正有其德如是則革而當乃悔亡耳不如是未有不悔者也天地革而云云者則推言革之時以言乎天地則二氣相代四時成序以孚革也以言乎聖王則湯武除暴安民順天應人亦以孚革也造化以此成物聖人以此革命其時豈不大矣哉蓋又以明革之所關者大而不可不善用耳象曰澤中有火革君子以治厯明時治平聲厯監本作厯按説文正韻厯厯通用孔子之傳革大象云云何也曰言水火相息為革革者變也而革變之大者則莫如四時故君子體此以治厯數明四時之序蓋厯定厯元乃其統體而差法則須年年改革不改革則天度必且漸差也初九鞏用黃牛之革鞏九勇反周公之象革初九云云何也曰初九離初無應未孚而不敢革者也故雖當革之時且宜執守堅實若用黃牛之革之鞏固而不可為乃為當耳故取象如此象曰鞏用黃牛不可以有為也孔子之傳革初九云云何也曰言初之鞏用黃牛者不可有為之時則不宜革也六二已日乃革之征吉無咎周公之象革六二云云何也曰六二正當日之方中而與五剛柔相應正所謂已日也如是而革則有孚悔亡自所必然以之往革則吉革之者亦無咎也故象占如此象曰已日革之行有嘉也孔子之傳革六二云云何也曰言六二已日革之征吉無咎者二五正應人心已孚行有嘉美尚何咎乎故征則吉也九三征凶貞厲革言三就有孚周公之象革九三云云何也曰九三以剛處剛而當離終是乃剛明躁決以用革者也嗚呼商鞅非其人乎以此而征亦必取凶故雖屬革得其正而亦且危厲然其時則當革言三就之時矣亦自可革而有孚也故傳獨解此義而不及征凶貞厲耳三就象離之三爻已就象曰革言三就又何之矣孔子之傳革九三云云何也曰言革言已三就矣尚何之乎則亦自宜即革耳嗚呼商君得秦王之孚有三就之機其革亦自不可以已但其以過剛濟革則于文明以説大亨以正之義反矣其悔安得亡乎故君子鑒商鞅而宜知所以用革之道也九四悔亡有孚改命吉周公之象革九四云云何也曰九四以剛履柔宜若有悔而位已入説水火之際剛柔不偏則正當改革之日矣故不革則已革必悔亡必有孚而改命為吉也嗚呼其當武王八百諸侯改命之秋乎象曰改命之吉信志也孔子之傳革九四云云何也曰言九四改命之吉者時正當革又剛柔得正故人咸信志而所革必吉也九五大人虎變未占有孚周公之象革九五云云何也曰九五以剛處説居中得正是乃大人自新新民之極而順天應人之時也故其象為虎變所謂威德折衝萬里人心望風而順喻者乎四尚改命信志物盡從化矧五之大亨以正尚待占而有孚耶故象占如此嗚呼非湯武之革命順天應人孰其當之五乃開創大定制作一新大人虎變天下文明之時故其時則為已日乃孚革而信之之時其革則為文明以説大亨以正之正故惟湯武之順天應人乃克當之也象曰大人虎變其文炳也孔子之傳革九五云云何也曰言九五之大人虎變者大人文明以説順天應人其創作煥然一新如虎之變而其文彪炳宣朗有目共覩其光昭耳上六君子豹變小人革靣征凶居貞吉周公之象革上六云云何也曰言革至上六而革道成矣其君子以禮樂相先有豹文之變其小人亦回靣稽首有從君之順天下盡革薄從忠風俗大變矣茍復征焉不亦凶乎則亦止宜居大得正而自享其吉也象曰君子豹變其文蔚也小人革靣順以從君也蔚紆胃反孔子之傳革上六云云何也曰言革至上六則人心已孚而盡革其應在君子則豹變而文蔚以贊皇猷其小人則革靣而回靣向內順以從君也嗚呼其洪範錫極雅詩作新之日乎革必至此而後為大亨以正應天順人也鼎巽下離上革而受之以鼎何也序卦傳曰革物者莫若鼎故受之以鼎鼎元吉亨文王之彖鼎云云何也曰鼎下巽上離其象似鼎又以木入火有烹飪之象故謂之鼎也為卦內巽外明二五得中相應有元亨之道故占象取于元吉亨也彖曰鼎象也以木巽火亨飪也聖人亨以享上帝而大亨以養聖賢巽而耳目聰明柔進而上行得中而應乎剛是以元亨亨普庚反飪人甚反上時掌反孔子之傳鼎彖云云何也曰卦象取鼎者言取乎卦之初六一爻象鼎足二三四三爻皆陽象鼎腹六五一爻象鼎耳上六一爻象鼎鉉其象似鼎也其曰以木巽火者則言為卦巽木入乎離火之中烹飪以之又為鼎義之所取也至聖人二句則推言鼎以烹飪乃凡民日用之常原不足道而其大者則固有聖人亨以享上帝大亨以養聖賢之旨又所以明鼎之為物褻用之不過家人之常器重用之遂為聖人之大寶鼎固在人用之何如耳其曰巽而耳目聰明柔進而上行得中而應剛是以元亨者蓋又所以明惟其有如是之德乃克有如是之占也而中間用是以二字則釋卦之中而示教之旨隱然意言之表矣頥口也而在聖人則養賢以及萬民鼎烹也而在聖人則養賢以享上帝觀頥之象而知惟聖人為能善用其頥觀鼎之彖而知惟聖人為能善用其器蓋吾夫子又于本象之中而取聖人以為之象矣然聖人之享上帝則曰烹養聖賢則曰大烹者蓋謂不能大烹以養聖賢則雖享上帝而上帝亦不享耳故鼎貴知所用而尤貴知所以善用也象曰木上有火鼎君子以正位凝命孔子之傳鼎大象云云何也曰為卦木上有火其形端正凝重鼎象也又離火上明向明出治之義木火相生革命宜凝之義鼎義也君子體此而知身履大位所宜正身盡道大命新革所宜得天承休如木上之有火也湯武革命鼎象也發政施仁正位凝命也至于君子居易俟命則又善用鼎象正位凝命之旨也于鼎之革故鼎新可知人生居心制行進德修業事事皆以易舊日新為貴鼎取正位凝命而以離明下應剛中是以占取元大亨通則明德固正位凝命之本乎故君子莫要于自昭明德初六鼎顛趾利出否得妾以其子無咎出尺遂反又如字否音鄙周公之象鼎初六云云何也曰初六以隂柔居巽初所謂鼎趾而顛缺不能支鼎者也故象取于顛趾顛趾之鼎庸何利乎然在鼎之始則故欲其去而新乃可入則出否亦有利焉故占象又取利出否又初以隂柔應四之剛不堪敵應則妾類耳夫婦有制妾亦何可濫得惟為子之故而得妾則尚無咎耳觀鼎初之取象見聖人之取象原不執于一轍即可明易之為道原不可為典要也故讀易必神而明之然後道不虛行象曰鼎顛趾未悖也利出否以從貴也孔子之傳鼎初六云云何也曰言初之顛趾不言凶者尚未有實雖顛未悖理也利出否者將以薦實而妾因子貴上逹耳九二鼎有實我仇有疾不我能即吉仇音求周公之象鼎九二云云何也曰陽剛為實九二正于位為鼎實而于五為正應是為鼎有實象然以隔于三四故我之六五正匹方有所疾而不能即就乎我然實成而終就則亦必然之理耳故占象又為吉也嗚呼鼎亦取乎有實耳有實自必即即不即而要自為有實之鼎有可即之道也不然而虛聲是盜即我仇即焉但見凶耳何吉之有乎象曰鼎有實慎所之也我仇有疾終無尤也孔子之傳鼎九二云云何也曰言鼎有實者則自能慎其所之也故雖我仇有疾不能即就而實成自就終無尤也嗚呼有疾之鼎自慎所之然則所之不慎者原屬無實之鼎耳故君子于所之辨鼎之虛實如燭照數計也九三鼎耳革其行塞雉膏不食方雨虧悔終吉行下孟反塞悉則反周公之象鼎九三云云何也曰九三以陽處剛亦為鼎中之實以其過剛失偶又當卦變之地則是耳之可以行者方在變革而不可以行故雖承上卦文明之腴有雉之美而不得為人之所食然以陽居陽為得正茍能自守以待則隂陽自和而其悔可虧終必見食而吉耳三與上同實相應而上為玉鉉則是所以貫耳以行者變革而莫可舉行故為鼎耳革行塞雉膏不食此亦足備一説故附記之象曰鼎耳革失其義也孔子之傳鼎九三云云何也曰言九三之鼎耳革者在下之上于位則鼎當有耳舉之以行而耳革不行失其義也九四鼎折足覆公餗其形渥凶折之舌反餗送鹿反形一作刑渥一作剭音屋周公之象鼎九四云云何也曰九四鼎之任重者也而下應初六之隂則不勝其任矣任重而不勝其任穢形尚可言耶故其象為鼎折足為覆公餗其形渥嗚呼古今之德薄而位尊智小而謀大力小而任重舉可作是觀也欲不覆餗形渥得乎象曰覆公餗信如何也孔子之傳鼎九四云云何也曰言九四居任重之地平日必自負有致澤之言今而覆公之餗平日之信如何也嗚呼深源以蒼生自負安石以唐虞三代期君而敗壞國事至于如彼書空舍宅之際無論當世莫能諒其信即反心自問平日之慷慨自負曽可問耶當人重任者尚其念之六五鼎黃耳金鉉利貞鉉玄典反周公之象鼎六五云云何也曰五于鼎為耳而有中德故象黃鉉則貫耳舉鼎者也惟耳既黃故鉉取金而象黃蓋五以虛中應九二之剛中故其象如此然其利則又在貞固蓋又即爻義自有之德而因以示教耳舍鉉無能舉耳故五兼言黃耳金鉉象曰鼎黃耳中以為實也孔子之傳鼎六五云云何也曰言鼎黃耳者謂五柔中得正為離明之主而下應剛中之二所賴以舉鼎腹之實者在此也故獨曰利貞焉上九鼎玉鉉大吉無不利周公之象鼎上六云云何也曰上于鼎之實則已舉無所用鉉而適當鼎鉉之處故直以玉鉉名其德蓋無為而化成者也其吉無不利宜也故象占如此玉性溫中和之象故為鼎德之至古稱粹德為金玉之器義亦猶此人能德器粹然何往不吉不利乎故上九之利即彖之元吉亨也象曰玉鉉在上剛柔節也孔子之傳鼎上九云云何也曰言上九之玉鉉在上謂其以剛履柔剛柔應節也震震下震上鼎而受之以震何也序卦傳曰主器者莫如長子故受之以震震亨震來虩虩笑言啞啞震驚百里不喪匕鬯虩許逆反啞烏客反喪息浪反匕必以反鬯勑亮反文王之象震云云何也曰震于物為雷動于義為震動于人為長男主鬯者也凡人震動則知驚懼修省知驚懼修省則必寡失故震有亨道而震來虩虩者後必笑言啞啞矧以承器之主而知恐懼修省則必自信自修初雖震驚百里後必能守其宗廟社稷而不喪匕鬯蓋知危而後安知亡而後存知喪而後得乃天道人事之必然也故震非驚人致喪之地而笑言不喪之機耳主器者其勿以震視震可也彖曰震亨震來虩虩恐致福也笑言啞啞後有則也震驚百里驚遠而懼邇也出可以守宗廟社稷以為祭主也孔子之傳震彖云云何也曰言震亨者謂震來雖虩虩而恐懼致福可亨也笑言啞啞者言初能震懼後必有法則可喜也震驚百里謂二震相乘驚上之遠而懼初之邇也其曰不喪匕鬯則謂守器之主而如此其出自可以守宗廟社稷以長為祭主也象曰洊雷震君子以恐懼修省洊在薦反省悉井反孔子之傳震大象云云何也曰洊重也為卦上下皆震故謂之洊雷震君子體此知人心之宴安怠弛非所以崇德廣業故時時恐懼修省以臨深履薄之心用修過省非之功如洊雷之相襲震動耳嗚呼君子以此存心安得不亨又安得或喪匕鬯乎震于義為悔所謂震無咎者存乎悔也于卦為復所謂克己而後能復禮也故震之為道最宜于恐懼修省以自治其身震象不取臨事而懼而取于恐懼修省者蓋應天下之事而過于恐懼則喪失之咎反不免又若慮其震動而並廢修省則告子勿求之害又大耳聖人盡性至命故其立言精當如此初九震來虩虩後笑言啞啞吉周公之象震初九云云何也曰初為成震之主故其辭與彖無異而象傳亦與彖傳無異也然曰後笑言啞啞吉加一後字則又于彖之未及言者暢發之矣象曰震來虩虩恐致福也笑言啞啞後有則也解見彖六二震來厲億喪貝躋于九陵勿逐七日得躋于西反周公之象震六二云云何也曰六二當震中而下乘初剛震之來厲者也其義有億喪貝而躋于九陵之象然初以能震而初震後笑二又柔中得正有不初喪後得乎故占象又示以勿逐而七日自得耳七日與七日來復之義同蓋既有此震厲之功則當其宜復之時自然來復復三頻復之雖厲無咎亦猶是也象曰震來厲乘剛也孔子之傳震六二云云何也曰言六二之震來厲者謂其乘初剛耳故有喪貝躋陵之厲也六三震蘇蘇震行無眚周公之象震六三云云何也曰六三前震將終而處以隂柔有舒緩自失之狀夫當此宜震之時而如是則過不免矣必能法雷行之震動乃無咎耳象曰震蘇蘇位不當也孔子之傳震六三云云何也曰言六三之震蘇蘇者以柔而處三之剛位原不當耳九四震遂泥泥乃計反周公之象震九四云云何也曰九四處重震之中以剛處柔是震而泥于震者也嗚呼慎而無禮則葸况震而遂泥乎不言失而失可知矣象曰震遂泥未光也孔子之傳震九四云云何也曰言震以退省為主若滯泥于震懼之中而曽不知退省以無恐其又何日能光大乎震蘇蘇則有咎震遂泥則未光可見易道時中則無過六五震往來厲億無喪有事喪息浪反周公之象震六五云云何也曰六五處上震之中當下卦之上是來往皆在震厲之中矣而以柔處中則全若不聞而反無喪吾所有之事則與不震之時若一而所謂不喪匕鬯者即在是也故其象占如此象曰震往來厲危行也其事在中大無喪也孔子之傳震六五云云何也曰言震來往皆厲者常在危行之中也而所以億無喪有事者則以五之柔中得正其修省之事原自在震厲之中本非震厲之所能得亦非震厲之所能喪而大無喪也嗚呼在震中而無喪所事其造次顛沛必于是者乎是震正屬驗學力之地亦正恐懼修省之日耳震而亨殆謂是歟上六震索索視矍矍征凶震不于其躬于其鄰無咎婚媾有言索桑落反矍俱縳反周公之象震上六云云何也曰上以隂柔處震極故為索索矍矍之象以是而行凶可知矣若能于震不于其躬而于其鄰之時早知恐懼修省則亦自可以無咎然處震之終而居不當位之地終不免婚媾之言耳象曰震索索中未得也雖凶無咎畏鄰也孔子之傳震上六云云何也曰言上六之震索索者中心未能自得故不能如五之當震無喪也然雖凶而無咎者則亦尚知畏懼于鄰之戒而免咎耳嗚呼吳越之于宋亦其事也豐川易説卷八
