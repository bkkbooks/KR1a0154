body:
  text: 豐川易説卷十鄠縣王心敬撰下經渙下坎上巽兑而受之以渙何也序卦傳曰説而後散之故受之以渙渙亨王假有廟利涉大川利貞渙呼亂反假音格文王之彖渙云云何也曰渙散也為卦下坎上風風行水上離披解散之象故為渙渙之卦中原有亨通之道有王者假享有廟以聚祖考精神之象又有利涉大川以巽木舟楫乘乎坎水之象然總以得正為利也故象占如此嗚呼渙于義為渙散言之似不祥不善者而文王則取于亨取于假廟又取于涉川天地之化機不善用之皆否皆凶而善用之皆亨皆利執一者不可以語權而通變則皆宜民也然向非文周孔子精義入神之聖人示以通變宜民之精詣將眼前活潑潑察乎天地之理死却不著不察之凡民者且無量矣噫不觀天地之生物不知大化之不測不觀大易之窮理不知聖人之神明易固在人善讀善用也彖曰渙亨剛來而不窮柔得位乎外而上同王假有廟王乃在中也利涉大川乘木有功也孔子之傳渙彖云云何也曰言渙之所以亨者內卦本坤而上乾之一陽來居其中遂生水成坎水生不窮故剛來不窮外卦本乾而下坤之一隂得位乎外遂生風成巽以上同于五得位乎外而上同也其曰王假有廟者則以九五王乃在中而以剛中萃渙也利涉大川者則以水上有木乘木濟川而有功也象曰風行水上渙先王以享于帝立廟孔子之傳渙大象云云何也曰言巽風行于坎水之上水靜風散故為渙先王體此知鬼神無形惟郊廟焄蒿悽愴乃見鬼神而非立廟以享則上帝之精神渙乎不屬即自己之精神亦渙而終散故享于帝以立廟而萃渙也初六用拯馬壯吉周公之象渙初六云云何也曰初六為渙始拯之尚易而用壯馬以拯之則拯尤速而吉無不利蓋坎之初六于馬為薄蹄原非壯馬之比而初柔居下故所以用拯者必得馬壯乃吉也象曰初六之吉順也孔子之傳渙初六云云何也曰言初六之所以吉者謂拯而能如壯馬之用乃所以順受上之渙而得吉也不然則是不欲順受其渙而成凶矣九二涣奔其機悔亡機音己周公之象渙九二云云何也曰下三爻皆受上之渙而九二以一陽居中有水中乘木而奔之象居下而受上之渙如此悔尚何有乎故象占如此機木之可乘以濟水者矣象曰渙奔其機得願也孔子之傳渙九二云云何也曰九二之渙奔其機者欲得其受渙之願而如此也蓋二與初同受上渙初既用馬壯矣二欲得所願又安得不奔其機而乘木以從風哉則是二之欲得其願者正是欲一得其悔亡之願也六三渙其躬無悔周公之象渙六三云云何也曰六三當渙之時而以柔居剛志在受渙而不自有其躬者也公而忘私君而忘身渙之得當者耳尚何悔乎象曰渙其躬志在外也孔子之傳渙六三云云何也曰六三之渙其躬而不有者志在于外以受渙而不暇有其躬也嗚呼非鞠躬盡瘁死而後已之武侯其孰當之六四渙其羣元吉渙有丘匪夷所思周公之象渙六四云云何也曰六四居下卦之上為成卦之主而與九五同體正彖所謂柔得位乎外而上同是大臣之與君同德代以宣猷布化者也而以隂居柔下無應與故以言其無黨無私則為渙羣而元吉言其志在尊君承君則為渙有丘言其計慮精密無微不入則為匪夷所思蓋下三爻之所仰以受渙者在此人而九五之所賴以渙汗大號者亦賴此人也惟大禹之代舜聲教訖于四海乃克當之象曰渙其羣元吉光大也孔子之傳渙六四云云何也曰言六四之渙其羣元吉者其心事青天朗日坦白精忠而光明正大也九五渙汗其大號渙王居無咎周公之象渙九五云云何也曰九五履剛居位下比六四正彖所謂在中乘木之王故為渙汗其大號與渙散其居積則自可以濟渙而無咎耳故象占如此渙王居以散其居積為解正合王者萃渙渙汗之旨亦與武成大誥散財發栗之意隱合但按爻傳以王居無咎為正位彖傳以王假廟為王乃在中則是代王作舟楫渙大號者倚賴于四而五實正位居中無為而治如舜之恭己南面耳則渙王居解以當渙時惟王正位居體于義亦通象曰王居無咎正位也孔子之傳渙九五云云何也曰言五之王居無咎者謂五勞于擇人而逸于任人得以正位居中恭己無為也依傳王居上去渙字而但以王居無咎為辭則于涣王居句渙字略頓而以王在中而居無咎為解乃覺前後可通上九渙其血去逖出無咎去起呂反周公之象渙上九云云何也曰上九以陽剛居渙之上能出于渙者也又逺去乎六四之隂忽髙出乎下二爻之上位是在蠱為不事王侯之尚志在漸為可用為儀之鴻漸也見機髙風逺引髙躅方且足以廉頑立懦鄙敦薄寬又何咎乎象曰渙其血逺害也孔子之傳渙上九云云何也曰上九之渙其血者見機之哲髙飛逺舉自然血去惕出可以遠害也嗟乎鴻飛冥冥乘風逰天弋者之繒繳曾能及耶子房托赤松之遊而終身不及韓彭之禍其此義歟節兑下坎上渙而受之以節何也序卦傳曰物不可以終離故受之以節節亨苦節不可貞文王之彖節云云何也曰節有限而止之義也為卦下兑上坎澤上有水其容有限故為節節固自有亨道蓋凡事有制乃亨通之道也又其體隂陽各半而二五皆陽則亦亨通之道蓋剛而得中乃亨通之本也若至于太甚則苦矣太苦乃不可久之道故又戒以苦節不可貞蓋節以時中為貴時中之節乃謂之和乃可為天下通行之道苦節失和而不可以通原非可貞之道也大抵節取中節可通之義故亨義即在節中而節亦取于可通為貞苦節或至違天時拂人情雖較之縱欲敗度不同而要之非久通之道不可久通則又是節失其節矣失節之節則亦究成凶咎耳細玩彖辭僅僅七字而無義不該見易道之神明通變又見聖人之精義入神真令人手舞足蹈不能已也而孟子所以時孔子隘伯夷譏陳仲子之旨亦可于此概見矣彖曰節亨剛柔分而剛得中苦節不可貞其道窮也説以行險當位以節中正以通天地節而四時成節以制度不傷財不害民孔子之傳節彖云云何也曰言所謂節亨者剛柔分而剛得剛位柔得柔位而二五則剛而得中能以天理人情之正節制天下也故亨苦節不可貞者凡事通變宜民則不窮節過則苦苦則人不能堪而其道窮也然則節何以得不苦乎必如卦德之説以行險當位以節中正以通乃禮之用和為貴節道斯美而貞亨不窮耳今觀天地之節也四時皆有節而究之以通變成聖人之節也特所以制經常之度使之足以省費愛民而止豈非不可貞之謂乎吁觀孔子之傳而知不中之節原非所貴抑又明甚也象曰澤上有水節君子以制度數議德行孔子之傳節大象云云何也曰言卦下兑上坎是為澤上受水而有節故謂之節君子體此以制禮而適中以制數之多寡與度之隆殺體此以議道而適中以辨德之偏全與行之過不及務使節適于中而可通焉初九不出户庭無咎周公之象節初九云云何也曰初九以陽實得正位居節之始是謂初節然以四應在外而九二以陽實塞其前以此而往必不能通而徒犯其難故象占為不出户庭無咎蓋初非不欲通而位處其塞則自安于塞耳其塞而知節者乎象曰不出户庭知通塞也孔子之傳節初九云云何也曰言不出户庭者在節之初防險慮終是乃知通塞之義而不至于犯難所以無咎也九二不出門庭凶周公之象節九二云云何也曰九二居兑之中陽剛中實澤水盈滿又上鄰兑口澤當可通之時也而以位尚居中塞而未通則宜出而不出其亦失通變不窮之義矣凶其能免乎故象占如此二與三之兑口相接本可以通而固執不通是即不可貞之苦節也其宜通而不通之節乎象曰不出門庭凶失時極也孔子之傳節九三云云何也曰言通塞有時時行則吉初本時不宜出二則時可出矣而亦不出門庭失時至此亦已極矣能無凶乎六三不節若則嗟若無咎周公之象節六三云云何也曰六三以隂柔悅佞之姿居兑之口是襲厚實之積悅佞諛之人日事般樂怠傲而用財如流水者也其不節若兑口之日出不已則必匱屈而有悔心之嗟嘆此則嗟乃自取于人何咎乎嗚呼今之用財不節而終致悔嘆無及者皆此類也漢武有四海之富又承文景積纍之後一不知節而後且虛耗悼嘆矧其下乎故不節之嗟只可自咎不可咎人象曰不節之嗟又誰咎也孔子之傳節六三云云何也曰六三惟其自己全不知節故後自蹈于嗟嗟乃自取又誰咎乎六四安節吉周公之象節六四云云何也曰六四柔順得正上承九五自然有節者也自然之節自與苦節不同其吉而得亨不待言矣嗟乎節何嘗不吉只苦節不可通耳尚節者亦尚為安節可也象曰安節之吉承上道也孔子之傳節六四云云何也曰言六四安節之吉乃承上之道也然則為人臣而自盡其節即皆安節之吉矣九五甘節吉往有尚周公之象節九五云云何也曰九五剛中當位又居坎之中為水勢流通恬適不苦正彖所謂説以行險當位以節中正以通者也是謂甘節以此制度則不傷財不勞民以此制度數議德行則中中和之度適時中之宜節制天下而仍通變宜人又何已之不吉往而人不尚乎象曰甘節之吉居位中也孔子之傳節九五云云何也曰言九五甘節之吉者以其居位之中故所行中節而和可為天下之達道也上六苦節貞凶無咎周公之象節上六云云何也曰上六以隂柔居節之終行險之上正所謂節之苦而不可貞者也然雖以節得凶悔亦自可亡耳故象占如此嗚呼其申屠狄陳仲子之流歟象曰苦節貞凶其道窮也孔子之傳節上六云云何也曰言苦節雖貞亦凶者節而和則可行一太苦以之為己則難久以之責人則難繼其道本自處于窮也故節取中正以通為亨而苦節不可貞耳中孚兑下巽上節而受之以中孚何也序卦傳曰節而信之故受之以中孚中孚豚魚吉利涉大川利貞文王之彖中孚云云何也曰為卦上巽下兑四陽外實兩偶中虛故為中孚又卦義為悅而巽巽以悅故亦曰中孚也而澤中之物順而悅以誠相孚者則莫如豚魚蓋其為物風至則吹浪水面如期不爽水族之無心順時而含靈應氣者惟此最著故彖謂人苛能如豚魚虛中懷信則吉也又卦為悅而巽無不可濟之險故又為利涉大川然必守正則吉不正亦不可為信也孚之為字從爪從子取鳥之乳卵應期而化之義中孚之義亦謂虛中之孚須如鳥之乳卵也彖曰中孚柔在內而剛得中説而巽孚乃化邦也豚魚吉信及豚魚也利涉大川乘木舟虛也中孚以利貞乃應乎天也孔子之傳中孚彖云云何也曰言所謂中孚者兑下巽上合二體觀三四皆柔而在內分二體觀二五皆剛而得中柔在內則虛剛得中則實虛則無物實則無偽兑悅巽順合而成信乃人君感化邦國之道也所謂豚魚吉者能存誠順應乘化以逰如豚魚之應風則吉也利涉大川者涉世順應如巽木之浮澤虛舟之順風何往不利也中孚以利貞者天道孚而有信故四時不言而信百物應期而生人能靜虛守正與物無妄乃能應乎天也故天地間凡事以中孚為吉而中孚尤以得正為利耳存誠順應則信及豚魚不然曽豚魚之不如矣信則民任故孚乃化邦中孚為卦原是乾卦而虛其中蓋天之心天之體天之運皆孚而貞也故中孚以利貞乃應乎天人心大虛如中孚即應乎天蓋應天者先天而天不能違耳象曰澤上有風中孚君子以議獄緩死孔子之傳中孚大象云云何也曰澤上有風風行水上渙散解釋之象君子體此以兑説之口議死罪之獄而使受渥澤以巽入之心緩獄囚之死而使被仁風亦如澤風之渙散解釋也議獄者求其入中之出緩死者求其死中之生是惟大聖人本一腔至誠惻怛之心乃能如此故議獄緩死亦中孚意也初九虞吉有他不燕他湯何反周公之象中孚初九云云何也曰初當中孚之初陽剛外固而與四相孚安然能孚則吉有他則燕之不如矣蓋虞有安而慮之義孚以誠確為貴而初則陽剛外包如鳥凝神抱一慮始謹初有虞之象也燕亦安義乃玄鳥之稱應時而至處堂悅入蓋物之有孚而説巽者也卦取中孚原有鳥孚之義故初取燕二取鶴而上取翰音蓋皆以鳥孚之旨相終始也大抵初爻象鳥伏子故云有他不燕二爻象孚欲成故云其子和之三爻象子在殼故云得敵四爻象子成故云月幾望五象雛成羣故為有孚攣如上象習飛故為登天而要之皆鳥孚之節度即皆中孚之義象物象也善讀易者即象得義即義悟象于易即思過半矣即中孚二字一象鳥孚卵一象豚魚一象涉川一象燕一象鶴一象鼓罷泣歌一象月望馬亡一象攣如一象翰音可見天地間無象非易無在非易在人善觀善會耳象曰初九虞吉志未變也孔子之傳中孚初九云云何也曰言初九之虞吉者謂以剛德履悅初其志誠一未變也九二鳴鶴在隂其子和之我有好爵吾與爾靡之周公之象中孚九二云云何也曰鳴鶴子和者中孚之神含于三四而其應則動于二五蓋九二與五以剛中説巽正當鳴和之應而鶴則陽鳥善鳴于二兑中之象為尤近故二取鳴鶴子和以見相孚之必然也其曰好爵爾靡則謂好爵人所易吝而相孚則彼此可共是亦悅而能巽可以見相孚之無間者故象又取之耳嗚呼其在人心則誠信為德無物不通者乎象曰其子和之中心願也孔子之傳中孚九二云云何也曰言其子和之者其鳴以中心之誠故和亦出中心之願也繫辭曰言行在善不善之間而應違關千里之遠其斯誠感誠應之自然乎而人心之廓然大公物來順應亦猶是矣六三得敵或鼓或罷或泣或歌周公之象中孚六三云云何也曰六三以隂處陽以柔處剛悅極而應翰音之上九故為得敵而不能自主或鼓或罷或泣或歌之象象曰或鼓或罷位不當也孔子之傳中孚六三云云何也曰言六三之或鼓或罷者三以柔處剛又居兑口以應不正之上所處之位原不當也六四月幾望馬匹亡無咎周公之象中孚六四云云何也曰六四居中而以隂居隂中虛無物不與三合而獨上比于五是為月之幾望而圓滿馬之匹亡而獨進中孚如此咎于何有故象占如此六四以柔順靜虛巽而承五是為隂之極盛而中孚體完者故為月幾望之象與三兩隂相比如馬之匹三躁擾搆敵而四獨柔巽比五絶三不正之朋故為馬匹亡之象象曰馬匹亡絶類上也孔子之傳中孚六四云云何也曰言馬匹亡者四與三皆隂而邪正不同四絶隂類而上從九五故自無咎也九五有孚攣如無咎周公之象中孚九五云云何也曰九五居巽之中居剛之正下乘六四而靜虛內通內應九二而中正相孚正所謂剛中説巽以化邦者也故為有孚攣如而自得無咎之象其在于鳥則期滿子成之候乎故六爻惟此獨稱孚焉而王者之信孚大臣羣臣化孚天下萬邦可以類推即人心之性善而情善心誠而意誠亦可類推也象曰有孚攣如位正當也孔子之傳中孚九五云云何也曰言九五之有孚攣如者惟其位正當剛中之位故其孚有攣如之孚也四五虛實得位中孚之至而皆有補過之辭蓋人非至誠未有不補過而能無過者故中孚又以補過為功耳然要之易道亦原是處處教人補過以寡過之旨也上九翰音登于天貞凶周公之象中孚上九云云何也曰上九亢而在外內應不正之三故為展翰長鳴聲聞于天之象夫孚由中心之誠虛而後得乃欲以翰音求之是自趨于喪孚之途者也守此不變凶所不免矣故象占如此嗚呼學者實德不孚而聲聞過情亦豈吉道乎象曰翰音登于天何可長也孔子之傳中孚上九云云何也曰言翰音登于天者以躁妄為中孚豈長久之道乎必也誠中孚外如四如五其庶幾也小過艮下震上中孚而受之以小過何也序卦傳曰有其信者必行之故受之以小過小過亨利貞可小事不可大事飛鳥遺之音不宜上宜下大吉文王之彖小過云云何也曰為卦下艮上震四隂在外二陽在內隂多于陽小者過也故為小過小者既過則可以亨矣然必以守正為利不正亦不得亨也又既為小過則止可小事而不可大事以卦原是小者過則只可小事得亨而不可于大事望利也且卦體上下四偶象鳥翼中二竒象鳥身艮止震動四隂用事而二陽不能自主如鳥身挾翼以飛且飛且鳴而遺之音亦可謂小者過矣而其實不宜上而宜下乃大吉以上則大事而下則小事也故象占如此觀隂盛雖亨而亦必利貞可見隂之亨正亨以貞人臣無以震主之威自失臣節是為正也觀可小事不可大事則知凡事量力而處乃為得宜若力小任重智小謀大是自蹈覆餗甚不可也觀飛鳥遺音不宜上宜下乃大吉則知凡事吉以自安其分人臣雖至託孤寄命治定功成亦必恭謹斂約勞謙有終然後上順下安永終令譽也嗚呼聖人之立象也舉一以例百繫辭也括義以形象不特言凶言悔言吝者為示戒即言亨言利言貞者亦示訓易真所謂懼以終始其要無咎出入以度內外使知懼也仁矣哉聖人之用心乎真合天下萬世以寡過矣彖曰小過小者過而亨也過以利貞與時行也柔得中是以小事吉也剛失位而不中是以不可大事也有飛鳥之象焉飛鳥遺之音不宜上宜下大吉上逆而下順也孔子之傳小過彖云云何也曰言小過亨者謂小者過而亨也過以利貞者與時偕行過而宜得其正如四時之行也小事吉者二五皆以柔中處之是以小處二五故止得小事吉也不可大事者大事非剛不勝而剛又非得位不行三四兩剛皆失當行之位而不得其中是以不可大事也飛鳥遺音不宜上宜下大吉者卦體有飛鳥之象焉往上則其勢逆往下則其勢順故以舍逆就順為吉也然不宜上宜下亦取上卦震動下卦艮止之義蓋又以喻既過而愈動以上則陵陽愈逆而能止以下則從陽自順故得大吉也總之天道惡盈福謙處小過之時自以退處卑遜使尊者安尊始可免犯順之凶故聖人論理無不凖天道之自然以立言耳大抵過有三義有過勝之義有過失之義有過往之義卦中之隂勝陽傳所謂小者過是過勝之義也卦中隂多失于太柔傳謂剛失位而不中是過失之義也卦中爻多不應行不相遇傳謂與時偕行是過往之義也讀彖與傳當知原備此三義象曰山上有雷小過君子以行過乎恭喪過乎哀用過乎儉孔子之傳小過大象云云何也曰山上有雷是乃雷在山上往而小過耳君子體此知禮雖以得中為貴而道須以善下為基故于行也則寧過乎恭自處尚謙不敢泰也于喪也則寧過乎哀自處尚哀不敢易也于用也則寧過乎儉自處尚省不尚奢也凡事下而不敢上順而不敢逆以是為小過耳初六飛鳥以凶周公之象小過初六云云何也曰卦之六爻象飛鳥初上乃鳥之兩翰而初與四應又居過時是上而不下者也飛鳥不宜上宜下而初獨上而不下失順逆之義矣自屬凶道故象占如此象謂宜下吉而初在下反凶者彖以卦之時言爻以卦之象言蓋鳥之下非一羽所能止上方飛也而初能下乎且卦象豎觀則初為下若橫觀則正以初上為並飛之羽翰耳象曰飛鳥以凶不可如何也孔子之傳小過初六云云何也曰言飛鳥以凶者當隂盛之時羽毛之成身雖不與之俱飛而不得也大抵下三爻止體以弗過為無咎而初則便是頻飛之翰當止不止故為過凶六二過其祖遇其妣不及其君遇其臣無咎周公之象小過六二云云何也曰六二雖居過時而能柔中守正過而不過于後則雖過初六始生之祖而居二則遇其配祖之妣于前雖不及六五柔中之君而處二則實遇承君之臣履柔安分亦自是無咎之道也故象占如此往二則過其始故為過其祖柔得柔位是遇其妣正應在上是不遇其君二本在下是遇其臣按過祖遇妣注以過三四遇五六為解愚嘗反覆此義大抵爻中過遇之旨謂已過此而往遇彼耳則六二之解以徑過其祖而值遇其妣庶于文義為順又例以不及其君遇其臣之旨則是言過乃已過不遇而不及則謂其尚在前而未過抑又明甚也若以初不可言祖則初為爻之始生始生為祖于義亦通顧不知明易君子以為何如也象曰不及其君臣不可過也孔子之傳小過初六云云何也曰言不及其君者臣無過君之理過則逆而上矣當隆盛之時而能順止于下不及其君是舍逆取順之道故為無咎也九三弗過防之從或戕之凶周公之象小過九三云云何也曰三當小過之時上應上六而獨與四以陽剛中正卓然自立是衆隂之所欲甘心者也若不知于此過防則恃剛必折或有從而戕之者矣漢之李固陳蕃輩其凶可證也故象占如此鳴呼聖人為羣隂中之孤陽慮亦至矣故曰作易者其有憂患乎象曰從或戕之凶何如也孔子之傳小過九三云云何也曰言從或戕之凶何如也而尚可勿過防歟九四無咎弗過遇之往厲必戒勿用永貞周公之象小過九四云云何也曰九四以剛居柔而處隂過之時尚無過咎之道也蓋四位本隂而九則剛是為剛柔相劑而弗過以四之柔而遇九之剛是為以柔際剛而遇之夫過而不遇則咎生弗過而遇尚何咎乎若其不然而欲過以前往則以陽而入隂君子而遇小人危厲亦甚矣故往在必戒也然過之為旨取往過之義謂其與時偕行耳豈謂固守一轍全不知變哉故又以勿用永貞為貴也蓋一永貞而固守不變則又過耳上卦為震動而四為震主動則成動之過故往厲必戒所以即四之往而戒過也永貞又成不動之過故勿用永貞所以即四之不往而救過也象曰弗過遇之位不當也往厲必戒終不可長也孔子之傳小過九四云云何也曰言九四之弗過遇之者四隂而居以柔則為小之過今以九居四則不當位所以不過柔也往厲必戒勿用永貞者固執之意亦不可長守不變也味其語意蓋正以申與時偕行之義于二陽爻中耳愚按觀終不可長之辭似義在釋勿用永貞之旨而傳却單言往厲必戒遂若傳義難通若參觀諸爻傳中往往以一語該下數言則亦自可知終不可長之言為釋勿用永貞也然亦終不敢定其云何也則亦從朱注當闕之例俟知者耳六五密雲不雨自我西郊公弋取彼在穴周公之象小過六五云云何也曰六五以隂居剛處乎三四二陽之上下應艮止在中之二而又動體居中是正隂之方盛而髙出乎陽柔之得中而小事為可者也故其象為隂上陽隔而密雲不雨自我西郊又為公弋取彼在穴耳在穴指內卦止中之二言也象曰密雲不雨已上也孔子之傳小過六五云云何也曰言密雲不雨者以柔居五其位已上隂盛之極所為小過也上六弗遇過之飛鳥離之凶是謂災眚周公之象小過上六云云何也曰上六以隂柔居動終而據過時雖有應在下然陽失其位而艮不能止窮髙非位是為弗遇過之而其象則為飛鳥任其躁動之性以逺離巢穴飄散無歸者也以此處過凶所必至而外災內眚俱不免耳象曰弗遇過之已亢也孔子之傳小過上六云云何也曰言弗遇過之者隂至于上陵陽已極位亢而不可下也夫飛鳥不宜上宜下而上如此舍順效逆能無凶乎大抵天下事過亢則無一而可陽且不可過亢而况于隂乎故為隂者亦守利貞之戒而可矣既濟下離上坎小過而受之以既濟何也序卦傳曰有過物者必濟故受之以既濟既濟亨小利貞初吉終亂文王之彖既濟云云何也曰水原須火以致用者也而為卦水火相交故曰既濟既濟則有亨道矣然所亨者小而又利在得正其象則為初乃得吉而于終則亂也蓋言亨于既濟之時則所亨為小謂其于大者既濟而後為濟故亨為亨小亦且既濟則易于恃濟自止故亦為亨者小而終易亂終且易亂而初之吉不誠為小乎嗚呼聖人之憂盛危明慮險防危固如此乎然亦卦中離二得中有初吉之義上坎終止有亂之道非于象之外取義也郝氏曰濟取以火濟水之義蓋坎象隱伏須以離明辨之則相濟為用故既未濟二卦皆以離化坎君子明善以誠身致知以誠意所以為易道之終也又曰易道之體用盡統于乾坤而乾坤之變化莫妙于坎離上經卦三十乾坤而下竒偶各三十遇泰否而終坎離以坎離為􅪮否之交也下經卦三十四咸恆而下竒偶亦各三十遇損益而終既未濟以既未濟為損益之徴也愚按人情欲濟而未濟則必求中道以圖濟既濟則已得其濟遂終止而更不復求濟求濟則何所不濟終止則雖濟必亂此雖人事之必然亦天道之自然故衆人以既濟為喜而聖人以既濟為憂此彖于六爻多戒辭而象傳則特揭思患豫防也彖曰既濟亨小者亨也利貞剛柔正而位當也初吉柔得中也終止則亂其道窮也孔子之傳既濟彖云云何也曰言既濟亨者謂小者得遂而亨通也利貞者剛柔各得其正而二五所居之位盡當也初吉者謂其離二之柔得中而可濟坎也終止則亂者謂以坎止居上是乃終止終止則亂理在必然而其道窮也大抵既濟吉以離明亂以坎止凡事自恃其已濟而終止則道窮而亂理在不爽唐明唐莊固可證宋襄符堅亦可鑒也象曰水在火上既濟君子以思患而豫防之孔子之傳既濟大象云云何也曰言卦上坎下離水在火上是水得火以濟其用也故謂之既濟然得其用則火可以濟水而失其用則水亦能滅火則是水火有既濟之用而亦有意外之患矣君子體此知患生于不測而流潰于不防于是兢業惕厲已治如未治已安如未安時時事事思中間之患機孜孜亹亹謹未至之隄防一如火之足以濟水而不使水之得以滅火也愚按孔子繫辭翼否九五之旨全若為既濟之君子明思患豫防之旨處否之君子其尚思此言既濟之君子亦無忽此言可也坎險在外防患之象離明在內豫思之象初九曳其輪濡其尾無咎周公之象既濟初九云云何也曰初九處既濟之初以陽剛居離明之始知謹始者也是為既濟水將登岸而車輪上曳牛尾尚濡之象謹始如此寧有咎乎蓋車當登岸之際正車上車下之人凛凛惕厲戒愼以防患之時也既濟而如是則雖濟而常若未濟之心自然咎所必免也象曰曳其輪義無咎也孔子之傳既濟初九云云何也曰初九之曳輪濡尾此乃知慮危防險之道者于義自無咎也六二婦喪其茀勿逐七日得喪息浪反茀音佛周公之象既濟六二云云何也曰六二文明中正之德本才足以濟險也然以上應九五坎險之君自恃其濟而不能下賢以行其道則二雖有濟險之具亦失其所以行如婦之喪其車茀而不能行耳然二為離主明見幾先安然以聼則中正之道亦難終廢而時至仍行七日即得矣蓋彖傳所謂小亨以利貞初吉而柔得中即指此爻言耳六二于離為中女婦象喪茀無蔽離虛象六二柔中安常處順有勿逐自得象七日則卦一周為七日如七日來復之義蓋天道運行之自然抑又六爻往而復來自此至未濟之九二遇剛則陽實計其為日又適七也象曰七日得以中道也孔子之傳既濟六二云云何也曰七日得者以六之柔中得正自有必濟之吉道也彖之所謂初吉以柔中者此耳九三高宗伐鬼方三年克之小人勿用周公之象既濟九三云云何也曰九三以剛處剛居離之上遇險之交是乃以明化險蹇之終濟故為髙宗伐鬼方三年終克之象然以三自處非中是亦剛暴喜事之人故又戒以小人勿用耳蓋人主之用兵原非人不濟而非小人則亦無以動其好大喜功之心故用師既戒用小人又師克有功小人必且進爵分土亦恐易至亂邦如師終之戒故聖人于此爻備戒之也離為戈兵故稱伐三以明伐暗故稱伐鬼方象曰三年克之憊也孔子之傳既濟九三云云何也曰言髙宗以天下之盛伐鬼方之小醜猶必三年然後克之則是雖克之于三年之後而三年之中勞師逺輸國儲耗于車馬供億之間甲兵敝于寒暑戰陳之際九重宵衣旰食百爾奔走禦侮其困憊亦已甚矣嗚呼以髙宗之賢而尚且如此師可輕用耶吾夫子贊易而獨于此言凛凛乎若慮若戒有以夫大抵時當既濟則天下富強故人主每易恃其富強之資興師動衆不知兵為凶器動非其宜小則虛耗國力大且患生意外故周公孔子于既濟三爻惓惓致意而傳特釋三年一句也六四繻有衣袽終日戒繻而朱反袽女居反周公之象既濟六四云云何也曰六四身當既濟之時踰三伐克之上而入坎陰險之中矣于象為繻之有衣袽而宜終日戒者也蓋時當既濟則內憂易忘又兵勝之後驕心易生故一切敗絮紛紛皆藏于衣被之中此而能戒則思患豫防濟可終亨而不獨初之得吉若不能戒即大安之日乃危機之伏已治之秋乃大亂之伏所謂終止則亂者即在此耳而象不言吉凶者蓋謂此乃終日戒之時能戒則吉不待言不能戒則凶不待言也終日戒以其乘離日之終也象曰終日戒有所疑也孔子之傳既濟六四云云何也曰言終日戒者謂當此時雖既濟之後而危機亂機即藏于中而有可疑也有可疑即有所疑安得不終日戒乎九五東鄰殺牛不如西鄰之禴祭實受其福周公之象既濟九五云云何也曰九五本陽剛中正下與六二為鄰而處坎之中有終止之病處濟之盛無柔中之誠既濟雖盛于六二而反不如六二之中正誠一實受吉來之福也蓋時已濟而滿心生誠意散一切豐亨豫大之中皆伏喪亂危亡之機豈能如柔中之二實受吉來之大福乎象曰東鄰殺牛不如西鄰之時也實受其福吉大來也孔子之傳既濟九五云云何也曰離為牝牛離東而坎鄰之故謂五曰東鄰坎西而離鄰之故謂二曰西鄰蓋二以柔中喪茀自得是乃以時用禴恭儉無求而永克有濟故傳特指其吉大來蓋大來之吉即初吉也上六濡其首厲周公之象既濟上六云云何也曰上六處既濟之終以陰柔之資居陰險之位是坎水既盈享其既濟而惟知飲酒宴樂以自終者也故于象為濡其首夫既濟之時乃終日戒時也而至于飲酒濡首是犯終止則亂之大戒矣危能免乎故占象為厲然厲特就濡首之時言其蹈危機耳其實終止之凶原在此也彖傳曰其道窮道窮焉有不凶者象曰濡其首何可久也孔子之傳既濟上六云云何也曰言上六之飲酒而至于濡首道已窮而亂必至如泰之上六矣又何可長乎言其必厲而至于亂也終止則亂不亦信乎未濟坎下離上既濟而終之以未濟何也序卦傳曰物不可窮也故受之以未濟終焉未濟亨小狐汔濟濡其尾無攸利汔許立反文王之彖未濟云云何也曰水火以相濟為用而未濟則火在水上炎者反升上而流者反居下分背不交故曰未濟也然卦德雖不若既濟之交致其用亦自有濟險之明待用無方之具有亨道焉但亨者亨其未濟而可濟若如小狐之尚未習險汔濟而尚有水濡其尾則是未明所以濟之之道耳以是而往蹈險履危無攸利也狐多疑每聽冰下無水聲乃濟小狐則尚不能習險善濟故彖以小狐象全卦爻以初六象小狐蓋濟事貴謀惡疑以小狐之暗而處險故無攸利也凡事以明濟險則濟而卦則險暗在內離明在外故有未濟之象萬物生成于乾坤而致用于水火故上經首乾坤而終坎離人道造端于夫婦而生生于水火之相交故下經首咸恆而終既未濟然既濟則交致其用而未濟則各致其用交致其用則用已致而其事已畢各致其用則用未致而待用不窮蓋易道主于生生不已故六十四卦終未濟也彖曰未濟亨柔得中也小狐汔濟未出中也濡其尾無攸利不續終也雖不當位剛柔應也孔子之傳未濟彖云云何也曰言未濟亨者離在上而五之柔得中也小狐汔濟者坎二正在險中未能出而達于險外也濡其尾無攸利者智塞識暗不能即濟而繼之于終也然六位皆不得正而二五居中剛柔相應亦自有共濟之道所以雖未濟而亨也象曰火在水上未濟居子以慎辨物居方孔子之傳未濟大象云云何也曰言水在火上謂之未濟蓋火炎上水流下不成交致之用而屬不移之方也君子體此慎審以辨物之性使各居其方而不相雜則類聚而羣仍分不特善惡邪正無凌蝕之患亦且大小偏全有得所之用是以未濟而各有所濟之道也初六濡其尾吝周公之象未濟初六云云何也曰初六以陰柔居險初而居未濟之始狐之汔濟未濟而濡其尾者也夫方陷于險惟剛決可濟而濡其尾焉其能濟乎亦可羞矣故象占如此而凡居宜濟之地而遲疑不決者其為吝皆可類推耳坎為狐為水而初居卦後有濡尾象下坎三爻皆未嘗濟故以濡尾曳輪征凶為戒象曰濡其尾亦不知極也孔子之傳未濟初六云云何也曰言初六之濡其尾者居坎暗塞隱伏之下全無離明先見之識亦不知之極也不知如此不亦可羞耶九二曳其輪貞吉周公之象未濟九二云云何也曰言九二當未濟之時以離處險中雖應五而未能即應是彖所謂柔在中而知險不濟者也故有車曳其輪之象處未濟而能如是則亦得正而吉已故象占如此嗚呼其見險知止行不犯難者乎象曰九二貞吉中以行正也孔子之傳未濟九二云云何也曰言九二貞吉者時當未濟之時地居坎險之中知時之不可濟而不濟是乃以中行正而非如小狐之不知者也其得正而吉又何疑乎六三未濟征凶利涉大川周公之象未濟六三云云何也曰六三當未濟之時以柔暗之資處極險之地而又應以濡首之上是乃以不能濟之才值不可濟之時者若犯難而征則凶必矣獨以其位居出險際離之會則為涉大川之利耳初二皆未濟而獨于三言之者三近外坎將出有濟之疑也象曰未濟征凶位不當也孔子之傳未濟六三云云何也曰言未濟征凶者以剛居柔位不中正而未可征耳九四貞吉悔亡震用伐鬼方三年有賞于大國周公之象未濟九四云云何也曰九四雖當未濟之時而已出險居離以才之剛明而處位之柔順自能以明濟暗未濟者可從而濟故占象為得正而吉悔自可亡事象為震用伐鬼方三年有賞于大國也觀未濟之九四貞吉可見居以當位為功不盡關二五也二五正有不貞吉者大抵上三爻未濟而可濟者故象多吉辭象曰貞吉悔亡志行也孔子之傳未濟九四云云何也曰九四之貞吉悔亡者九四以陽明濟險其志得大行也嗚呼陽剛文明固濟險之具乎濡尾之小狐安得不吝六五貞吉無悔君子之光有孚吉周公之象未濟六五云云何也曰六五以離明中正之德下應九二剛中之臣君明臣良何險不濟何濟不通故占象為貞吉無悔事象為君子之光上下交孚而吉也大抵君子之光光以文明而實光以孚二蓋人君能信任賢臣則自用不事而兼照無遺自然上下交孚而行無不吉耳象曰君子之光其暉吉也孔子之傳未濟六五云云何也曰言君子之光者五二相孚離明坎潤交相發越其暉吉也上九有孚于飲酒無咎濡其首有孚失是周公之象未濟上九云云何也曰上九以剛處離終而下孚六三不正之險是非君子之孚乃孚于飲酒而已夫當未濟而既濟則飲酒宴樂亦君子所不廢未可便謂之咎但以六三之險終而上以剛躁應之則有飲酒而沉淪濡首之象若以此為孚則孚所不當孚而失是耳象曰飲酒濡首亦不知節也孔子之傳未濟上九云云何也曰飲酒而至于濡首亦太不知節也既濟者且將以終止亂而况其為未濟之終乎按知節即知時之義而以此終易者易取時行以既濟為用而以未濟為功知節則時雖未濟而可濟不知節則時雖既濟而終于不濟正以見易乃時中之道而生生之道知節則得時之中而道日生不知節則失時之中而道終窮也嗚呼易固教人時中之道而實寡過之道哉豐川易説卷十
