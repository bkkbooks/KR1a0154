body:
  text: 豐川易説卷四鄠縣王心敬撰上經隨震下兌上豫而受之以隨何也序卦傳曰豫必有隨故受之以隨隨元亨利貞無咎文王之彖隨云云何也曰隨以乾之上剛來下坤之初柔下動上説故為隨隨有大通順正而無咎義故占有元亨利貞而無咎象彖曰隨剛來而下柔動而説隨大亨貞無咎而天下隨時隨時之義大矣哉下遐嫁反説音悅孔子之傳隨彖云云何也言卦之所以為隨者以剛自上來而下于柔雷動于下而澤説乎上動而説故為隨也大亨貞無咎者隨既以動説為義是乃天下萬事萬物隨時從宜之正道在聖人則為從容中道在君子則為隨時處中微之為日用飲食之隨時大則為仕止久速之隨時隨時之義真包天盡地所不能窮不亦大矣哉象曰澤中有雷隨君子以嚮晦入晏息孔子之傳隨大象云云何也曰言為卦澤中有雷為隨君子體此以嚮晦入晏息如雷之息于澤中也蓋嚮明而治嚮晦而息隨時之正理惟君子神明識時故惟君子出入隨時所謂動靜不失其時也然嚮晦入晏息特取象于澤雷耳若推廣隨時之義則凡動而合時者皆隨時之義即皆嚮晦入晏息之類澤中有雷之象也嗚呼象者像也即一象而可通于千百者也是在善讀易者矣初九官有渝貞吉出門交有功周公之象隨初九云云何也曰初九自乾上而下柔為成隨之主又為長子有官象隨以隨時從宜為義故以官有渝為得正而吉象與二相比既有近隨乎二之義而渝初即二又有出門即交而有功象大抵隨以相近即從為義故諸爻皆不拘正應而論親比嗚呼聖人之取象各自隨宜觀象者固可執一論耶象曰官有渝從正吉也出門交有功不失也孔子之傳隨初九云云何也曰言守官而渝者陽來下柔所從得正故吉也出門交有功者以初隨二近而隨時專一無失也六二係小子失丈夫周公之象隨六二云云何也曰二與五乃正應然五逺而初近故有近係小子而逺失丈夫象小子指初丈夫指五蓋五尊而初小也然隨非其正爻雖不言悔吝而悔吝從可知矣象曰係小子弗兼與也孔子之傳隨六二云云何也曰言其係小子者係于所私比之初不能兼與耳六三係丈夫失小子隨有求得利居貞周公之象隨六三云云何也曰三近係四而失于初有係丈夫失小子象與四親比而隨豈有不得之理故隨有求得象然以柔居剛又非正應當有不正而為邪媚之嫌故占又取居貞為象也象皆本義義即寓戒聖人之憂患後世真不啻父之于子師之于弟矣象曰係丈夫志舍下也孔子之傳隨六三云云何也曰言係丈夫者為其志不係于初而志舍下耳然則隨固以近而得宜為貞耳九四隨有獲貞凶有孚在道以明何咎周公之象隨九四云云何也曰言九四以剛居柔與五同德而為三所隨故占為隨有獲象夫四近君之位而隨而有獲雖正亦凶矣故有貞凶象然處柔不失之過剛又居下親五是明于君臣大義忠順自盡者也如此則五孚之矣雖獲何咎乎有有孚在道以明何咎象郝氏曰四以剛承剛為下所隨所謂挾震主之威冒獨攬之行者故雖以正守然危疑之凶所不免矣象曰隨有獲其義凶也有孚在道明功也孔子之傳隨九四云云何也曰言隨有獲而雖正亦凶者四逼近于君其義凶也有孚在道以明何咎者謂四功而不居五孚其心而明其功也嗚呼人臣遇人心隨順之功非自處于有孚在道之地已非悅以動君一不動而悅即其獲皆致凶之媒耳咎何從無乎當隨之任者其尚知所以自處可也九五孚于嘉吉周公之象隨九五云云何也曰言九五履中處正為悅主而下與四比是君而隨有孚在道之大臣也是為孚于嘉象人君如此是為能孚大臣之盛美亦即是自己信賢之盛美安有不吉者故占有吉象象曰孚于嘉吉位正中也孔子之傳隨九五云云何也曰言孚于嘉吉者以其當隨之時比四之賢而位居悅中大中至正其德如是其吉斷可識也上六拘係之乃從維之王用亨于西山享音見大有卦後升卦同周公之象隨上六云云何也曰上六居隨之終而處柔不中是本無可隨而猶欲從而隨之其象則為欲隨人而拘係維縶以隨之者也如此之隨其惟文王之享紂于西山乎蓋紂惡已極人心盡離而文王當三分有二之時臣節愈篤猶欲從而維繫以隨之故古之人有言曰隨者文王之所以事殷也嗚呼非甚盛德孰能如此此所以為隨之至極而無以復加者乎象曰拘係之上窮也孔子之傳隨上六云云何也曰言拘係之者以上六孤陰處髙而無民之地理窮數盡故必拘係維縶而後可隨也噫古今孰有如此之隨乎信非文王之事紂不足當之蠱巽下艮上隨而受之以蠱何也序卦傳曰以喜隨人者必有事故受之以蠱蠱元亨利涉大川先甲三日後甲三日先息薦反後胡豆反文王之彖蠱云云何也曰為卦以乾剛上坤柔為艮坤柔下乾剛為巽下巽懦而上艮止此蠱之所由成也壞必有事有事則壞者仍成故占有元亨象原其所以元亨者以事壞于因循而振于勤動故占又為利涉大川象然要之蠱之成與幹固人事之感召亦天道循環之自然如先甲三日則至甲而終必且後甲三日自甲而始蓋天下事皆因始以成終則亦無有終而不始係人事事不事事耳故又有先甲三日後甲三日象也彖曰蠱剛上而柔下巽而止蠱蠱元亨而天下治也利涉大川往有事也先甲三日後甲三日終則有始天行也孔子之傳蠱彖云云何也曰言蠱之所以成者以乾剛上坤成止坤柔下乾成巽上下不通又為下巽上止全不事事故蠱遂成也元亨而天下治者窮則思變變則必通以此而治天下則父亂而子治先亂而後治者也又言利涉大川者言治蠱之道以往而有事為貴蓋以不事事蠱即以能事事治也而所謂先甲三日後甲三日則以終必有始乃天道運行之自然也嗚呼觀文王之彖與孔子之傳皆取于治蠱必亨之義初與卦象山風之義無涉則知凡卦爻之以義取象者固多也互變錯綜舍切近求虛逺恐不其然孔子以往有事釋利涉大川以終則有始釋先甲後甲意旨已至明至徹而後儒尚紛于利涉大川之象先甲後甲之日何異畫蛇添足觀蠱以艮巽相合成可見天下百事之敗壞皆由于因循怠惰故善救敗者在鼓之以振勵果行象曰山下有風蠱君子以振民育德孔子之傳蠱大象云云何也曰言山下有風是乃蠱之象也君子體此振民之德使如巽之風行草偃育民之德使如山之廣厚生物也蓋天下之所以頺敝由于上無綱紀故君子必以禮樂政刑振作乎民民之不知興行由于上無教化故君子必以勞來匡直涵育其德是乃所謂元亨而天下治者乎象與彖固互相表裏也初六幹父之蠱有子考無咎厲終吉周公之象蠱初六云云何也曰初六蠱初是人子嗣服方始先緒未振賴以幹之者也有幹父之蠱象有子如此厥考乃可無咎雖厲所不免然敗緒重立必得終吉有考無咎厲終吉象卦是蠱而六爻皆以幹蠱取義者蓋聖人之意只是教人知所以治亂救敗之道敗亂之情形固不必道也象曰幹父之蠱意承考也孔子之傳蠱初六云云何也曰言幹父之蠱所以善承考意乃人子繼述之孝也九二幹母之蠱不可貞周公之象蠱九二云云何也曰二居巽中初事為父入事即母又二居柔應五故有幹母之蠱象九二陽剛慮其過直婦人之事安得求備故占又有不可貞象嗚呼聖人之明於人情善於救敗固如此乎非精義入神其孰與此象曰幹母之蠱得中道也孔子之傳蠱九三云云何也曰言幹母之蠱以不可貞乃得中道也九三幹父之蠱小有悔無大咎周公之象九三云云何也曰九三以剛處剛在蠱之時改父之行者也故占為小有悔然父蠱得幹既敗復振所失小而所全大有無大咎象象曰幹父之蠱終無咎也孔子之傳蠱九三云云何也曰言幹父之蠱是人子之善于繼述終自無咎小失不足道也嗚呼人子固以幹父母之蠱為孝乎六四裕父之蠱往見吝周公之象蠱六四云云何也曰四止體而以陰居柔柔懦退縮前蠱之一不能幹而日以益蠱者也以此而往吝能免乎故占有往見吝象象曰裕父之蠱往未得也孔子之傳蠱六四云云何也曰六四裕父之蠱則壞者益壞即自己亦前途盡滯矣往能得志乎六五幹父之蠱用譽周公之象蠱六五云云何也曰六五以柔履剛履中得正兼下有初二之應幹父之蠱而能成其德天下亦歸其孝者也故占有幹父蠱用譽象象曰幹父用譽承以德也孔子之傳蠱六五云云何也曰言幹父之蠱而用譽者能承考志以成其德也初二三五皆以幹蠱終吉得中無咎用譽獨四以裕蠱往吝嗚呼人子處父母之蠱亦可以知自盡矣此大禹之蓋愆武周之繼述為千古之大孝達孝夫五爻皆言人子幹蠱之事而人臣之于君從可知也隨卦明忠至六而極文王之所以為忠臣也蠱卦明孝至五而極武王之所以為孝子也嗚呼商周之間聖人難言故托之卦爻以顯義乎然賴此而千古之之臣道子道示象于此矣上九不事王侯髙尚其志周公之象蠱上九云云何也曰上九蠱已終而止已極又貴而無位高而無民之位也當蠱之時而居如此其不事王侯髙尚其志者乎故象以不事王侯髙尚其志不言吉凶悔吝者地至五而蠱已幹上九處乎事之外履乎蠱之表不惟無悔吝之凶即貞吉二字亦無所置喙矣求之古人其伊尹太公未遇之年而巢許嚴龎終身之尚乎象曰不事王侯志可則也孔子之傳蠱上九云云何也曰言上九之不事王侯雖無幹蠱之功然視世之無才無德徒事人事而裕父之蠱者志自可法耳則如聞夷齊之風者頑廉懦立桐江一絲繫漢九鼎亦可見也臨兑下坤上蠱而受之以臨何也序卦傳曰有事而後可大故受之以臨臨元亨利貞至于八月有凶文王之彖臨云云何也曰臨者二陽浸長而臨衆陰之義為卦下説上順二剛中與五柔中應有元亨利貞象然今日之盛大即將來之消歇一旦理窮數極至于八月則亦必有凶矣蓋方喜其盛即慮其衰方慶其進即憂其退聖人示天下以幾先之哲每每如此而所以教之使知豫防即在其中矣八月以程傳陽生之八月為正蓋陽生于復自復及遁則八月而二陰漸長陽浸消也彖曰臨剛浸而長説而順剛中而應大亨以正天之道也至于八月有凶消不久也長丁交反説音悅孔子之傳彖云云何也曰言臨者二陽剛健而浸長臨陰下説而上順九二剛中而六五順應自有大亨以正之義然亦天道則然蓋天道循環陽亨則必至於成乾故陽之浸長既順而乾終則又必生姤故陽之消歇亦且不久所謂至于八月有凶者抑言乎説順之自然耳善持大者正當于方盛時持之不然則其消亦順而至此雖欲持無及矣象曰澤上有地臨君子以教思無窮容保民無疆思去聲孔子之傳臨云云何也曰言卦是澤上有地乃地臨乎澤故義取于臨君子體此以教思無窮如澤之説物容保民無疆如坤之育物也然據此而君子誨人不倦之心仁民育物之德可想見矣初九咸臨貞吉周公之象臨初九云云何也曰臨初二兩爻以陽臨陰又為説體而應四故初九即有咸臨象以其剛而得正故占有貞吉象象曰咸臨貞吉志行正也孔子之傳臨初九云云何也曰言初之咸臨貞吉者處剛得正志與行皆正也嗚呼志行皆正則吉臨民臨事者曷于志行圗之九二咸臨吉無不利周公之象臨九二云云何也曰二與初咸以剛臨柔二又上有柔中正應之六五其臨自吉無不利耳有咸臨吉無不利象程子曰吉者已然如是無不利者將然無不利也象曰咸臨吉無不利未順命也孔子之傳臨九二云云何也曰程子以未順命為二以剛中應五是以誠相感非由順上之命其義亦自可通然終覺聖人必不應下此可疑之辭吾其從朱子未詳之例乎六三甘臨無攸利既憂之無咎周公之象臨六三云云何也曰三為説體兑口而以陰居柔無剛正臨人之道而徒以甘言説人而臨者也説人無實德而徒以言語甘説臨之其能大亨以正乎雖往無利矣然三以柔處剛亦有知憂之象知憂則窮而能變亦自可以無咎也蓋能知口舌之不可感人而實感以德自是無咎之道耳象曰甘臨位不當也既憂之咎不長也孔子之傳臨六三云云何也曰言甘臨無攸利者以其位不當故行不中而無利耳若能既憂之則過而知改自處以誠咎自可免不終長也六四至臨無咎周公之象臨六四云云何也曰六四處順履柔下應初九初以誠感四以誠應下説上順臨之至者也咎何有乎故占有至臨無咎象象曰至臨無咎位當也孔子之傳臨六四云云何也曰言六四之至臨無咎者以其位正當也位當則德當安有不免咎者六五知臨大君之宜吉知音智周公之象臨六五云云何也曰六五處順居尊得中應二所謂聰明睿知之足以有臨者乎故象占有知臨大君之宜吉象蓋自用者小用人者大人君誠能不自用而知用人乃可稱曰大君而其道真為大君之時宜矣步步得吉又何疑乎舜之不自用而取諸人孔子稱其為大知孟子稱其為有大其即此義乎嗚呼為君者何為而自用歟象曰大君之宜行中之謂也孔子之傳臨六五云云何也曰言六五大君之宜謂六五行得中正之謂也嗚呼大君之不自用殆即大君之中正乎上六敦臨吉無咎周公之象臨上六云云何也曰言上六居坤之終處坤之極地勢敦厚則臨澤愈平是溫恭允塞敦厚以臨人者也有敦臨象敦臨則吉又何咎矣故占有吉無咎象象曰敦臨之吉志在內也孔子之傳上六云云何也曰言敦臨之吉者其志在內之澤説也蓋在下之二陽則為澤臨于地在上之四陰則為地臨乎澤故皆取臨義觀坤下巽上臨而受之以觀何也序卦傳曰物大然後可觀故受之以觀觀盥而不薦有孚顒若觀官奐反下大觀以觀之觀大象觀字並同文王之彖觀云云何也曰觀風上地下二陽居髙以觀下四陰四陰亦仰而上觀乎上五下順上巽上五皆居中履正與下四陰相應有潔誠自將而下皆孚信之義故取盥而不進有孚顒若象蓋未薦方盥正誠意顒若之時上觀以此孚下而下觀以此孚上是為不言而信相觀以神也合論語之為政以德而天下化臨之以莊則敬其身正不令而行尊其瞻視則民望而畏之數條可以默會其旨彖曰大觀在上順而巽中正以觀天下觀盥而不薦有孚顒若下觀而化也觀天之神道而四時不忒聖人以神道設教而天下服矣觀如字下觀天大象觀民之觀六爻觀字並同孔子之傳彖云云何也曰言觀卦二陽居五上有大觀在上象下坤上巽有順而巽象上五剛中居正以觀天下而為天下所仰觀故彖取盥而不薦有孚顒若下觀而化之象然推其極則若天道之以神運而四時自不差忒聖人之以神道設教而天下自服亦即盥而不薦有孚顒若之旨嗚呼易象也舉一象而無象不可類推即孔子諸卦之引伸觸類正自可以明其大義若如世儒之執象論義即孔子之彖傳多屬溢格之論矣豈其可象曰風行地上觀先王以省方觀民設教省悉并反孔子之傳觀大象云云何也曰觀以風行地上無所不遍而成先王體此以省方觀民隨宜設教亦如風行地上也嗚呼觀先王之省方皆為觀民設教可見古聖主無無事之遊又必觀民而後教以設可見先王亦無不冝民而泛設之教聖人之言真字字理到事到無一泛設也初六童觀小人無咎君子吝周公之象觀初六云云何也曰卦以觀示為義據上五二爻為主也爻以觀瞻為義皆仰觀乎上五二爻也初六陰柔在下不能逺見于觀屬童觀于人屬小人故象取童觀而占象在小人則為無咎君子則為吝耳觀彖以大觀在上明觀則知下四陰之仰觀者必以兼上五二爻為確象曰初六童觀小人道也孔子之傳觀初六云云何也曰言初六之象為童觀此乃小人淺識不能逺見之道故占為小人無咎也童觀為矮人之觀場不能盡見但略觀其形耳略觀其形豈能得其真乎故占象在小人亦不為咎而在君子則吝而可羞也嗚呼觀人不得其心觀理不得其精徒見皮膚而無視逺之明皆童觀類耳君子豈宜出此乎六二窺觀利女貞周公之象六二云云何也曰六二以隂柔居內卦之中而仰觀外卦之上五有窺觀象觀不能如四之親觀其光而但知窺觀則亦利于女之貞耳故占為利女貞蓋六二居陰原有女象處坤之中原有貞象故占又取之耳象曰窺觀女貞亦可醜也孔子之傳六二云云何也曰言窺觀乃女之正在君子則亦可羞耳故為君子吝也蓋學士大夫須具域外之觀若徒窺一域而不覩其大全則亦婦人之窺觀耳豈非至可醜者乎童觀則為君子吝窺觀則為君子醜君子之觀固以得正得真為貴乎影響約略之見曾何足道六三觀我生進退周公之象觀六三云云何也曰六三居坤之終而上與巽接于觀為觀我生進退之地也故象取觀我生進退象曰觀我生進退未失道也孔子之傳觀六三云云何也曰言六三之觀我生進退亦未失道耳蓋人生之進退自有正規能觀則自不至于大錯也嗚呼君子出處進退其不可茍且類如是夫傳是言觀吾生出處之進退善讀易者正當反而自觀吾學之進退六四觀國之光利用賓于王周公之傳觀六四云云何也曰六四進坤處巽居近君之位且有巽而善入之義于爻義為觀國之光利用賓于王象象曰觀國之光尚賓也孔子之傳觀六四云云何也曰言六四居得其地原有觀光尚賓之義也九五觀我生君子無咎周公之象觀九五云云何也曰五正所謂大觀在上為下四陰之所觀仰者有君子象以一身觀乎下而為下之所仰觀是君子之生即下四陰之身也故必自觀其生為正為不正為中為不中則所以為中正以觀天下者在是盥而不薦有孚顒若者亦在是是乃君子修己以敬安人安百姓之正道耳故有觀我生君子無咎象象曰觀我生觀民也孔子之傳觀九五云云何也曰是言我生之敬肆即下民之安危而下民之安危本我生之敬肆故觀我生乃所以觀民也蓋孔子慮讀易者以九五居君子大觀在上之地而徒以自觀其生為遺民故特于傳明之爻象猶孔子答子路君子修己以敬之旨爻傳猶孔子再答子路修己安人安百姓之旨上九觀其生君子無咎周公之象觀上九云云何也曰上九與九五同為君子大觀之在上其德原與九五同故象仍取于觀其生君子無咎也然變觀我生為其生則似更就大觀居心之至虛至殷言耳故傳中發志猶未平之旨以終中正觀天下之義也觀上九之象辭可知初二之所為觀乎上者統以上五二爻為大觀之主似不專指九五一爻象曰觀其生志未平也孔子之傳觀上九云云何也曰言九五已以觀我生為觀民矣而上九仍觀其生者謂其以觀我為觀民之志未能平滿如孔子答子路堯舜猶病之旨耳蓋孔子又慮讀易者以觀其生為仍與九五象同即義仍與之同而更無所取故又發志未平之旨以明君于觀生觀民無自滿假之心所為觀之至也噬嗑震下離上觀而受之以噬嗑何也序卦傳曰可觀而後有所合故受之以噬嗑嗑者合也噬嗑亨利用獄噬市利反嗑胡臘反文王之彖噬嗑云云何也曰天下之事所以不得亨者以有間也噬而嗑之則可亨通矣故有噬嗑亨象蓋王者以刑罰揉強事雖非吉而以之去其間則自有可亨之道也為卦上明下斷故占為利用獄象以用獄固非明非斷不利也彖曰頥中有物曰噬嗑噬嗑而亨剛柔分動而明雷電合而章柔得中而上行雖不當位利用獄也上時掌反孔子之傳噬嗑云云何也曰言卦之所以名噬嗑者以卦上下二剛爻而中柔有上下唇齒之象中虛之中又間一剛爻為頥中有物之象口中有物則隔其上下令不得合矣必齧而合之乃得嗑故為噬嗑也嗚呼天下凡事之不得合者皆以有間故耳必去其間而乃合類如斯矣其曰噬嗑而亨者言有物間于頥中則必為害噬而嗑之則其害亡而可得亨通故云噬嗑亨也又以卦才言則上下之剛柔分下震上離為動而明雷震電耀相須並見為合而章且六五以柔居上卦之中雖不當位然治獄之道過柔則失于寬縱全剛亦傷于暴戾而五以柔居剛為用獄之主是為得中上行則亦得用獄之宜也嗚呼獄之情隱而曲險而健純柔不可用純剛亦豈可用乎用獄者亦于噬嗑之象與傳細味而可矣口中之間噬之而後合嗜好情欲皆吾仁之間也無以克之何從而合乎昔孔子以克已復禮為仁語顔子而朱子注以非至明無以察其幾非至健無以致其決正雷動火明以成噬嗑之旨耳象曰雷電噬嗑先王以明罰敕法孔子之傳噬嗑大象云云何也曰雷先掣而雷後應雷以從電故曰雷電噬嗑先王體此以制獄決訟用電之明以罰罪用雷之動以勑法蓋決獄所以察情非明不當敕法所以齊衆非斷不行故必以雷電之合明罰敕法則獄情得真而國法得振庶幾獄無寃濫耳觀噬嗑之象可知斷獄必賴明決之人而後獄無寃民不然不明不決即自以為無寃而不知其寃抑已甚矣國家庸何利乎初九屨校滅趾無咎校音教周公之象噬嗑初九云云何也曰初九以剛居初為頷頦之象頷頦乃所以噬物之具故象刑具著罪人也又震為足動居初趾象在初猶輕刑故為兩足著械遮沒其趾象罪在初犯而即以刑械禁之則自足以懲惡使不得行故又有無咎象也象曰屨校滅趾不行也孔子之傳噬嗑初九云云何也曰言屨校滅趾者趾為初動滅趾以遏其行也不行尚何咎乎昔一友問余無咎為罪人言為用刑者言余曰為罪人言而言外則為用刑者言矣友問其説余曰據文言小人不恥不仁不畏不義不見利不勸不威不懲小懲而大戒此小人之福之旨則知戒小人正小人之福故于無咎貼小人為正然噬嗑一卦皆明明罰敕法之義故義取噬嗑用獄者懲小人之初犯即能不姑息養姦以長其惡而使之怙終難赦則在上之過亦免矣不然一時小不忍以容姦他日致蹈于刑戮豈非為上之過乎由此以觀則此無咎二字言外責重用獄者之義亦自明耳郝氏曰初象罪人何也罪人寃滯不達故在下惡由小積故在初事發先覺故為獄始然以剛象罪人何也凶暴之徒未有不剛者初上強梁噬人剛惡也老氏曰強梁者死之徒易戒于過剛也此亦中理之説六二噬膚滅鼻無咎周公之象噬嗑六二云云何也曰六二下乘罪人象獄初訊二本震體陰柔中正威而不猛是為斷獄無枉深得其情者故象為噬膚滅鼻蓋膚乃肉之無骨最易噬者滅鼻則言無事考掠而強梗自能輸情耳以此斷獄何咎之有故占為無咎象象曰噬膚滅鼻乘剛也孔子之傳噬嗑六二云云何也曰言噬膚滅鼻者二乘初九罪人本剛而一訊即得其情耳故曰無咎也嗚呼其片言折獄之子路乎六三噬臘肉遇毒小吝無咎臘音昔周公之象噬嗑六三云云何也曰六三以柔居剛處非其正如無定見之人斷牽連之訟故為噬臘肉之象以六居三之剛為遇毒之象處非其當本無決獄之才進又遇毒而值難決之訟小吝豈能免乎然三居動終進與明接又三乃在頥之物終有噬而必合之理亦自無咎戾也故占為無咎象象曰遇毒位不當也孔子之傳噬嗑六三云云何也曰言三以陰處陽處位不當也處位不當故所刑者不易服而如遇毒耳九四噬乾胏得金矢利艱貞吉乾音千胏緇美反周公之象噬嗑九四云云何也曰九四以剛居上下之間合離震之分當噬嗑之時為執法之象蓋罪人所畏服而二三所待裁者也又膚自二自三已為臘肉至四則為乾胏最堅難噬者矣金取剛矢取直九四以剛居明為得剛直之道蓋所謂執法者既剛且明則雖獄之至難決者皆可決之而得正故為噬乾胏得金矢象然剛則傷果明則易刻居柔乂易涉于守之不固故占又取乎利艱貞則吉而盡善也程子曰剛而不貞者有矣凡失剛者皆不貞也在噬嗑九四最為善象曰利艱貞吉未光也孔子之傳噬嗑九四云云何也曰言九四之所以利艱貞吉者處非其中其道未光大也九四正在上下之交所謂頥中之間象不取于間而反取于去間得金矢之吉者蓋噬嗑是噬而合之義噬而合則必以去其間為要領又四才剛居明足以噬嗑故不主為間而利去間象固不可執一論也然益見去間之必以剛明為尚而用獄之必以剛明為吉矣六五噬乾肉得黃金貞厲無咎周公之象噬嗑六五云云何也曰五居明體之中為頥中之物而處柔得中是亦執法斷獄而得其情者有噬乾肉象又離中明體而在頥中有噬得黃金象居中履剛有貞厲象斷獄而能居中用剛守正慮危咎自可無矣故占又有無咎象也象曰貞厲無咎得當也當去聲孔子之傳噬嗑六五云云何也曰言六五之所以貞厲無咎者以其位之得當故其行之得當而自能無咎也噫觀于孔子以得當釋六五之貞厲無咎益可見象義以取于本卦本爻為當正不必互變錯綜之自取凌亂矣或曰六五何得有黃金象且文明在中外柔內剛何得有厲象乎余則又以為五在離中以中言黃而繫金以言固無不可即以五之剛為金亦無不可居柔言厲以示教固無不可以柔履五之剛義取于厲亦無不可也總之前人溺于執象為象之意而未思即義為象之旨故凡論象不得必欲援互變錯綜之旨務實其象以明之不知正不如近取諸義之為切而有據也顧不知海內明易君子以為何如也九四六五居離之明皆剛柔相濟自可斷獄無枉而皆取于貞厲者蓋獄乃斯人之生死所關王法之是非所係恃其聰明必且有偏執不平之害故聖人于四五二爻反覆戒之善讀易者亦可以識易旨與用獄之法矣上九何校滅耳凶何何可反周公之象噬嗑上九云云何也曰上九以剛居上為脣吻噬物象亦以象凶人始屨校而終何校為怙終不赦之象又上以一爻橫踞五爻之頂是何校滅耳象也上當噬嗑之終而所處如此是四五平反再三而上終無可赦之理真自蹈于大獄而不可救援者矣故占為凶象象曰何校滅耳聰不明也孔子之傳噬嗑上九云云何也曰言上九之至于何校滅耳者以上九剛躁無前聾頑不可化誨故積成其釁至于罪大惡極自陷法網耳是其何校之所以滅耳乃由其聰之不明以至此也觀于孔子傳上九爻義可知世之喜聞善言者尚可救藥而自恃剛果恥于聞過者皆自取刑禍耳嗚呼亦可戒也哉賁離下艮上噬嗑而受之以賁何也序卦傳曰物不可以茍合而已故受之以賁賁者飾也賁亨小利有攸往賁彼偽反文王之彖賁云云何也曰賁之為卦山下有火山者百物草木之所聚而下有火以照則其上之草木品彚自被其光彩有賁飾象下體離故象取于亨上體艮故象取于小利有攸往伊川先生曰天下事無本不立無文不行有質而加飾則可以亨文飾之道可增其光彩故能小利于進也愚謂伊川先生注彖于賁亨利往之旨分疏明白然其實彖義隱自孔子彖傳盡發之而彖辭乃可以解耳則由斯以觀易旨向非孔子十翼顯明即文王周公彖象原旨且埋沒而不可考證者幾半矣解易讀易亦只據孔子十翼詮解即易道如日中天正無容穿鑿附會欲求隱深而反失正旨也必如孔子之言亦無由明其來厯則博考諸傳注可耳然傳注亦只以會歸孔子之十翼為當如更不得會歸則援朱子未詳之例作闕疑一案留之宇宙尚無甚失也彖曰賁亨柔來而文剛故亨分剛上而文柔故小利有攸往天文也文明以止人文也觀乎天文以察時變觀乎人文以化成天下孔子之傳賁彖云云何也曰言賁有亨道而賁之所以亨者則以剛柔相雜而後成賁猶文質相雜而後成賁也為卦下體本乾上坤分一柔以來文其中而為離上體本坤下乾分一剛以文其上而為艮乃為山下有火止于文明而成賁故賁剛能亨也然其自柔來而文剛故亨者言柔來文于剛而乃成文明之象成文明乃能飾以成賁成賁乃能由飾而亨也其曰分剛上而文柔故小利有攸往者言分乾之中爻往文于艮之上爻事由飾而加盛加盛則能行也二卦之象共成賁義而傳彖分言上下各主一事者蓋離明足以致亨文柔又能小進也其曰天文也文明以止人文也者蓋承上文言陰陽剛柔相文者天之文也止于文明者人之文也其觀乎天文以察時變觀乎人文以化成天下者則又推廣天文人文之義以明聖人體賁用賁之道所謂味之而愈深推之而愈出也蓋古聖人觀于天文日月星辰之錯列寒暑陰陽之代變以察四時之遷改而敬授人時觀于人倫之秩序庶物之品彚教化天下使成其禮俗以寵綏帝命皆善用此賁亨之義以經世宜民耳則由此以推繫辭所謂伏羲仰觀俯察逺觀近取以通神明之德類萬物之情者亦可想見一斑易道非神而明之真虛行天地間也象曰山下有火賁君子以明庶政無敢折獄孔子之傳賁大象云云何也曰言山聚百物而火在其下庶類皆被照耀之光為賁飾之象也君子體此以修明其庶政而無敢果于折獄焉蓋庶政小者近而易見故明如山下之火可以照見而修明折獄則貴用情實徒文必掩沒其情且身立堂上然後見堂下之是非真偽以區區山下之火而用之察至隱之獄情能無誤乎故無敢折獄聖人觀象論理稱情而合理如此亦可見其精義入神之妙也明庶政者離之明無敢折獄者艮之止觀于賁之無敢折獄可見粉飾增益折獄所忌漢人所以最惡于煅煉周納也然又曰無敢則聖人愼于用獄之意亦昭然言下矣讀易者于諸象識聖人神明變化之妙又于聖人識謹幾愼微之心即易道思過半也初九賁其趾舍車而徒舍音捨周公之象賁初九云云何也曰初九以陽剛居明處下賢人君子有剛明之德而在下者也在下則無位無位則無所施于天下惟自賁飾其所行守節處義不肻茍合以待正應而已有賁其趾舍車而徒象蓋趾取在下正所以行君子以義為質義所不當寧以舍車而徒為自賁其行耳古人安步當車令聞廣譽施于身不願人之文繡義蓋類此而樂正子之從子敖來其失又可類推也象曰舍車而徒義弗乘也孔子之傳賁初九云云何也曰言舍車而徒行者于義不可以乘也義不可乘而弗乘雖流俗之所迂于君子寧非最賁者乎象無義字而孔子繫傳發出此旨其為千古辭受進退者示以所由之正則乎故曰易明道之書實示人以寡過徙義之書也六二賁其須周公之象賁六二云云何也曰卦之為賁由兩爻之變而文明之義為重二為賁主故言賁之飾于物不能大變其質特因其質而加飾如須之隨頥而動耳象曰賁其須與上興也孔子之傳賁六二云云何也曰言六二以賁為象者謂其與上同興動止惟繫所附猶加飾于物因其質而賁之善惡固在質耳然則天下凡事凡物之必須于賁而後能利往亦必慎用其賁無太掩其質而乃可致亨抑又明甚也九三賁如濡如永貞吉周公之象賁九三云云何也曰言九三處文明之極才剛居剛又能賁者有賁如濡如光彩潤澤象然賁忌文飾太盛踰正失常九三以剛處剛前與止接能賁而亦尚能得正得常者也則亦有吉道焉故象占如此象曰永貞之吉終莫之陵也孔子之傳賁九三云云何也曰言賁之盛而又能得常得正天下孰能尚之乎然則賁而不常不正乃取陵之道也六四賁如皤如白馬翰如匪寇婚媾皤白波反周公之象賁六四云云何也曰四與初本正應而為三所隔故不獲相賁而皤如其白然初欲從正應之志則如白馬之翰如而不可遏止三終不得為寇而初四之婚媾終必遂耳馬在下而乘以動者未獲賁則為白翰如亦白而疾飛之義三間初四似寇正應終合象婚媾也象曰六四當位疑也匪寇婚媾終無尤也孔子之傳賁六四云云何也曰言四與初正應而三介于其間是所當之位為可疑也然正應理直義勝終必得合則亦終無尤耳蓋四初既為正應而又處賁之中亦有得所賁之義也六五賁于丘園束帛戔戔吝終吉戔在千反又音箋周公之象賁六五云云何也曰六五以柔居艮中而處艮上一陽之下是賢人君子隱居邱園而好士尚文之主停車山下繫馬門前奉束帛而升堂致禮者故象取于賁于邱園束帛戔戔大賢在國弗與共天位治天職而徒以束帛自文其好士之禮斯六五之吝道矣然亦尚知好賢以成禮賢下士之盛節故占有吝終吉象觀史孔僖對漢主之言亦可明此爻終吉之旨象曰六五之吉有喜也孔子之傳賁六五云云何也曰言六五之吝而終吉者以其見賢而徒以束帛自是吝道以其尚知賁于丘園則亦心喜禮士足為盛世之光華也上九白賁無咎周公之象賁上九云云何也曰上九以剛居止是明而知止之君子也有遺世獨立纎塵不染之象故其象為白賁賁而尚白雖與世異尚然清白可以勵汚俗故占又有無咎象也賁為增飾之義然並而不已則必止乃天之道也上以一陽艮止于諸爻之上當賁之終是以不受賁為賁者故為白賁然以其不加雕飾可以矯繁縟之習培質素之風而勵士大夫髙尚之節則其隱助盛世之醇風亦多矣以不賁賁故曰白賁嗚呼世知賁之為賁矣亦知白賁之為賁乎知賁之為亨矣亦知白賁之無咎乎象曰白賁無咎上得志也孔子之傳賁上九云云何也曰言白賁無咎者上九自尚其志素履自信自得志也賁之下卦三爻皆言賁離有文明之義也上卦三爻皆有賁不離質之義艮有止而堅確之義也然已寓致飾亨則盡矣之義矣讀易者宜于此識聖人戒盈惡滿之旨亦宜于此識易道窮變通久之旨剝坤下艮上賁而受之以剝何也序卦傳曰致飾然後亨則盡矣故受之以剝剝者剝也剝不利有攸往文王之彖剝云云何也曰剝之為卦五陰在下而正生一陽在上而將盡陰盛長而陽消落于人事則為衆小人剝喪君子之時又內卦坤順而外卦艮止亦有順止之義故占為不利有攸往象也嗚呼文王之為攸往者慮亦深矣故曰作易者其有憂患乎其當商之末世乎彖曰剝剝也柔變剛也不利有攸往小人長也順而止之觀象也君子尚消息盈虛天行也長丁丈反孔子之傳剝彖云云何也曰剝者言乎其剝落之義也謂五陰變易五陽而柔長剛變也其曰不利有攸往者則以小人已長盛至此其勢不剝盡此陽不止君子自宜隨時晦迹以免小人之害尚何宜往乎又卦下坤上艮本有順止之象君子見理既明目覩羣小之剝陽象已顯著自當順時知止以免剝落之凶故亦不敢自違天行而昧夫消息盈虛之尚也象曰山附于地剝上以厚下安宅孔子之傳剝大象云云何也曰以山之髙厚而止于地上有山附于地之象為人上者體此知上以下為基剝民肥已適以自削其基而令之薄耳乃一意損上益下以厚固其下為自安其宅也嗚呼百姓足君孰與不足其厚下安宅之義乎初六剝牀以足蔑貞凶周公之象剝初六云云何也曰陰之剝陽自下而上以牀為象者取身之所處也又以一陽橫亘五陰之上有牀象于卦初為足故剝初取剝牀以足象當初即剝是陰自下已消滅乎一陽而失其正矣凶之道也故占有蔑貞凶象象曰剝牀以足以滅下也孔子之傳剝初六云云何也曰言初六取牀足為象者以陰侵沒陽于下也嗚呼履霜堅氷即從此始矣凶何如乎六二剝牀以辨蔑貞凶辨音辦周公之象剝六二云云何也曰六二于牀為上下之辨二陰漸進而上剝至此愈蔑于正矣凶不亦甚乎故象占取此象曰剝牀以辨未有與也孔子之傳剝六二云云何也曰言陰之剝陽得以益盛而至于辨者以陽未有應與故也嗚呼六五二之正應以隂應隂又為同氣相求正所謂與也而曰未有與者蓋五自處柔止故雖應二而實不足以援二此爻其蕭望之之謂乎然下者上之宅聽其剝而無能援豈徒望之之凶亦漢元之凶也夫故六二之凶當于二五兩爻當之六三剝之無咎周公之象剝六三云云何也曰衆隂剝陽之時三獨處剛應上去其黨而從上在剝之時獨得無咎者也故象占為剝之無咎象曰剝之無咎失上下也孔子之傳剝六三云云何也曰言六三在剝之時而獨得無咎以其在上下五隂之中獨能失其上下之黨而與陽應是衆小人中之君子也嗚呼伊川先生以為漢之呂強斯為得之乎六四剝牀以膚凶周公之象剝六四云云何也曰六四剝牀已至足辨之上漸至于膚之位也剝而至膚將滅其身矣其凶又何待言乎蓋自此而隂長陽消皆已至極貞道不可言矣故更不言蔑貞但直言凶也象曰剝牀以膚切近災也孔子之傳剝六四云云何也曰言剝牀以膚則割肉至身切近乎災而凶無可避矣六五貫魚以宫人寵無不利周公之象剝六五云云何也曰六五處剝之極五陰盛不可言然位近于上九之陽則亦有后妃率宫人進御于大君之義且卦象原有衆隂魚貫以進而五率以近上狀故象占以為此爻之義惟如魚貫之以宫人受寵于君乃無不利耳非是則不利也嗚呼五隂皆以剝陽致凶惟三與陽應則無咎五以順止乎陽則無不利然則陽復固隂之吉道也為小人者亦何苦喜剝君子乎象曰以宫人寵終無尤也孔子之傳剝六五云云何也曰言以宫人寵是雖當剝陽之位而能順止乎陽之下則亦終無尤耳上九碩果不食君子得輿小人剝廬周公之象剝上九云云何也曰上九以一陽踞乎衆陰之上有碩果不食象卦象一陽得五陰以承載有君子得輿象衆陰將剝一陽而成坤有小人剝廬象不言吉凶者碩果不食尚為君子之幸而亦小人之吉僅留一不食之碩果則君子之吝而亦小人之凶若君子得輿則無不利在君子小人剝廬則蔑貞凶即在小人矣互有得失故不暇一一言也觀上九一爻以一陽止于其上象取碩果不食一陽乘五陰象取君子得輿以五陰剝一陽象取小人剝廬可見象義無方拘執不得若讀易者能于象識義則可與論象更能于義推象則更可以通象並可以得義忘象矣觀剝之上九一爻並取三象可見置象無以見易執象亦非所以論易必象義雙顯易道乃活潑潑如在目前耳觀剝上九之一陽在上而即承以復一陽隨轉而在下可見陰陽無終盡之理所謂互根也世儒謂陽盡生陰陰盡生陽如是則剝復之間當更有坤矣何得剝下即受以復乎且觀夬姤之間亦不續乾更自可見象曰君子得輿民所載也小人剝廬終不可用也孔子之傳剝上九云云何也曰言君子得輿者謂一陽獨居于上五陰重承于下陰象民是為民所載也小人剝廬者陰為小人所恃一陽以為庇如人之有廬若陰再進而剝此上九則純坤無陽而失其所庇矣終何所用乎上九一爻同以一陽上五陰而在君子則為民所承載在小人則為剝廬而終不可用者非故意扶君子而抑小人也蓋惟君子有撥亂之才有正固之守以安萬民而為萬民所共載若小人則無才無守時危力詘徒悼瞻烏爰止于誰之屋耳豈能久庇其宇下乎聖人所言自實理實象千古不易也然則為小人者亦幸無輕乘一時之勢必欲剝盡君子以自失所庇乎然觀此一爻而易之教戒小人提醒小人亦至矣孰謂易不為小人謀也豐川易説卷四
